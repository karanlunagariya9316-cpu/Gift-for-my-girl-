<!DOCTYPE html>
<html>
<head>
  <title>Surprise ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #ff9a9e, #8e2de2);
    }

    .container {
      padding-top: 12vh;
    }

    h1 {
      font-size: 28px;
    }

    h2 {
      margin-top: 10px;
      font-size: 22px;
    }

    /* BUTTON */
    .button {
      display: block;
      margin: 30px auto;
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      background: white;
      color: purple;
      font-weight: bold;
      cursor: pointer;
    }

    /* SECRET MESSAGE */
    #secretMsg {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    /* HEARTS */
    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Hey 💖</h1>
  <h2>Special for you ❤️</h2>

  <!-- SURPRISE BUTTON -->
  <button class="button" onclick="showSecret()">Tap for surprise 💖</button>

  <!-- HIDDEN MESSAGE -->
  <div id="secretMsg">I love you so much 💖</div>

</div>

<script>

/* SHOW SECRET */
function showSecret(){
  document.getElementById("secretMsg").style.display = "block";
}

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);

</script>

</body>
</html>
