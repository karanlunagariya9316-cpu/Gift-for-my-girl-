<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{ -webkit-tap-highlight-color: transparent; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico',cursive;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:80px;
  min-height:40px;
}

.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.5s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  cursor:pointer;
}

/* TWO PARTS */
.cake-part{
  width:50%;
  height:140px;
  position:absolute;
  bottom:0;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.8s;
}

.left{ left:0; }
.right{ right:0; }

/* cream */
.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* candles */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker{
  0%{ transform: scale(1); }
  100%{ transform: scale(1.2); }
}

/* CUT EFFECT 🔥 */
.cut .left{
  transform: translateX(-60px) rotate(-10deg);
}

.cut .right{
  transform: translateX(60px) rotate(10deg);
}

.cut .flame{
  opacity:0;
}

/* 🎉 CONFETTI BLAST */
.confetti{
  position:fixed;
  font-size:14px;
  animation: blast 1.5s ease-out forwards;
}

@keyframes blast{
  0%{
    transform: translate(0,0) scale(1);
    opacity:1;
  }
  100%{
    transform: translate(var(--x), var(--y)) scale(0.5);
    opacity:0;
  }
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- LEFT PART -->
  <div class="cake-part left">
    <div class="cream"></div>
  </div>

  <!-- RIGHT PART -->
  <div class="cake-part right">
    <div class="cream"></div>
  </div>

</div>

<script>

/* TEXT */
function showText(text){
  let box = document.getElementById("text");
  box.innerHTML = "";

  text.split("").forEach((ch,i)=>{
    let span = document.createElement("span");
    span.className="letter";
    span.style.animationDelay = i*0.07+"s";
    span.innerHTML = ch===" " ? "&nbsp;" : ch;
    box.appendChild(span);
  });
}

showText("Make a wish ✨");

/* CUT */
function cutCake(){

  let cake = document.querySelector(".cake");
  cake.classList.add("cut");

  /* 🎉 CENTER BLAST CONFETTI */
  for(let i=0;i<40;i++){
    let c = document.createElement("div");
    c.className="confetti";

    // random direction
    let x = (Math.random()-0.5)*600 + "px";
    let y = (Math.random()-0.5)*600 + "px";

    c.style.setProperty('--x', x);
    c.style.setProperty('--y', y);

    // mix shapes
    let items = ["💖","✨","🥳","🎉","💗"];
    c.innerHTML = items[Math.floor(Math.random()*items.length)];

    c.style.left = "50%";
    c.style.top = "50%";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1500);
  }

  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },600);
}

</script>

</body>
</html>
