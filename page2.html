<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 🎂</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:sans-serif;
  background: linear-gradient(135deg,#89f7fe,#66a6ff);
  overflow:hidden;
  color:white;
}

/* 🎬 TEXT */
.text{
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
  white-space:nowrap;
  overflow:hidden;
}

/* letter animation */
.letter{
  display:inline-block;
  opacity:0;
  transform: translateX(50px);
  animation: slide 0.5s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform: translateX(0);
  }
}

/* 🎂 cake */
.cake{
  position:relative;
  width:200px;
  margin-top:20px;
  cursor:pointer;
}

.layer{
  height:60px;
  border-radius:20px;
  margin:5px 0;
}

.layer1{ background:#ffc0cb; }
.layer2{ background:#ffb6c1; }
.layer3{ background:#ffe4e1; }

/* ✂️ cut animation */
.cut{
  animation: cutAnim 0.6s forwards;
}

@keyframes cutAnim{
  50%{ transform: scale(0.95) rotate(-2deg); }
  100%{ transform: scale(0.9); opacity:0; }
}

/* 🕯 candle */
.candles{
  position:absolute;
  top:-30px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:30px;
  background:white;
  position:relative;
}

.flame{
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  top:-10px;
  animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
  from{ transform:scale(1); }
  to{ transform:scale(1.3); }
}

/* button */
button{
  margin-top:40px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ff4d88;
  color:white;
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <!-- candles fixed -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="layer layer1"></div>
  <div class="layer layer2"></div>
  <div class="layer layer3"></div>

</div>

<script>

/* 🎬 TEXT ANIMATION FUNCTION */
function showText(message){
  let container = document.getElementById("text");
  container.innerHTML = "";

  message.split("").forEach((char,i)=>{
    let span = document.createElement("span");
    span.className = "letter";
    span.style.animationDelay = i * 0.1 + "s";
    span.innerHTML = char;
    container.appendChild(span);
  });
}

/* first text */
showText("Make a wish ✨");

/* 🍰 CUT FUNCTION */
function cutCake(){

  let cake = document.querySelector(".cake");

  /* add cut animation */
  cake.classList.add("cut");

  setTimeout(()=>{
    cake.style.display = "none";

    /* new text */
    showText("Happy Birthday Dhrutii 💖");

  },600);
}

</script>

</body>
</html>
