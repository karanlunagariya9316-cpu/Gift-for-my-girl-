<!DOCTYPE html>
<html>
<head>
<title>Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* text */
.text{
  margin-top:60px;
  font-size:28px;
  font-weight:600;
}

/* cake container */
.cake-container{
  position:relative;
  margin-top:80px;
}

/* 🎂 CAKE (3D look) */
.cake{
  width:200px;
  height:120px;
  margin:auto;
  position:relative;
  border-radius:50% / 30%;
  background: linear-gradient(to bottom, #ff9a9e, #ff4d6d);
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  transition:0.8s;
}

/* cream top */
.cake::before{
  content:"";
  position:absolute;
  top:-25px;
  left:0;
  width:100%;
  height:50px;
  border-radius:50%;
  background:#fff;
}

/* middle layer */
.cake::after{
  content:"";
  position:absolute;
  top:40px;
  left:0;
  width:100%;
  height:30px;
  background:#ff7b8a;
  border-radius:20px;
}

/* split animation */
.left{
  transform: translateX(-60px) rotate(-8deg);
}

.right{
  transform: translateX(60px) rotate(8deg);
}

/* candles */
.candles{
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
}

.candle{
  width:6px;
  height:30px;
  background:white;
  border-radius:3px;
  position:relative;
}

.flame{
  width:12px;
  height:12px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-10px;
  left:-3px;
  box-shadow:0 0 20px orange;
  animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.3);}
}

/* knife */
.knife{
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  opacity:0;
}

@keyframes cut{
  0%{top:-120px; opacity:1;}
  60%{top:60px;}
  100%{top:60px; opacity:0;}
}

.cutting{
  animation:cut 1s forwards;
}

</style>
</head>

<body>

<div class="text" id="mainText">Make a wish ✨</div>

<div class="cake-container">

  <!-- candles -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- knife -->
  <div class="knife" id="knife">🔪</div>

  <!-- 🎂 cake -->
  <div class="cake" id="cake"></div>

</div>

<script>

let cutDone = false;

document.body.addEventListener("click", function(){

  if(cutDone) return;
  cutDone = true;

  let knife = document.getElementById("knife");
  let cake = document.getElementById("cake");

  knife.style.opacity = 1;
  knife.classList.add("cutting");

  setTimeout(()=>{

    cake.classList.add("left");

    let clone = cake.cloneNode(true);
    clone.classList.remove("left");
    clone.classList.add("right");

    cake.parentElement.appendChild(clone);

    document.getElementById("mainText").innerText =
      "Happy Birthday Dhrutii 💖";

  },800);

});

</script>

</body>
</html>
