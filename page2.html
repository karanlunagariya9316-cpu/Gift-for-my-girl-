<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{ -webkit-tap-highlight-color: transparent; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico', cursive, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:120px;
  text-align:center;
  transition:1s;
}

/* LETTER */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.5s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  height:160px;
  cursor:pointer;
  transition:1s;
}

/* CAKE PART */
.cake-part{
  width:48%;
  height:140px;
  position:absolute;
  bottom:0;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.8s;
}

.left{ left:0; }
.right{ right:0; }

.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* CANDLES */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
}

/* CUT */
.cut .left{ transform: translateX(-30px) rotate(-10deg); }
.cut .right{ transform: translateX(30px) rotate(10deg); }

/* HIDE */
.hide{
  opacity:0;
  transform:scale(0.8);
}

/* 🎁 CARDS CONTAINER */
.cards{
  display:flex;
  gap:20px;
  position:absolute;
  opacity:0;
  transition:1s;
}

/* SINGLE CARD */
.card{
  width:110px;
  height:150px;
  perspective:800px;
}

/* INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.8s;
}

/* FLIP */
.open .card-inner{
  transform:rotateY(180deg);
}

/* FRONT */
.card-front{
  position:absolute;
  width:100%;
  height:100%;
  background:#ff5c8a;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* RIBBON */
.ribbon{
  position:absolute;
  width:100%;
  height:10px;
  background:white;
  top:50%;
  transform:translateY(-50%);
  transition:0.5s;
}

/* ribbon open */
.open .ribbon{
  opacity:0;
  transform:translateY(-50%) scaleX(0);
}

/* BACK */
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  color:#a8325f;
  border-radius:15px;
  transform:rotateY(180deg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  text-align:center;
  font-size:14px;
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()" id="cake">

  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="cake-part left"><div class="cream"></div></div>
  <div class="cake-part right"><div class="cream"></div></div>

</div>

<!-- 🎁 CARDS -->
<div class="cards" id="cards">

  <div class="card" onclick="openCard(this)">
    <div class="card-inner">
      <div class="card-front">
        🎁
        <div class="ribbon"></div>
      </div>
      <div class="card-back">
        You are the best part of my life ❤️
      </div>
    </div>
  </div>

  <div class="card" onclick="openCard(this)">
    <div class="card-inner">
      <div class="card-front">
        🎁
        <div class="ribbon"></div>
      </div>
      <div class="card-back">
        I feel lucky to have you 💖
      </div>
    </div>
  </div>

  <div class="card" onclick="openCard(this)">
    <div class="card-inner">
      <div class="card-front">
        🎁
        <div class="ribbon"></div>
      </div>
      <div class="card-back">
        Love you forever 🥺💞
      </div>
    </div>
  </div>

</div>

<audio id="song" src="karan.mp3"></audio>

<script>

let cutDone=false;

function showText(text){
  let box=document.getElementById("text");
  box.innerHTML="";
  [...text].forEach((ch,i)=>{
    let s=document.createElement("span");
    s.className="letter";
    s.style.animationDelay=i*0.05+"s";
    s.textContent=ch;
    box.appendChild(s);
  });
}

showText("Make a wish ✨");

function cutCake(){

  if(cutDone) return;
  cutDone=true;

  let cake=document.getElementById("cake");
  let text=document.getElementById("text");

  document.getElementById("song").play();

  setTimeout(()=>{
    cake.classList.add("cut");
    showText("🥳 Happy Birthday Dhrutii 💝");
  },600);

  /* 🎵 AFTER SONG END → TRANSITION */
  setTimeout(()=>{
    cake.classList.add("hide");
    text.classList.add("hide");

    let cards=document.getElementById("cards");
    cards.style.opacity=1;
    cards.style.transform="scale(1.1)";
  },5000); /* song approx timing */
}

/* 🎁 OPEN CARD */
function openCard(card){
  card.classList.toggle("open");
}

</script>

</body>
</html>
