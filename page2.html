<!DOCTYPE html>
<html>
<head>
<title>Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT (OLD STYLE BACK) */
.text{
  margin-top:80px;
  font-size:34px;
  font-weight:600;
  font-family: cursive;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* CAKE CONTAINER */
.cake-container{
  position:relative;
  margin-top:80px;
}

/* 🎂 3D ROUND CAKE (IMPROVED) */
.cake{
  width:240px;
  height:140px;
  margin:auto;
  position:relative;
  border-radius:50% / 40%;
  background: linear-gradient(to bottom, #ff9a9e, #ff4d6d);
  box-shadow:0 25px 50px rgba(0,0,0,0.4);
  transition:1s ease;
}

/* top */
.cake::before{
  content:"";
  position:absolute;
  top:-35px;
  left:0;
  width:100%;
  height:70px;
  border-radius:50%;
  background: radial-gradient(circle, #fff, #eee);
}

/* cream wave */
.cake::after{
  content:"";
  position:absolute;
  top:-10px;
  left:0;
  width:100%;
  height:30px;
  background:
    radial-gradient(circle at 20% 0%, #fff 20px, transparent 21px),
    radial-gradient(circle at 50% 0%, #fff 20px, transparent 21px),
    radial-gradient(circle at 80% 0%, #fff 20px, transparent 21px);
}

/* CUT */
.left{
  transform: translateX(-80px) rotate(-12deg);
}

.right{
  transform: translateX(80px) rotate(12deg);
}

/* CANDLES */
.candles{
  position:absolute;
  top:-45px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
}

.candle{
  width:6px;
  height:30px;
  background:white;
  border-radius:3px;
  position:relative;
}

.flame{
  width:12px;
  height:12px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-10px;
  left:-3px;
  box-shadow:0 0 20px orange;
  animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.3);}
}

/* KNIFE */
.knife{
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  opacity:0;
}

@keyframes cut{
  0%{top:-120px; opacity:1;}
  60%{top:80px;}
  100%{top:80px; opacity:0;}
}

.cutting{
  animation:cut 1s forwards;
}

</style>
</head>

<body>

<div class="text" id="mainText">Make a wish ✨</div>

<div class="cake-container">

  <div class="candles" id="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="knife" id="knife">🔪</div>

  <div class="cake" id="cake"></div>

</div>

<script>

let cutDone = false;

document.body.addEventListener("click", function(){

  if(cutDone) return;
  cutDone = true;

  let knife = document.getElementById("knife");
  let cake = document.getElementById("cake");
  let candles = document.getElementById("candles");

  knife.style.opacity = 1;
  knife.classList.add("cutting");

  setTimeout(()=>{

    /* LEFT PART */
    cake.classList.add("left");

    /* RIGHT PART (CLONE) */
    let clone = cake.cloneNode(true);
    clone.classList.remove("left");
    clone.classList.add("right");

    cake.parentElement.appendChild(clone);

    /* CANDLES MOVE WITH LEFT PART */
    candles.style.transform = "translateX(-120px)";

    /* NEW TEXT */
    let text = document.getElementById("mainText");
    text.style.opacity = 0;

    setTimeout(()=>{
      text.innerText = "Happy Birthday Dhrutii 💖";
      text.style.opacity = 1;
    },300);

  },800);

});

</script>

</body>
</html>
