<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{ -webkit-tap-highlight-color: transparent; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico', cursive, "Segoe UI Emoji","Noto Color Emoji",sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
}

/* TEXT */
.text{
  font-size:30px;
  margin-bottom:100px;
  text-align:center;
}

/* LETTER ANIMATION */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation:slide 0.4s forwards;
}

@keyframes slide{
  to{opacity:1; transform:translateX(0);}
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  height:160px;
  cursor:pointer;
}

/* CAKE PART */
.cake-part{
  width:48%;
  height:140px;
  position:absolute;
  bottom:0;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.7s;
}

.left{ left:0; }
.right{ right:0; }

.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* CANDLES */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle,yellow,orange,red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
}

/* CUT */
.cut .left{ transform:translateX(-30px) rotate(-10deg); }
.cut .right{ transform:translateX(30px) rotate(10deg); }

/* CONFETTI */
.confetti{
  position:fixed;
  font-size:32px;
  animation:blast 1.2s forwards;
}

@keyframes blast{
  from{transform:translate(0,0); opacity:1;}
  to{transform:translate(var(--x),var(--y)); opacity:0;}
}

/* HIDE */
.hide{ opacity:0; transform:scale(0.8); transition:1s; }

/* 🎁 CENTER CARD */
.card{
  position:absolute;
  width:220px;
  height:260px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:15px;
  font-size:18px;
  opacity:0;
  transition:1s;
}

/* 🎵 PLAYLIST */
.playlist{
  position:absolute;
  bottom:40px;
  width:90%;
  max-width:320px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:10px;
  opacity:0;
  transition:1s;
}

.song{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
}

.song img{
  width:40px;
  border-radius:10px;
}

.play{
  font-size:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()" id="cake">

  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="cake-part left"><div class="cream"></div></div>
  <div class="cake-part right"><div class="cream"></div></div>

</div>

<!-- 💝 CARD -->
<div class="card" id="card">
  You are my everything 💖🥺<br><br>
  Forever yours ❤️
</div>

<!-- 🎵 PLAYLIST -->
<div class="playlist" id="playlist">

  <div class="song">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
    <span>Love Song</span>
    <span class="play" onclick="playSong('s1')">▶️</span>
  </div>

  <div class="song">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
    <span>Romantic Tune</span>
    <span class="play" onclick="playSong('s2')">▶️</span>
  </div>

</div>

<audio id="song" src="karan.mp3"></audio>
<audio id="s1" src="karan.mp3"></audio>
<audio id="s2" src="karan.mp3"></audio>

<script>

let done=false;

/* TEXT */
function showText(t){
  let box=document.getElementById("text");
  box.innerHTML="";
  [...t].forEach((ch,i)=>{
    let s=document.createElement("span");
    s.className="letter";
    s.style.animationDelay=i*0.04+"s";
    s.textContent=ch;
    box.appendChild(s);
  });
}

showText("Make a wish ✨");

/* 🎉 CONFETTI */
function blast(){
  for(let i=0;i<35;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerHTML=["💖","🥳","✨","🎉"][Math.floor(Math.random()*4)];
    c.style.setProperty('--x',(Math.random()-0.5)*800+"px");
    c.style.setProperty('--y',(Math.random()-0.5)*800+"px");
    c.style.left="50%";
    c.style.top="50%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1200);
  }
}

/* CUT */
function cutCake(){

  if(done) return;
  done=true;

  let cake=document.getElementById("cake");
  let text=document.getElementById("text");

  document.getElementById("song").play();

  /* 🔥 instant feel */
  blast();

  document.querySelectorAll(".flame").forEach(f=>f.style.opacity="0");

  setTimeout(()=>{
    cake.classList.add("cut");
    showText("🥳 Happy Birthday Dhrutii 💝");
  },200);

  /* FINAL TRANSITION */
  setTimeout(()=>{
    cake.classList.add("hide");
    text.classList.add("hide");

    document.getElementById("card").style.opacity=1;
    document.getElementById("playlist").style.opacity=1;

  },4500);
}

/* 🎵 PLAY SONG */
function playSong(id){
  document.getElementById(id).play();
}

</script>

</body>
</html>
