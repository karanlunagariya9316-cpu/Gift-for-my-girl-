<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Make A Wish 🎂💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ✨ Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      width: 100vw;
      overflow-x: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Kiss Marks */
    .kiss-bg {
      position: absolute;
      width: 80px;
      height: auto;
      opacity: 0; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1.5px); 
      animation: kissBreath var(--duration) infinite var(--delay) ease-in-out;
    }

    @keyframes kissBreath {
      0% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
      50% { opacity: 0.65; transform: rotate(var(--rot)) scale(var(--scl)); }
      100% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
    }

    /* 🔠 Headers */
    .header-container {
      margin-top: 6dvh;
      margin-bottom: 8dvh;
      z-index: 10;
      text-align: center;
      height: 120px; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .pre-cut-text {
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 45px; 
      letter-spacing: 2px;
      text-shadow: 0px 8px 15px rgba(255,255,255,0.7); 
      animation: fadeIn 1s ease forwards, glowPulse 3s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, 0px 8px 15px rgba(255,255,255,0.7); }
      50% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, 0px 8px 30px rgba(255,154,158,1); }
    }

    .post-cut-content {
      display: none; 
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s ease forwards;
    }

    .teddy-img {
      width: 120px;
      margin-bottom: 10px;
    }

    .hbd-text {
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 30px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    /* 🎂 Cake */
    .cake-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 20;
      cursor: pointer;
      animation: floatCake 3s ease-in-out infinite;
    }

    @keyframes floatCake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .cake-half {
      width: 140px; 
      height: 160px;
      background: #ff5e8e; 
      position: relative;
      transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .cake-half.left { border-radius: 15px 0 0 15px; border-right: 2px dashed rgba(255,255,255,0.2); }
    .cake-half.right { border-radius: 0 15px 15px 0; }

    .frosting { background: white; height: 55px; position: absolute; top: 0; width: 100%; }
    .cake-half.left .frosting { border-radius: 15px 0 20px 20px; }
    .cake-half.right .frosting { border-radius: 0 15px 20px 20px; }

    .dot { width: 18px; height: 18px; border-radius: 50%; position: absolute; }
    .cake-half.left .d1 { background: #ffcc00; top: 15px; left: 20px; }
    .cake-half.left .d2 { background: #00d2ff; top: 20px; left: 60px; }
    .cake-half.left .d3 { background: #ff3366; top: 10px; left: 100px; }
    .cake-half.right .d4 { background: #ff3366; top: 15px; left: 20px; }
    .cake-half.right .d5 { background: #00d2ff; top: 10px; left: 60px; }
    .cake-half.right .d6 { background: #ffcc00; top: 20px; left: 100px; }

    .candle { width: 10px; height: 35px; background: white; position: absolute; top: -35px; border-radius: 4px; }
    .cake-half.left .candle.c1 { left: 40px; }
    .cake-half.left .candle.c2 { left: 90px; }
    .cake-half.right .candle.c3 { left: 35px; }
    .cake-half.right .candle.c4 { left: 85px; }

    .flame { width: 14px; height: 22px; background: #ffcc00; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: absolute; top: -24px; left: -1px; box-shadow: 0 0 10px #ff9900; animation: flicker 0.6s infinite alternate; }

    @keyframes flicker { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.1); opacity: 1; } }

    .visual-hint {
      position: absolute; width: 60px; height: 60px; border: 3px dashed rgba(255, 255, 255, 0.8);
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: pulseHint 2s infinite; z-index: 30; pointer-events: none;
    }
    .visual-hint::after { content: '✂️'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }

    @keyframes pulseHint {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    .cake-half.left.cut { transform: rotate(-12deg) translate(-25px, 15px); opacity: 0.9; }
    .cake-half.right.cut { transform: rotate(12deg) translate(25px, 15px); opacity: 0.9; }
    .cut .flame { display: none; }

    /* ✨ Highlight Sentence */
    .highlight-sentence {
      display: none; 
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 20px;
      text-align: center;
      margin-top: 3dvh;
      animation: fadeIn 1s ease forwards;
    }

    /* 🎁 Gift Box */
    .gift-box-container {
      display: none; 
      position: relative;
      width: 260px; 
      height: 260px;
      background: #ff477e; 
      border: 4px solid #ff7eb3;
      border-radius: 20px;
      margin-top: 3dvh;
      z-index: 20;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .gift-box-lid {
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
      backdrop-filter: blur(10px);
      border: 4px solid rgba(255,255,255,0.8);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    .lid-fly-off {
      animation: smoothLidActionSlower 3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes smoothLidActionSlower {
      0% { top: -4px; opacity: 1; }
      20% { top: -40px; transform: rotate(5deg); opacity: 1; }
      100% { top: 100vh; transform: rotate(720deg); opacity: 0; }
    }

    .gift-box-content {
      display: none; 
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 16px;
    }

    .snappy-slideshow {
      width: 220px; 
      height: 180px;
      overflow: hidden;
      border-radius: 8px;
      border: 2px solid #ddd;
    }

    .snappy-slideshow img { width: 100%; height: 100%; object-fit: cover; }

    /* ⏭️ Surprise Button (Below Box) */
    .surprise-btn {
      display: none; 
      margin-top: 25px; 
      margin-bottom: 30px;
      background: #ff477e;
      color: white;
      border: 2px solid #ff7eb3;
      padding: 15px 40px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 20px;
      cursor: pointer;
      z-index: 100; 
      box-shadow: 0 8px 20px rgba(255, 71, 126, 0.5);
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <div id="bg-container"></div>
  
  <audio id="surpriseSong" src="karan.mp3"></audio>

  <div class="header-container">
    <div class="pre-cut-text" id="makeWishHeader">Make a wish ✨💫</div>
    <div class="post-cut-content" id="postCutContent">
      <img src="teddy.png" class="teddy-img" onerror="this.style.display='none'">
      <div class="hbd-text">Happyy Birthday Dhrutiii... 🥳</div>
    </div>
  </div>

  <div class="cake-wrapper" id="cakeWrapper" onclick="cutCake()">
    <div class="visual-hint" id="visualHint"></div>
    <div class="cake-half left" id="cakeLeft">
      <div class="candle c1"><div class="flame"></div></div>
      <div class="candle c2"><div class="flame"></div></div>
      <div class="frosting"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
    </div>
    <div class="cake-half right" id="cakeRight">
      <div class="candle c3"><div class="flame"></div></div>
      <div class="candle c4"><div class="flame"></div></div>
      <div class="frosting"><div class="dot d4"></div><div class="dot d5"></div><div class="dot d6"></div></div>
    </div>
  </div>

  <div class="highlight-sentence" id="highlightSentence">
    Thes special song for your special day..🤭🤭
  </div>

  <div class="gift-box-container" id="giftBoxContainer">
    <div class="gift-box-lid" id="giftBoxLid"></div>
    <div class="gift-box-content" id="giftBoxContent">
      <div class="snappy-slideshow">
        <img id="snappySlide" src="56775c61f409ca24e59916b0d54993c7.jpg">
      </div>
    </div>
  </div>

  <button class="surprise-btn" id="surpriseBtn" onclick="window.location.href='page3.html'">Ready To Surprise 🎁</button>

  <script>
    // 💋 Background Kiss Marks
    let bgContainer = document.getElementById("bg-container");
    for(let i=0; i<15; i++) {
      let kiss = document.createElement("img");
      kiss.src = "kiss-mark_1f48b.png"; 
      kiss.className = "kiss-bg";
      kiss.style.left = Math.random()*90 + "vw"; kiss.style.top = Math.random()*90 + "vh";
      kiss.style.setProperty('--rot', Math.random()*360+'deg');
      kiss.style.setProperty('--scl', Math.random()*0.5+0.7);
      kiss.style.setProperty('--duration', Math.random()*1.5+2+'s');
      kiss.style.setProperty('--delay', Math.random()*2+'s');
      bgContainer.appendChild(kiss);
    }

    let isCakeCut = false;

    function cutCake() {
      if(isCakeCut) return; 
      isCakeCut = true;

      document.getElementById("visualHint").style.display = "none";
      document.getElementById("makeWishHeader").style.display = "none";
      
      document.getElementById("cakeLeft").classList.add("cut");
      document.getElementById("cakeRight").classList.add("cut");
      
      document.getElementById("postCutContent").style.display = "flex";
      document.getElementById("highlightSentence").style.display = "block"; 
      document.getElementById("giftBoxContainer").style.display = "block"; 
      
      // ૩ સેકન્ડ પછી ઓટોમેટિક બોક્સ ખુલશે
      setTimeout(openBoxAutomatically, 3000);
    }

    function openBoxAutomatically() {
      document.getElementById("giftBoxLid").classList.add("lid-fly-off");
      
      // 🎵 સોંગ ઓટોમેટિક સ્ટાર્ટ
      let song = document.getElementById("surpriseSong");
      song.play().catch(e => console.log("Auto-play blocked by browser."));

      setTimeout(() => {
        document.getElementById("giftBoxLid").style.display = "none";
        document.getElementById("giftBoxContent").style.display = "flex";
        startSnappySlides();
      }, 2000);

      // ✨ પર્ફેક્ટ ૩ સેકન્ડ બાકી હોય ત્યારે બટન
      song.ontimeupdate = function() {
        if (song.duration > 0 && (song.duration - song.currentTime <= 3.2)) {
          document.getElementById("surpriseBtn").style.display = "block";
          // એકવાર બટન દેખાઈ જાય એટલે ઇવેન્ટ બંધ કરો
          song.ontimeupdate = null; 
        }
      };
    }

    function startSnappySlides() {
      const snappyImg = document.getElementById("snappySlide");
      const photos = ["56775c61f409ca24e59916b0d54993c7.jpg", "5d257c099e08046766d50debc8123ba3.jpg", "3684c4befa9e2726a0ebbed26737acde.jpg", "2d1f8c7f089e90dfe7a10c179dd860bd.jpg", "6fd54a10dbcb7173e77320e2e5bf4f60.jpg"];
      let idx = 0;
      setInterval(() => {
        idx = (idx + 1) % photos.length;
        snappyImg.src = photos[idx];
      }, 800); 
    }
  </script>
</body>
</html>
