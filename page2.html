<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico',cursive;
  color:white;
  overflow:hidden;

  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:80px;
  min-height:40px;
}

/* TEXT ANIMATION */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.5s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  cursor:pointer;
  transition:0.4s;
}

/* BODY */
.cake-body{
  width:100%;
  height:140px;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  position:relative;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.6s;
}

/* CREAM */
.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* DRIP */
.cream::after{
  content:"";
  position:absolute;
  width:100%;
  height:20px;
  top:35px;
  background:
    radial-gradient(circle at 20% 0,#fff 20px,transparent 21px),
    radial-gradient(circle at 50% 0,#fff 20px,transparent 21px),
    radial-gradient(circle at 80% 0,#fff 20px,transparent 21px);
}

/* CANDLES */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

/* FLAME */
.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;

  box-shadow:
    0 0 10px rgba(255,200,0,0.9),
    0 0 20px rgba(255,100,0,0.7),
    0 0 30px rgba(255,50,0,0.5);

  animation: flicker 0.2s infinite alternate;
  transition:0.5s;
}

@keyframes flicker{
  0%{ transform: scale(1); }
  100%{ transform: scale(1.2); }
}

/* CUT EFFECT 🔥 */
.cut .cake-body{
  transform: scaleY(0.6) rotate(-5deg);
}

.cut .cake{
  transform: scale(0.9);
}

/* 🔥 FLAME OFF */
.cut .flame{
  opacity:0;
  transform: scale(0);
}

/* ✨ CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  background:white;
  top:0;
  animation: fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform: translateY(100vh) rotate(360deg);
    opacity:0;
  }
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="cake-body">
    <div class="cream"></div>
  </div>

</div>

<script>

/* TEXT FUNCTION */
function showText(text){
  let box = document.getElementById("text");
  box.innerHTML = "";

  text.split("").forEach((ch,i)=>{
    let span = document.createElement("span");
    span.className="letter";
    span.style.animationDelay = i*0.07+"s";
    span.innerHTML = ch===" " ? "&nbsp;" : ch;
    box.appendChild(span);
  });
}

/* INITIAL */
showText("Make a wish ✨");

/* CUT */
function cutCake(){

  let cake = document.querySelector(".cake");
  cake.classList.add("cut");

  /* 🎉 CONFETTI */
  for(let i=0;i<40;i++){
    let c = document.createElement("div");
    c.className="confetti";
    c.style.left = Math.random()*100+"vw";
    c.style.background = ["#fff","#ff4d88","#ffd700"][Math.floor(Math.random()*3)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }

  /* TEXT CHANGE SMOOTH */
  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },700);
}

</script>

</body>
</html>
