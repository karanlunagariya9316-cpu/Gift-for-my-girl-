<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{ -webkit-tap-highlight-color: transparent; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico', cursive, "Segoe UI Emoji","Noto Color Emoji",sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
}

/* TEXT BOX */
.text{
  text-align:center;
}

/* 🔥 TOP TEXT (LIKE CARD STYLE) */
.top-text{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
  font-size:34px;
  line-height:1.5;
  letter-spacing:1px;
  text-shadow:0 0 12px rgba(255,255,255,0.5);
}

/* MAIN TEXT */
.main-text{
  margin-top:100px;
  font-size:32px;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* ANIMATION */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateY(30px);
  animation:slide 0.5s forwards;
}

@keyframes slide{
  to{opacity:1; transform:translateY(0);}
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  height:160px;
  cursor:pointer;
  transition: transform 0.8s ease;
}

.cake.down{
  transform: translateY(70px);
}

/* CAKE PART */
.cake-part{
  width:48%;
  height:140px;
  position:absolute;
  bottom:0;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.8s ease;
}

.left{ left:0; }
.right{ right:0; }

/* CREAM */
.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* TOPPING */
.cream::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 50%, #ff4d7a 6px, transparent 7px),
    radial-gradient(circle at 40% 30%, #ffd700 6px, transparent 7px),
    radial-gradient(circle at 60% 60%, #00e6e6 6px, transparent 7px),
    radial-gradient(circle at 80% 40%, #ff66cc 6px, transparent 7px),
    radial-gradient(circle at 30% 70%, #ff9933 6px, transparent 7px);
}

/* CANDLES */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle,yellow,orange,red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
  animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* CUT */
.cut .left{ transform:translateX(-30px) rotate(-10deg); }
.cut .right{ transform:translateX(30px) rotate(10deg); }

/* CONFETTI */
.confetti{
  position:fixed;
  font-size:32px;
  animation:blast 1.3s forwards;
}

@keyframes blast{
  from{transform:translate(0,0); opacity:1;}
  to{transform:translate(var(--x),var(--y)); opacity:0;}
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="cake-part left"><div class="cream"></div></div>
  <div class="cake-part right"><div class="cream"></div></div>
</div>

<audio id="song" src="karan.mp3"></audio>

<script>

let done=false;

/* 🎂 MAKE A WISH */
function showWish(){
  let box=document.getElementById("text");
  box.innerHTML="";

  ["Make ","a wish ","✨"].forEach((w,i)=>{
    let span=document.createElement("span");
    [...w].forEach((c,j)=>{
      let s=document.createElement("span");
      s.className="letter";
      s.style.animationDelay=(j*0.05 + i*0.5)+"s";
      s.textContent=c;
      span.appendChild(s);
    });
    box.appendChild(span);
  });
}

/* 💖 FINAL TEXT */
function showFinal(){

  let box=document.getElementById("text");
  box.innerHTML="";

  /* TOP TEXT (3 LINE LIKE CARD) */
  let top=document.createElement("div");
  top.className="top-text";

  let lines=[
    "Many Many",
    "Happy Returns of the",
    "Day Bachha 🎉🎊"
  ];

  lines.forEach((line,li)=>{
    let div=document.createElement("div");

    [...line].forEach((c,i)=>{
      let s=document.createElement("span");
      s.className="letter";
      s.style.animationDelay=(i*0.04 + li*0.6)+"s";
      s.textContent=c;
      div.appendChild(s);
    });

    top.appendChild(div);
  });

  box.appendChild(top);

  /* MAIN TEXT */
  setTimeout(()=>{
    let main=document.createElement("div");
    main.className="main-text";

    let text="Happyy Birthday Dhrutii 🥳💝";

    [...text].forEach((c,i)=>{
      let s=document.createElement("span");
      s.className="letter";
      s.style.animationDelay=i*0.04+"s";
      s.textContent=c;
      main.appendChild(s);
    });

    box.appendChild(main);

  },1800);
}

showWish();

/* 🎉 BLAST */
function blast(){
  for(let i=0;i<40;i++){
    let c=document.createElement("div");
    c.className="confetti";

    c.style.setProperty('--x',(Math.random()-0.5)*800+"px");
    c.style.setProperty('--y',(Math.random()-0.5)*800+"px");

    let arr=["💖","✨","🥳","🎉","💗","💞","💘","💝"];
    c.textContent=arr[Math.floor(Math.random()*arr.length)];

    c.style.left="50%";
    c.style.top="50%";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1300);
  }
}

/* CUT */
function cutCake(){

  if(done) return;
  done=true;

  document.getElementById("song").play();

  document.querySelectorAll(".flame").forEach(f=>f.style.opacity="0");

  setTimeout(()=>{
    document.querySelector(".cake").classList.add("cut");
    document.querySelector(".cake").classList.add("down");
  },200);

  /* MULTI BLAST */
  for(let i=0;i<8;i++){
    setTimeout(blast,i*200);
  }

  setTimeout(showFinal,300);
}

</script>

</body>
</html>
