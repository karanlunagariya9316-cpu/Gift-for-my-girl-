<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{ -webkit-tap-highlight-color: transparent; }

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:60px;
  font-family:'Pacifico', cursive, "Segoe UI Emoji","Noto Color Emoji",sans-serif;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:120px;
  text-align:center;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* LETTER ANIMATION */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation:slide 0.5s forwards;
}

@keyframes slide{
  to{opacity:1; transform:translateX(0);}
}

/* CAKE */
.cake{
  position:relative;
  width:260px;
  height:160px;
  cursor:pointer;
}

.cake-part{
  width:48%;
  height:140px;
  position:absolute;
  bottom:0;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
  transition:0.8s ease;
}

.left{ left:0; }
.right{ right:0; }

.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* CANDLES */
.candles{
  position:absolute;
  top:-40px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
}

.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle,yellow,orange,red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
  animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
  100%{transform:scale(1.2);}
}

/* CUT */
.cut .left{ transform:translateX(-30px) rotate(-10deg); }
.cut .right{ transform:translateX(30px) rotate(10deg); }

/* HINT BUTTON */
.tap-hint{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid white;
  animation:pulse 1.5s infinite;
}

.tap-hint::after{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

@keyframes pulse{
  70%{transform:translate(-50%,-50%) scale(1.3); opacity:0.5;}
}

/* CONFETTI */
.confetti{
  position:fixed;
  font-size:32px;
  animation:blast 1.2s forwards;
}

@keyframes blast{
  to{transform:translate(var(--x),var(--y)); opacity:0;}
}

/* BUTTON */
.surprise-btn{
  position:fixed;
  bottom:60px;
  left:50%;
  transform:translateX(-50%) translateY(40px);
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4d7a;
  color:white;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  opacity:0;
  cursor:pointer;
  transition:0.4s;
}

.surprise-btn.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div id="tapHint" class="tap-hint"></div>

  <div class="cake-part left"><div class="cream"></div></div>
  <div class="cake-part right"><div class="cream"></div></div>
</div>

<audio id="song" src="karan.mp3"></audio>

<button id="surpriseBtn" class="surprise-btn" onclick="goNext()">Ready To Surprise 🎁</button>

<script>

let cutDone=false;

/* TEXT */
function showWish(){
  let box=document.getElementById("text");
  let txt="Make a wish ✨💫";

  [...txt].forEach((ch,i)=>{
    let s=document.createElement("span");
    s.className="letter";
    s.style.animationDelay=i*0.05+"s";
    s.textContent=ch;
    box.appendChild(s);
  });
}

showWish();

/* EMOJI BLAST */
function blast(){
  for(let i=0;i<35;i++){
    let c=document.createElement("div");
    c.className="confetti";

    let x=(Math.random()-0.5)*600+"px";
    let y=(Math.random()-0.5)*600+"px";

    c.style.setProperty('--x',x);
    c.style.setProperty('--y',y);

    let arr=["💖","✨","🥳","🎉","💗","💞"];
    c.textContent=arr[Math.floor(Math.random()*arr.length)];

    c.style.left="50%";
    c.style.top="50%";

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1200);
  }
}

/* CUT */
function cutCake(){

  if(cutDone) return;
  cutDone=true;

  document.getElementById("tapHint").style.display="none";

  let cake=document.querySelector(".cake");
  let song=document.getElementById("song");
  let btn=document.getElementById("surpriseBtn");

  song.play();

  for(let i=0;i<8;i++){
    setTimeout(blast,i*200);
  }

  setTimeout(()=>{cake.classList.add("cut");},200);

  /* show button after song end */
  song.onended=()=>{
    btn.classList.add("show");
  };
}

/* BUTTON EFFECT */
function goNext(){

  let btn=document.getElementById("surpriseBtn");
  let rect=btn.getBoundingClientRect();

  for(let i=0;i<50;i++){
    let c=document.createElement("div");

    c.style.position="fixed";
    c.style.width="6px";
    c.style.height="12px";
    c.style.background=["#ff4d7a","#ffd700","#00e6e6","#ff66cc","#ff9933"][Math.floor(Math.random()*5)];
    c.style.left=rect.left+rect.width/2+"px";
    c.style.top=rect.top+"px";

    let x=(Math.random()-0.5)*300;
    let y=-(Math.random()*400);

    c.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${x}px,${y}px)`,opacity:0}
    ],{duration:1000});

    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }

  setTimeout(()=>{
    window.location.href="page3.html";
  },2000);
}

</script>

</body>
</html>
