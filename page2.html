<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:'Pacifico',cursive;
  color:white;

  /* 🔥 SAME BACKGROUND AS PAGE 1 */
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:40px;
  text-align:center;
  text-shadow:0 0 10px rgba(255,255,255,0.6);
}

/* animation */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.4s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* 🎂 REALISTIC CAKE */
.cake{
  position:relative;
  width:220px;
  height:180px;
  cursor:pointer;
}

/* cake base */
.cake-base{
  width:100%;
  height:120px;
  background: linear-gradient(#ff9eb5,#ff6f91);
  border-radius:30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* cream top */
.cake-top{
  position:absolute;
  top:-30px;
  width:100%;
  height:60px;
  background: #fff0f5;
  border-radius:30px;
}

/* ✂️ CUT EFFECT */
.cut .cake-left{
  transform:translateX(-40px) rotate(-6deg);
}
.cut .cake-right{
  transform:translateX(40px) rotate(6deg);
}

/* split */
.cake-left, .cake-right{
  position:absolute;
  width:50%;
  height:100%;
  overflow:hidden;
  transition:0.6s;
}

.cake-right{
  right:0;
}

/* candles */
.candles{
  position:absolute;
  top:-50px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:30px;
  background:white;
  border-radius:3px;
  position:relative;
}

/* 🔥 CINEMATIC FLAME */
.flame{
  width:12px;
  height:18px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-15px;
  left:-1px;

  box-shadow:
    0 0 10px rgba(255,200,0,0.8),
    0 0 20px rgba(255,100,0,0.6),
    0 0 30px rgba(255,50,0,0.4);

  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker{
  0%{ transform: scale(1) rotate(0deg); }
  100%{ transform: scale(1.2) rotate(3deg); }
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <!-- candles -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- split cake -->
  <div class="cake-left">
    <div class="cake-top"></div>
    <div class="cake-base"></div>
  </div>

  <div class="cake-right">
    <div class="cake-top"></div>
    <div class="cake-base"></div>
  </div>

</div>

<script>

/* TEXT FUNCTION */
function showText(text){
  let box = document.getElementById("text");
  box.innerHTML = "";

  text.split("").forEach((ch,i)=>{
    let span = document.createElement("span");
    span.className="letter";
    span.style.animationDelay = i*0.08+"s";

    span.innerHTML = ch === " " ? "&nbsp;" : ch;

    box.appendChild(span);
  });
}

/* first text */
showText("Make a wish ✨");

/* CUT */
function cutCake(){
  let cake = document.querySelector(".cake");
  cake.classList.add("cut");

  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },600);
}

</script>

</body>
</html>
