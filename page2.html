<!DOCTYPE html>
<html lang="en">
<head>

  <title>Make A Wish 🎂💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ✨ Fixed Page & Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100dvh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* ઉપરથી સ્ટાર્ટ થાય */
      align-items: center;
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Background Realistic Kiss Marks (Page 4 style continue staggered delay) */
    .kiss-bg {
      position: absolute;
      width: 80px;
      height: auto;
      opacity: 0; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1.5px); 
      animation: kissBreath var(--duration) infinite var(--delay) ease-in-out;
    }

    @keyframes kissBreath {
      0% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
      50% { opacity: 0.65; transform: rotate(var(--rot)) scale(var(--scl)); }
      100% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
    }

    /* 🔠 BIG & GLOWING HEADERS (Structured Fredoka One) */
    .header-container {
      margin-top: 6dvh;
      margin-bottom: 8dvh; /* ✨ સુધારો: કેક અને ટેક્સ્ટ વચ્ચે પર્ફેક્ટ Gap ✨ */
      z-index: 10;
      text-align: center;
      transition: all 0.5s ease;
      height: 120px; /* ફિક્સ હાઈટ જેથી કેક ના હલે */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .pre-cut-text {
      font-family: 'Fredoka One', cursive, sans-serif;
      color: white;
      font-size: 45px; /* મોટી સાઈઝ */
      letter-spacing: 2px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px 8px 15px rgba(255,255,255,0.7); /* ✨ Glowing structured effect ✨ */
      animation: fadeIn 1s ease forwards, glowPulse 3s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 8px 15px rgba(255,255,255,0.7); }
      50% { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 8px 30px rgba(255,154,158,1); }
    }

    /* Post-Cut structured header (HBD) with Teddy */
    .post-cut-content {
      display: none; /* શરૂ શરૂમાં છુપાયેલું */
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s ease forwards, glowPulse 3s infinite ease-in-out;
    }

    .teddy-img {
      width: 120px;
      margin-bottom: 10px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
    }

    .hbd-text {
      font-family: 'Fredoka One', cursive, sans-serif;
      color: white;
      font-size: 30px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      line-height: 1.4;
    }

    .emoji-row {
      font-size: 24px;
      margin-top: 5px;
    }

    /* 🎂 --- LARGER CSS 3D CAKE with 4 candles (Stable) --- 🎂 */
    .cake-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-top: 0; 
      z-index: 20;
      cursor: pointer;
      /* ✨ Floating & Glowing Animation ✨ */
      animation: floatCake 3s ease-in-out infinite, glowCake 2s ease-in-out infinite alternate;
    }

    @keyframes floatCake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes glowCake {
      0% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }
      100% { filter: drop-shadow(0 0 30px rgba(255,154,158,0.8)); }
    }

    /* મોટી કેક ના માપ */
    .cake-half {
      width: 140px; 
      height: 160px;
      background: #ff5e8e; 
      position: relative;
      transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .cake-half.left {
      border-radius: 15px 0 0 15px;
      border-right: 2px dashed rgba(255,255,255,0.2);
    }

    .cake-half.right {
      border-radius: 0 15px 15px 0;
    }

    .frosting {
      background: white;
      height: 55px;
      position: absolute;
      top: 0;
      width: 100%;
    }
    .cake-half.left .frosting { border-radius: 15px 0 20px 20px; }
    .cake-half.right .frosting { border-radius: 0 15px 20px 20px; }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      position: absolute;
    }
    .cake-half.left .d1 { background: #ffcc00; top: 15px; left: 20px; }
    .cake-half.left .d2 { background: #00d2ff; top: 20px; left: 60px; }
    .cake-half.left .d3 { background: #ff3366; top: 10px; left: 100px; }
    .cake-half.right .d4 { background: #ff3366; top: 15px; left: 20px; }
    .cake-half.right .d5 { background: #00d2ff; top: 10px; left: 60px; }
    .cake-half.right .d6 { background: #ffcc00; top: 20px; left: 100px; }

    /* 🎂 ૪ મીણબત્તીઓ (પર્ફેક્ટલી સેટ) 🎂 */
    .candle {
      width: 10px;
      height: 35px;
      background: white;
      position: absolute;
      top: -35px;
      border-radius: 4px;
    }
    /* Left side candles */
    .candle.c1 { left: 40px; }
    .candle.c2 { left: 90px; }
    /* Right side candles */
    .cake-half.right .candle.c3 { left: 35px; }
    .cake-half.right .candle.c4 { left: 85px; }

    .flame {
      width: 14px;
      height: 22px;
      background: #ffcc00;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: absolute;
      top: -24px;
      left: -1px;
      box-shadow: 0 0 10px #ff9900;
      animation: flicker 0.6s infinite alternate;
    }

    @keyframes flicker {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* 🔪 Visual Cut Hint ✂️ */
    .visual-hint {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 3px dashed rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseHint 2s infinite;
      z-index: 30;
      pointer-events: none;
    }
    .visual-hint::after {
      content: '✂️';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
    }

    @keyframes pulseHint {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    /* CAKE CUT ANIMATION CLASSESભલે ભાઈ, આપણે એકદમ કટકે-કટકે અને ૧૦૦% પરફેક્ટ જ કામ કરવું છે. તમારા આ નવા આઈડિયા તો ખરેખર બહુ જ જોરદાર અને હૃદયસ્પર્શી છે! 🤩

તમે કહ્યા મુજબના **૪ મોટા અને જોરદાર ફેરફારો** મેં **page2.html** માં પર્ફેક્ટલી કરી દીધા છે:

૧. **ટેક્સ્ટ અને ઈમોજી ક્લીનઅપ:** "Happyy Birthday Dhrutiii... 🎉" માંથી પેલો ફટાકડા વાળો 🎉 ઈમોજી મેં હટાવી દીધો છે, જેથી તે એકદમ સુંદર અને સ્પષ્ટ લાગે.
૨. **નવો ગ્લોઇંગ મેસેજ:** કેકની નીચે આવતો ગ્લોઇંગ મેસેજ મેં તમે કીધું એમ અપડેટ કરી દીધો છે. હવે તે દેખાશે:*"Thes special song for your special day..🤭🤭"*
૩. **પર્ફેક્ટ લેઆઉટ (Gap):** મેસેજ અને કેક વચ્ચે મેં પૂરતી જગ્યા રાખી છે, જેથી તે એક ફિલ્મ જેવું પ્રીમિયમ લેઆઉટ લાગે.
૪. **મોટું અને મસ્ત ગિફ્ટ બોક્સ:** ગિફ્ટ બોક્સને મેં તમે કહ્યા મુજબ **૩૦ ટકા મોટું** કરી દીધું છે. અને તમે એ પણ કીધું કે ઢાંકણું ફાસ્ટ પડે છે, તો હવે એનિમેશન એવું પર્ફેક્ટ સેટ કર્યું છે કે તમે ટેપ કરશો એટલે ઢાંકણું પહેલા સાવ હલકું ઉપર જશે (Jsav arak) અને પછી મસ્ત સ્મૂથ રીતે slowly નીચે ઉડી જશે.
૫. **ફાસ્ટ સ્નેપી સલાઈડશો:** બોક્સની અંદરના સ્નેપી ફોટા હવે વધારે ફાસ્ટ બદલાશે.
૬. **મેજિકલ બટન ટાઈમિંગ (Ready To Surprise 🎁):** આ સૌથી મહત્વનો સુધારો છે. "Ready To Surprise 🎁" બટન હવે સ્ક્રીનની બરાબર વચ્ચે જ આવશે અને એ પણ ત્યારે જ, જ્યારે તમે સોંગ (songP4.mp3) પ્લે કરશો અને **સોંગ પૂરું થવામાં માત્ર ૩ સેકન્ડ બાકી હશે!**

અહીં તમારો ૧૦૦ ટકા પર્ફેક્ટ અને ફિલ્મી **page2.html** નો નવો કોડ છે. આખો કોડ કોપી કરીને રિપ્લેસ કરી લો:

      border-radius: 15px;
      
      /* ✨ Smooth fade-in and slide-up animation ✨ */
      animation: smoothSlideUpIn 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes smoothSlideUpIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 🎁 --- UPDATED GIFT BOX CONTAINER (30% larger, Smoother Lid Action) --- 🎁 */
    .gift-box-container {
      display: none; /* શરૂ શરૂમાં છુપાયેલું */
      position: relative;
      width: 260px; /* ✨ ૩૦ ટકા મોટું માપ ✨ */
      height: 260px;
      background: #ff477e; 
      border: 4px solid #ff7eb3;
      border-radius: 20px;
      margin-top: 3dvh;
      margin-bottom: 5vh;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      animation: fadeIn 1s ease forwards;
    }

    /* પિન્ક ઢાંકણું */
    .gift-box-lid {
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
      backdrop-filter: blur(10px);
      border: 4px solid rgba(255,255,255,0.8);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
      transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s ease;
    }
    .gift-box-lid::after {
      content: '🎁 Tap to Open!';
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      color: white;
      font-weight: 600;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    /* ✨ --- SM00THER LID ACTION: Jsav arak upar -> then slowly down --- ✨ */
    .lid-fly-off {
      animation: smoothLidAction 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes smoothLidAction {
      0% { top: -4px; left: -4px; transform: rotate(0deg) scale(1); opacity: 1; }
      /* Jsav arak upar (તે સહેજ ઉપર જશે) */
      20% { top: -20px; left: -4px; transform: rotate(5deg) scale(1.05); opacity: 1; }
      /* Then slowly down and out (પછી slowly નીચે ઉડી જશે) */
      100% { top: 100vh; left: 10vw; transform: rotate(360deg) scale(0.6); opacity: 0; }
    }

    /* બોક્સની અંદરનું કન્ટેન્ટ (Revel when lid flies off) */
    .gift-box-content {
      display: none; /* શરૂઆતમાં છુપાયેલું */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      z-index: 25;
      background: white;
      border-radius: 16px;
      animation: fadeIn 1s ease forwards;
    }

    /* સ્નેપી ફોટો સ્લાઈડશો (મોટું) */
    .snappy-slideshow {
      width: 220px; /* મોટું */
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-radius: 8px;
      background: #f0f0f0;
      border: 2px solid #ddd;
      margin-top: -10px; /* થોડું ઉપર લાવીએ */
    }

    .snappy-slideshow img {
      width: auto;
      height: 100%;
      object-fit: cover;
      /* ✨ SNAPPY TRANSITION (ઝટકા સાથે) ✨ */
      transition: none; /* કોઈ સ્મૂથ ટ્રાન્ઝિશન નહિ */
    }

    /* ગીત કંટ્રોલ */
    .song-control {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .play-btn {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 5px 20px;
      border-radius: 15px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .play-btn:active { background: rgba(255, 255, 255, 0.5); }
