<!DOCTYPE html>
<html>
<head>
  <title>Make A Wish 🎂💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ✨ Fixed Page & Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100dvh; /* dvh નો ઉપયોગ કર્યો છે જેથી બ્રાઉઝરના મેનુ પ્રમાણે જાતે એડજસ્ટ થાય */
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      position: relative;
      font-family: 'Poppins', sans-serif;
    }

    /* 🖤 Emotional Dark Border Effect */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Realistic Image Kiss Animation (Staggered like page 4) */
    .kiss-bg {
      position: absolute;
      width: 80px;
      height: auto;
      opacity: 0; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1.5px); 
      animation: kissBreath var(--duration) infinite var(--delay) ease-in-out;
    }

    @keyframes kissBreath {
      0% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
      50% { opacity: 0.65; transform: rotate(var(--rot)) scale(var(--scl)); }
      100% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
    }

    /* 🔠 ORNATE HEADER: MAKE A WISH 🎂💖 */
    .header {
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 40px;
      margin-top: 5dvh;
      letter-spacing: 2px;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000,
         0px 8px 15px rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* 🎂✨ Updated: HIGH-QUALITY 3D CAKE & Visual Cut Hint ✨🎂 */
    .cake-container {
      position: relative;
      width: 250px;
      height: 250px;
      margin-top: 5dvh;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* ✨ Floating & Glowing effect for the container */
      animation: floatUpAndDown 4s infinite ease-in-out, glowCake 2s infinite ease-in-out;
    }

    /* ✨ પર્ફેક્ટ મેજિકલ ગ્લો એનિમેશન ✨ */
    @keyframes glowCake {
      0% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 126, 179, 0.2); }
      50% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 60px rgba(255, 126, 179, 0.5); }
      100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 126, 179, 0.2); }
    }

    /* ✨ હવામાં તરવાની ઈફેક્ટ ✨ */
    @keyframes floatUpAndDown {
      0% { transform: translateY(0); }
      100% { transform: translateY(-15px); }
    }

    /* ઉચ્ચ ગુણવત્તાવાળી 3D કેક ઇલસ્ટ્રેશનનો ઉપયોગ કરો */
    .cake-image {
      width: 100%;
      height: 100%;
      object-fit: contain; /* કેક કપાઈ ન જાય તેની ખાતરી કરો */
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
    }

    /* ✨ ✨ NEW: Visual Translucent "Cut" Hint ✨ ✨ */
    /* આખી સ્મૂથ ડેશ લાઈન દર થોડી સેકન્ડે દેખાશે અને ગાયબ થશે */
    .cut-hint-line {
      position: absolute;
      top: 50%; /* કેકની ઉપર પર્ફેક્ટલી સેટ કરો */
      left: 10%;
      right: 10%;
      height: 2px;
      /* ✨ આછી ગુલાબી ડેશ લાઈન ✨ */
      border-bottom: 2px dashed rgba(255, 154, 158, 0.5); 
      transform: translateY(-50%) rotate(-5deg); /* થોડો એંગલ */
      opacity: 0;
      z-index: 20;
      
      /* ✨ હિંટ પલ્સ એનિમેશન ✨ */
      animation: cutPulseHint 6s infinite; 
    }

    @keyframes cutPulseHint {
      0%, 80%, 100% { opacity: 0; }
      20%, 60% { opacity: 1; }
    }

    /* 💖 WISH TEXT BELOW CAKE 💖 */
    .wish-text {
      font-family: 'Poppins', sans-serif;
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      margin-top: 8dvh;
      padding: 0 20px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
      z-index: 10;
    }

    /* ⏭️ CONTINUE BUTTON (Capsule style at bottom right) */
    .next-btn {
      position: fixed;
      bottom: 4vh; 
      right: 25px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      padding: 12px 35px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      
      /* ✨ બટન પોપ-ઇન એનિમેશન (પેજ4ની જેમ જ) ✨ */
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .next-btn:active {
      transform: scale(0.92);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

  </style>
</head>
<body>

  <div id="bg-container"></div>

  <div class="header">MAKE A WISH 🎂💖</div>
  
  <div class="cake-container" id="cake-container">
    <img src="https://via.placeholder.com/250x250.png?text=HIGH_QUALITY_3D_CAKE&DHRUTI=cute" alt="Detailed 3D Cake" class="cake-image" id="cake-image">
    
    <div class="cut-hint-line" id="cut-hint"></div>
  </div>

  <div class="wish-text">
    Make a wish and cut the cake<br>
    I fall for you every single day! 💋💗
  </div>

  <button class="next-btn" id="continueBtn" onclick="goToPage3()">CONTINUE</button>

  <script>
    // 💋 બેકગ્રાઉન્ડ લિપસ્ટિક માર્ક્સ (Staggered fade-in)
    let bgContainer = document.getElementById("bg-container");
    for (let i = 0; i < 20; i++) {
      let kiss = document.createElement("div");
      kiss.className = "kiss-bg";
      kiss.innerText = "💋";
      
      let randomX = Math.floor(Math.random() * 95);
      let randomY = Math.floor(Math.random() * 95);
      
      // I MISS US ની જેમ જ આખા પેજ પર ફેલાવો
      if(i < 8) { randomY = Math.floor(Math.random() * 25); } // ઉપર વધારે

      let randomRotate = Math.floor(Math.random() * 360);
      let randomScale = (Math.random() * 0.5) + 0.7; 
      let animDuration = (Math.random() * 1.5) + 2; 
      let animDelay = Math.random() * 2; 
      
      kiss.style.left = randomX + "vw";
      kiss.style.top = randomY + "vh";
      
      kiss.style.setProperty('--rot', randomRotate + 'deg');
      kiss.style.setProperty('--scl', randomScale);
      kiss.style.setProperty('--duration', animDuration + 's');
      kiss.style.setProperty('--delay', animDelay + 's');
      
      bgContainer.appendChild(kiss);
    }

    // ➡️ બટન ક્લિક ફંક્શન
    function goToPage3() {
      // પેજ 3 (જેમાં કાર્ડ ફ્લિપ છે) પર મોકલવા
      window.location.href = "page3.html"; 
    }

    // ✨ ✨ હિંટ માટે ઓટોમેટિક કેક કટ એનિમેશન ✨ ✨
    // આ કોડ વિઝ્યુઅલ ડેશ લાઈન ને કંટ્રોલ કરશે
    const cutHint = document.getElementById('cut-hint');
    
    // પર્ફેક્ટ પલ્સ એનિમેશન માટે એનિમેશન નો સમય સેટ કરો
    cutHint.style.animation = 'cutPulseHint 6s infinite';

    // ✨ કેક કટ કરવાનું એનિમેશન (જેમ કે તમે કાર્ડ ફ્લિપમાં કીધું હતું)
    // આ સુધારો કેકને "કટ" કરવાની ક્રિયા બતાવશે
    const cakeContainer = document.getElementById('cake-container');
    const cakeImage = document.getElementById('cake-image');

    cakeContainer.addEventListener('click', () => {
      // કેક પર "કટ" કરવાની ક્રિયા બતાવો
      cakeImage.src = "https://via.placeholder.com/250x250.png?text=Detailed+Cake+(CUT)&DHRUTI=cake-sliced";
      cakeImage.alt = "Detailed Cake (CUT)";
      
      // હિંટ લાઈન હટાવી દો
      cutHint.style.animation = 'none';
      cutHint.style.opacity = '0';
      
      // ૨ સેકન્ડ પછી પેજ ૩ પર મોકલો
      setTimeout(() => {
          goToPage3();
      }, 2000);
    });

  </script>

</body>
</html>
