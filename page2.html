<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico',cursive;
  color:white;

  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  text-align:center;
  margin-bottom:80px; /* 🔥 GAP FIX */
}

/* animation */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.4s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* 🎂 REALISTIC CAKE */
.cake{
  position:relative;
  width:260px;   /* 🔥 BIGGER SIZE */
  height:220px;
  cursor:pointer;
}

/* bottom layer */
.layer1{
  position:absolute;
  bottom:0;
  width:100%;
  height:90px;
  background: linear-gradient(#ff6f91,#ff3e6c);
  border-radius:25px;
  box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

/* middle layer */
.layer2{
  position:absolute;
  bottom:80px;
  width:85%;
  left:7.5%;
  height:70px;
  background: linear-gradient(#ff9eb5,#ff6f91);
  border-radius:25px;
}

/* cream top */
.top{
  position:absolute;
  bottom:140px;
  width:70%;
  left:15%;
  height:60px;
  background:#fff0f5;
  border-radius:25px;
}

/* cream drip */
.top::after{
  content:"";
  position:absolute;
  bottom:-10px;
  width:100%;
  height:20px;
  background:#fff0f5;
  border-radius:50%;
}

/* 🎂 CUT */
.cut .left{
  transform:translateX(-50px) rotate(-8deg);
}
.cut .right{
  transform:translateX(50px) rotate(8deg);
}

.left, .right{
  position:absolute;
  width:50%;
  height:100%;
  overflow:hidden;
  transition:0.6s;
}

.right{
  right:0;
}

/* 🔥 CANDLES (perfect position) */
.candles{
  position:absolute;
  bottom:180px; /* 🔥 FIX POSITION ABOVE CAKE */
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

/* flame */
.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;

  box-shadow:
    0 0 10px rgba(255,200,0,0.9),
    0 0 20px rgba(255,100,0,0.7),
    0 0 30px rgba(255,50,0,0.5);

  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker{
  0%{ transform: scale(1); }
  100%{ transform: scale(1.2); }
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <!-- candles -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- split cake -->
  <div class="left">
    <div class="top"></div>
    <div class="layer2"></div>
    <div class="layer1"></div>
  </div>

  <div class="right">
    <div class="top"></div>
    <div class="layer2"></div>
    <div class="layer1"></div>
  </div>

</div>

<script>

/* TEXT */
function showText(text){
  let box = document.getElementById("text");
  box.innerHTML = "";

  text.split("").forEach((ch,i)=>{
    let span = document.createElement("span");
    span.className="letter";
    span.style.animationDelay = i*0.08+"s";
    span.innerHTML = ch===" " ? "&nbsp;" : ch;
    box.appendChild(span);
  });
}

/* first */
showText("Make a wish ✨");

/* cut */
function cutCake(){
  let cake = document.querySelector(".cake");
  cake.classList.add("cut");

  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },600);
}

</script>

</body>
</html>
