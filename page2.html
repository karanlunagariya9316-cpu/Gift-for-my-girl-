<!DOCTYPE html>
<html>
<head>
<title>Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  height:100vh;
  overflow:hidden;

  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* text */
.text{
  margin-top:60px;
  font-size:28px;
  font-weight:600;
  letter-spacing:2px;
}

/* cake */
.cake-container{
  position:relative;
  margin-top:60px;
}

/* cake image */
.cake{
  width:260px;
  transition: transform 0.8s ease;
}

/* split effect */
.left{
  transform: translateX(-60px) rotate(-8deg);
}

.right{
  transform: translateX(60px) rotate(8deg);
}

/* knife */
.knife{
  position:absolute;
  top:-120px;
  left:50%;
  transform: translateX(-50%);
  font-size:40px;
  opacity:0;
}

/* knife animation */
@keyframes cut{
  0%{ top:-120px; opacity:1; }
  60%{ top:80px; }
  100%{ top:80px; opacity:0; }
}

.cutting{
  animation: cut 1s ease forwards;
}

/* candles */
.candles{
  position:absolute;
  top:-20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
}

.candle{
  width:6px;
  height:25px;
  background:white;
  border-radius:3px;
  position:relative;
}

.flame{
  width:10px;
  height:10px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-8px;
  left:-2px;
  animation: flicker 0.3s infinite alternate;
  box-shadow:0 0 15px orange;
}

@keyframes flicker{
  from{ transform: scale(1);}
  to{ transform: scale(1.2);}
}

</style>
</head>

<body>

<div class="text" id="mainText">Make a wish ✨</div>

<div class="cake-container">

  <!-- candles -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- knife -->
  <div class="knife" id="knife">🔪</div>

  <!-- cake -->
  <img src="sweet-birthday-cake-with-candles_18591-82310.jpg" class="cake" id="cake">

</div>

<script>

let cutDone = false;

document.body.addEventListener("click", function(){

  if(cutDone) return;

  cutDone = true;

  let knife = document.getElementById("knife");
  let cake = document.getElementById("cake");

  // show knife
  knife.style.opacity = 1;
  knife.classList.add("cutting");

  // after knife cut
  setTimeout(()=>{

    // split cake
    cake.classList.add("left");

    // clone for right side
    let clone = cake.cloneNode(true);
    clone.classList.remove("left");
    clone.classList.add("right");

    cake.parentElement.appendChild(clone);

    // change text
    document.getElementById("mainText").innerText = "Happy Birthday Dhrutii 💖";

  },800);

});

</script>

</body>
</html>
