<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

*{
  -webkit-tap-highlight-color: transparent; /* 🔥 REMOVE SQUARE TAP */
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Pacifico',cursive;
  color:white;

  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT */
.text{
  font-size:32px;
  margin-bottom:80px;
}

/* animation */
.letter{
  display:inline-block;
  opacity:0;
  transform:translateX(40px);
  animation: slide 0.4s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* 🎂 REAL CAKE */
.cake{
  position:relative;
  width:260px;
  cursor:pointer;
}

/* CAKE BODY */
.cake-body{
  width:100%;
  height:140px;
  background: linear-gradient(#ff7fa5,#ff4d7a);
  border-radius:20px;
  position:relative;
  box-shadow:0 20px 30px rgba(0,0,0,0.3);
}

/* CREAM TOP */
.cream{
  position:absolute;
  top:-25px;
  width:100%;
  height:50px;
  background:#fff;
  border-radius:20px;
}

/* DRIP EFFECT */
.cream::after{
  content:"";
  position:absolute;
  width:100%;
  height:20px;
  top:35px;
  background:
    radial-gradient(circle at 20% 0,#fff 20px,transparent 21px),
    radial-gradient(circle at 50% 0,#fff 20px,transparent 21px),
    radial-gradient(circle at 80% 0,#fff 20px,transparent 21px);
}

/* CANDLES */
.candles{
  position:absolute;
  top:-60px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:35px;
  background:white;
  border-radius:4px;
  position:relative;
}

/* FLAME */
.flame{
  width:14px;
  height:20px;
  background: radial-gradient(circle, yellow, orange, red);
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;

  box-shadow:
    0 0 10px rgba(255,200,0,0.9),
    0 0 20px rgba(255,100,0,0.7),
    0 0 30px rgba(255,50,0,0.5);

  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker{
  0%{ transform: scale(1); }
  100%{ transform: scale(1.2); }
}

/* CUT EFFECT */
.cut .cake-body{
  transform: scaleX(0.7);
  opacity:0.8;
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="cake-body">
    <div class="cream"></div>
  </div>

</div>

<script>

/* TEXT */
function showText(text){
  let box = document.getElementById("text");
  box.innerHTML = "";

  text.split("").forEach((ch,i)=>{
    let span = document.createElement("span");
    span.className="letter";
    span.style.animationDelay = i*0.08+"s";
    span.innerHTML = ch===" " ? "&nbsp;" : ch;
    box.appendChild(span);
  });
}

/* first text */
showText("Make a wish ✨");

/* CUT */
function cutCake(){
  document.querySelector(".cake").classList.add("cut");

  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },600);
}

</script>

</body>
</html>
