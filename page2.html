<!DOCTYPE html>  
<html>  
<head>  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">  

<style>  

*{ -webkit-tap-highlight-color: transparent; }  

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:40px;
  font-family:'Pacifico', cursive;
  color:white;
  overflow:hidden;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
}

/* TEXT */  
.text{  
  font-size:32px;  
  margin-bottom:120px;  
  text-align:center;  
}

/* 🔥 CAKE HINT ANIMATION */
@keyframes hintShake{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-5px); }
  50%{ transform:translateX(5px); }
  75%{ transform:translateX(-5px); }
}

.cake.hint{
  animation:hintShake 0.6s infinite;
}

/* CAKE */  
.cake{  
  position:relative;  
  width:260px;  
  height:160px;  
  cursor:pointer;  
}  

.cake-part{  
  width:48%;  
  height:140px;  
  position:absolute;  
  bottom:0;  
  background: linear-gradient(#ff7fa5,#ff4d7a);  
  border-radius:20px;  
}  

.left{ left:0; }  
.right{ right:0; }  

.cream{  
  position:absolute;  
  top:-25px;  
  width:100%;  
  height:50px;  
  background:#fff;  
  border-radius:20px;  
}  

.candles{
  position:absolute;
  top:-40px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{  
  width:10px;  
  height:35px;  
  background:white;  
  border-radius:4px;  
  position:relative;  
}  

.flame{  
  width:14px;  
  height:20px;  
  background: radial-gradient(circle,yellow,orange,red);  
  border-radius:50%;  
  position:absolute;  
  top:-18px;  
  left:-2px;  
}

/* CUT */
.cut .left{ transform:translateX(-30px) rotate(-10deg); }  
.cut .right{ transform:translateX(30px) rotate(10deg); }  

</style>  
</head>  

<body>  

<div id="text" class="text"></div>  

<div id="cake" class="cake" onclick="cutCake()">  
  <div class="candles">  
    <div class="candle"><div class="flame"></div></div>  
    <div class="candle"><div class="flame"></div></div>  
    <div class="candle"><div class="flame"></div></div>  
  </div>  
  <div class="cake-part left"></div>  
  <div class="cake-part right"></div>  
</div>  

<script>  

let cutDone = false;
let allowCut = false;   // 🔥 control

/* TEXT */
function showWishText(){  
  let box = document.getElementById("text");  
  box.innerHTML = "";  

  let text = "Make a wish ✨💫";

  [...text].forEach((ch,i)=>{
    let span = document.createElement("span");
    span.style.opacity="0";
    span.style.animation="fade 0.4s forwards";
    span.style.animationDelay = i*0.05+"s";
    span.textContent=ch;
    box.appendChild(span);
  });

  /* 🔥 AFTER TEXT COMPLETE */
  setTimeout(()=>{
    allowCut = true;

    let cake = document.getElementById("cake");

    /* start hint animation */
    setInterval(()=>{
      cake.classList.add("hint");

      setTimeout(()=>{
        cake.classList.remove("hint");
      },600);

    },2000);

  }, text.length * 50 + 300);

}

showWishText();

/* CUT */
function cutCake(){  

  if(!allowCut) return;   // 🔥 block early click
  if(cutDone) return;

  cutDone=true;

  let cake=document.getElementById("cake");

  cake.classList.remove("hint"); // stop hint
  cake.classList.add("cut");

}

</script>  

</body>  
</html>
