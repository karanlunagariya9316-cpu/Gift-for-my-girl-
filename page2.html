<!DOCTYPE html>
<html>
<head>
<title>Birthday 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  text-align:center;
  color:white;
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* TEXT ANIMATION */
.text{
  margin-top:60px;
  font-size:30px;
  font-weight:600;
  letter-spacing:2px;
}

.text span{
  opacity:0;
  display:inline-block;
  transform:translateX(40px);
  animation:slide 0.4s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* CAKE CONTAINER */
.cake-container{
  position:relative;
  margin-top:80px;
}

/* 🎂 CAKE */
.cake{
  width:220px;
  height:130px;
  margin:auto;
  position:relative;
  border-radius:50% / 35%;
  background: linear-gradient(to bottom, #ff9a9e, #ff4d6d);
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  transition:0.8s;
}

/* top cream */
.cake::before{
  content:"";
  position:absolute;
  top:-30px;
  left:0;
  width:100%;
  height:60px;
  border-radius:50%;
  background: radial-gradient(circle, #fff, #eee);
}

/* middle layer */
.cake::after{
  content:"";
  position:absolute;
  top:50px;
  left:10%;
  width:80%;
  height:25px;
  background:#ff7b8a;
  border-radius:20px;
}

/* CUT HALVES */
.left{
  transform: translateX(-70px) rotate(-10deg);
}

.right{
  transform: translateX(70px) rotate(10deg);
}

/* CANDLES */
.candles{
  position:absolute;
  top:-45px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

.candle{
  width:6px;
  height:30px;
  background:white;
  border-radius:3px;
  position:relative;
}

.flame{
  width:12px;
  height:12px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-10px;
  left:-3px;
  box-shadow:0 0 20px orange;
  animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.3);}
}

/* KNIFE */
.knife{
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  opacity:0;
}

@keyframes cut{
  0%{top:-120px; opacity:1;}
  60%{top:70px;}
  100%{top:70px; opacity:0;}
}

.cutting{
  animation:cut 1s forwards;
}

</style>
</head>

<body>

<div class="text" id="mainText"></div>

<div class="cake-container">

  <div class="candles" id="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <div class="knife" id="knife">🔪</div>

  <div class="cake" id="cake"></div>

</div>

<script>

/* TEXT TYPE ANIMATION */
function animateText(text){
  let container = document.getElementById("mainText");
  container.innerHTML = "";

  text.split("").forEach((char,i)=>{
    let span = document.createElement("span");
    span.innerText = char;
    span.style.animationDelay = i * 0.08 + "s";
    container.appendChild(span);
  });
}

/* initial text */
animateText("Make a wish ✨");

let cutDone = false;

document.body.addEventListener("click", function(){

  if(cutDone) return;
  cutDone = true;

  let knife = document.getElementById("knife");
  let cake = document.getElementById("cake");

  knife.style.opacity = 1;
  knife.classList.add("cutting");

  setTimeout(()=>{

    /* CUT EFFECT */
    cake.classList.add("left");

    let clone = cake.cloneNode(true);
    clone.classList.remove("left");
    clone.classList.add("right");

    cake.parentElement.appendChild(clone);

    /* TEXT CHANGE WITH ANIMATION */
    animateText("Happy Birthday Dhrutii 💖");

  },800);

});

</script>

</body>
</html>
