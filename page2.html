<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 🎂</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: linear-gradient(135deg,#89f7fe,#66a6ff);
  overflow:hidden;
  color:white;
}

/* 🎬 TEXT */
.text{
  font-size:32px;
  font-family: 'Pacifico', cursive;
  margin-bottom:30px;
  text-align:center;
}

/* gradient text */
.gradient{
  background: linear-gradient(45deg,#ff4d88,#ffcc70);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* letter animation */
.letter{
  display:inline-block;
  opacity:0;
  transform: translateX(40px);
  animation: slide 0.4s forwards;
}

@keyframes slide{
  to{
    opacity:1;
    transform: translateX(0);
  }
}

/* 🎂 cake */
.cake{
  position:relative;
  width:220px;
  margin-top:20px;
  cursor:pointer;
}

/* cake halves */
.cake-left, .cake-right{
  width:50%;
  float:left;
  transition:0.6s;
}

.layer{
  height:60px;
  border-radius:20px;
  margin:5px;
}

.layer1{ background:#ffc0cb; }
.layer2{ background:#ffb6c1; }
.layer3{ background:#ffe4e1; }

/* ✂️ cutting effect */
.cut .cake-left{
  transform: translateX(-40px) rotate(-5deg);
}
.cut .cake-right{
  transform: translateX(40px) rotate(5deg);
}

/* 🕯 candles */
.candles{
  position:absolute;
  top:-30px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:10px;
  height:30px;
  background:white;
  position:relative;
}

.flame{
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
  position:absolute;
  top:-10px;
  animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
  from{ transform:scale(1); }
  to{ transform:scale(1.3); }
}

</style>
</head>

<body>

<div id="text" class="text"></div>

<div class="cake" onclick="cutCake()">

  <!-- candles -->
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>

  <!-- cake split -->
  <div class="cake-left">
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
  </div>

  <div class="cake-right">
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
  </div>

</div>

<script>

/* 🎬 TEXT FUNCTION */
function showText(message){
  let container = document.getElementById("text");
  container.innerHTML = "";

  message.split("").forEach((char,i)=>{
    let span = document.createElement("span");
    span.className = "letter gradient";
    span.style.animationDelay = i * 0.08 + "s";
    span.innerHTML = char === " " ? "&nbsp;" : char;
    container.appendChild(span);
  });
}

/* first text */
showText("Make a wish ✨");

/* 🎂 CUT */
function cutCake(){

  let cake = document.querySelector(".cake");
  cake.classList.add("cut");

  setTimeout(()=>{
    showText("Happy Birthday Dhrutii 💖");
  },600);
}

</script>

</body>
</html>
