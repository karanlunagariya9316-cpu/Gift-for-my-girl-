<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ✨ Fixed Page & Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* આપણી મેઈન વેબસાઈટની રોમેન્ટિક થીમ */
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      position: relative;
    }

    /* 🖤 Emotional Dark Border Effect (Vignette) */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Background Kiss Marks (મેચિંગ થીમ માટે) */
    .kiss-bg {
      position: absolute;
      font-size: 120px;
      color: transparent;
      text-shadow: 0 0 10px rgba(255, 154, 158, 0.25); /* થીમ સાથે મેચ થતો હલકો ગ્લો */
      opacity: 0.2; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1px); 
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* 🔠 I MISS US / TOGETHER TEXT */
    .title, .subtitle {
      font-family: 'Anton', sans-serif;
      color: white;
      font-size: 55px;
      margin: 15px 0;
      letter-spacing: 3px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  10px 25px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .subtitle {
      font-size: 46px; /* 🥺 ઇમોજી સાથે થોડું મોટું */
    }

    /* 📸 CREATIVE POLAROID SLIDESHOW AREA (મોટી સાઈઝ) */
    .polaroid-container {
      position: relative;
      width: 100%;
      height: 320px; /* ફોટા માટે વધારે જગ્યા */
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 15px 0;
    }

    /* મોટી પોલારોઇડ ની ડિઝાઇન */
    .polaroid {
      position: absolute; 
      background: #fdfdfd;
      padding: 10px 10px 35px 10px; /* મોટી સાઈઝ માટે પેડિંગ વધાર્યું */
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      width: 135px; /* સાઈઝ વધારી */
      border: 1px solid #ddd;
      transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1); 
    }

    .polaroid img {
      width: 100%;
      height: 135px; /* સાઈઝ વધારી */
      object-fit: cover;
      filter: contrast(1.1) brightness(0.9); 
      border: 1px solid #ccc;
    }

    /* 🎯 4 POSITION CLASSES FOR ANIMATION */
    .pos-center {
      transform: translateX(0) scale(1.25) rotate(2deg);
      z-index: 3;
      opacity: 1;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9);
    }

    .pos-right {
      transform: translateX(110px) scale(0.9) rotate(15deg);
      z-index: 2;
      opacity: 1;
    }

    .pos-left {
      transform: translateX(-110px) scale(0.9) rotate(-12deg);
      z-index: 2;
      opacity: 1;
    }

    .pos-hidden {
      transform: translateX(0) scale(0.4) rotate(0deg);
      z-index: 1;
      opacity: 0; 
    }

    /* ⏭️ RESTART BUTTON (શરૂઆતમાં સંતાડેલું હશે) */
    .next-btn {
      display: none; /* ટાઈમર પૂરું થાય પછી જ દેખાશે */
      position: absolute;
      bottom: 35px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      padding: 12px 35px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .next-btn:active {
      transform: scale(0.92);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

  </style>
</head>
<body>

  <div id="bg-container"></div>

  <div class="content">
    <div class="title">I MISS US</div>
    
    <div class="polaroid-container" id="photo-slider">
      <div class="polaroid"><img src="IMG-20260401-WA0014.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0021.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0038.jpg"></div>
      <div class="polaroid"><img src="IMG_20260112_175825_524~2.jpg"></div>
      <div class="polaroid"><img src="IMG_20260112_175838_981~2.jpg"></div>
      <div class="polaroid"><img src="Snapchat-754572241~2.jpg"></div>
    </div>

    <div class="subtitle">TOGETHER 🥺</div>
  </div>

  <button class="next-btn" id="restartBtn" onclick="goToPage1()">Restart Magic 🔄</button>

  <script>
    // 💋 બેકગ્રાઉન્ડ લિપસ્ટિક માર્ક્સ
    let bgContainer = document.getElementById("bg-container");
    for (let i = 0; i < 15; i++) {
      let kiss = document.createElement("div");
      kiss.className = "kiss-bg";
      kiss.innerText = "💋";
      let randomX = Math.floor(Math.random() * 100);
      let randomY = Math.floor(Math.random() * 100);
      let randomRotate = Math.floor(Math.random() * 360);
      let randomScale = (Math.random() * 0.8) + 0.6; 
      kiss.style.left = randomX + "vw";
      kiss.style.top = randomY + "vh";
      kiss.style.transform = `rotate(${randomRotate}deg) scale(${randomScale})`;
      bgContainer.appendChild(kiss);
    }

    // ➡️ બટન ક્લિક ફંક્શન
    function goToPage1() {
      window.location.href = "index.html"; 
    }

    // 📸 ✨ CAROUSEL ANIMATION LOGIC ✨ 📸
    const polaroids = document.querySelectorAll('.polaroid');
    let positions = ['pos-center', 'pos-right', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-left'];

    function applyPositions() {
      polaroids.forEach((el, i) => {
        el.className = 'polaroid ' + positions[i];
      });
    }

    applyPositions();

    // ✨ 3 રાઉન્ડ (18 શિફ્ટ) નું લોજિક
    let totalShifts = 0;
    const maxShifts = 18; // 6 ફોટા x 3 રાઉન્ડ = 18 વખત ફરશે

    function rotatePhotos() {
      // જો 18 વખત ફરી જાય, તો એનિમેશન અટકાવીને બટન બતાવવું
      if (totalShifts >= maxShifts) {
        clearInterval(rotationInterval);
        document.getElementById("restartBtn").style.display = "block";
        return;
      }

      let first = positions.shift(); 
      positions.push(first); 
      applyPositions();
      
      totalShifts++;
    }

    // દર 3000 મિલીસેકન્ડ (3 સેકન્ડ) એ જાતે જ ફરશે
    let rotationInterval = setInterval(rotatePhotos, 3000);

  </script>

</body>
</html>
