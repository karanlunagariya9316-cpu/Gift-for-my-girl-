<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #f0ebeb; /* આછો ગ્રે/વ્હાઈટ કલર */
      overflow: hidden;
      position: relative;
    }

    /* 🖤 Emotional Dark Border Effect (Vignette) */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Background Kiss Marks (Lipstick Stains) */
    .kiss-bg {
      position: absolute;
      font-size: 120px;
      color: transparent;
      text-shadow: 0 0 2px #9e0b22; /* ઘાટ્ટો લાલ/મરૂન કલર */
      opacity: 0.15; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1px); /* થોડું રિયલ લાગે એના માટે */
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* 🔠 I MISS US / TOGETHER TEXT */
    .title, .subtitle {
      font-family: 'Anton', sans-serif;
      color: white;
      font-size: 48px;
      margin: 20px 0;
      letter-spacing: 2px;
      /* બ્લેક બોર્ડર અને શેડો */
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  8px 20px rgba(0,0,0,0.7);
    }

    .subtitle {
      font-size: 40px;
    }

    /* 📸 POLAROID FRAME DESIGN */
    .polaroid-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
      animation: breath 4s infinite alternate ease-in-out; /* ધીમું ઇમોશનલ એનિમેશન */
    }

    @keyframes breath {
      0% { transform: scale(1); }
      100% { transform: scale(1.02); }
    }

    .polaroid {
      background: #fdfdfd;
      padding: 6px 6px 25px 6px; /* નીચેની બાજુ વધુ જગ્યા (પોલારોઇડ લુક) */
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      width: 105px; /* મોબાઈલ સાઈઝ માટે */
      border: 1px solid #ddd;
    }

    .polaroid img {
      width: 100%;
      height: 105px;
      object-fit: cover;
      /* ઇમોશનલ ફીલ માટે ફોટાને થોડો ડાર્ક/કોન્ટ્રાસ્ટ કર્યો છે */
      filter: contrast(1.1) brightness(0.9); 
      border: 1px solid #ccc;
    }

    /* 📐 3 Photos Alignment (Like the screenshot) */
    .p1 {
      transform: rotate(-12deg) translateY(15px);
      z-index: 1;
    }
    .p2 {
      transform: rotate(3deg) scale(1.15);
      z-index: 3;
      margin: 0 -22px; /* ફોટા એકબીજા પર ચડેલા દેખાય એના માટે */
      box-shadow: 0 15px 30px rgba(0,0,0,0.8);
    }
    .p3 {
      transform: rotate(15deg) translateY(12px);
      z-index: 2;
    }

    /* ⏭️ NEXT BUTTON (Black Capsule) */
    .next-btn {
      position: absolute;
      bottom: 30px;
      right: 25px;
      background: #111;
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      padding: 8px 25px;
      border-radius: 25px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .next-btn:active {
      transform: scale(0.95);
    }

  </style>
</head>
<body>

  <div id="bg-container"></div>

  <div class="content">
    <div class="title">I MISS US</div>
    
    <div class="polaroid-container">
      <div class="polaroid p1"><img src="IMG-20260401-WA0014.jpg"></div>
      <div class="polaroid p2"><img src="IMG-20260401-WA0021.jpg"></div>
      <div class="polaroid p3"><img src="IMG-20260401-WA0038.jpg"></div>
    </div>

    <div class="subtitle">TOGETHER</div>
  </div>

  <button class="next-btn" onclick="goToPage1()">NEXT</button>

  <script>
    // 💋 બેકગ્રાઉન્ડમાં લિપસ્ટિક/કિસ ના ડાઘ બનાવવા માટેનું લોજિક
    let bgContainer = document.getElementById("bg-container");
    
    for (let i = 0; i < 15; i++) {
      let kiss = document.createElement("div");
      kiss.className = "kiss-bg";
      kiss.innerText = "💋";
      
      // રેન્ડમ પોઝિશન અને રોટેશન
      let randomX = Math.floor(Math.random() * 100);
      let randomY = Math.floor(Math.random() * 100);
      let randomRotate = Math.floor(Math.random() * 360);
      let randomScale = (Math.random() * 0.8) + 0.5; // સાઈઝ નાની-મોટી
      
      kiss.style.left = randomX + "vw";
      kiss.style.top = randomY + "vh";
      kiss.style.transform = `rotate(${randomRotate}deg) scale(${randomScale})`;
      
      bgContainer.appendChild(kiss);
    }

    // ➡️ બટન ક્લિક ફંક્શન
    function goToPage1() {
      window.location.href = "index.html"; 
    }
  </script>

</body>
</html>
