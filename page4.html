<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <script>
    const EXPIRATION_TIME = 24 * 60 * 60 * 1000; 
    let startTime = localStorage.getItem('siteOpenTime');

    if (!startTime) {
      localStorage.setItem('siteOpenTime', new Date().getTime());
    } else {
      let currentTime = new Date().getTime();
      if (currentTime - startTime > EXPIRATION_TIME) {
        document.addEventListener("DOMContentLoaded", function() {
            document.body.innerHTML = `
              <div style="display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; background-color:#111; color:#fff; font-family:'Poppins', sans-serif; text-align:center; padding:20px; box-sizing:border-box;">
                <div>
                  <h2 style="color:#ff477e; margin-bottom:10px;">Link Expired 🚫</h2>
                  <p style="font-size:16px; color:#ccc;">આ સરપ્રાઈઝ લિંક નો સમય પૂરો થઈ ગયો છે.</p>
                </div>
              </div>
            `;
            window.stop();
        });
      }
    }
  </script>
  <style>
    /* ✨ Fixed Page & Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      position: relative;
    }

    /* 🖤 Emotional Dark Border Effect */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* ✨ Falling Stars Animation */
    .sparkle-bg {
      position: absolute;
      top: -15vh; 
      font-size: 75px; 
      opacity: 0; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1px); 
      animation: fallDown var(--duration) linear infinite var(--delay);
    }

    @keyframes fallDown {
      0% { opacity: 0; transform: translateY(0) rotate(var(--rot)) scale(var(--scl)); }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(130vh) rotate(calc(var(--rot) + 180deg)) scale(var(--scl)); }
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      transform: translateY(-6vh); 
    }

    /* 🔠 I MISS US / TOGETHER TEXT */
    .title, .subtitle {
      font-family: 'Anton', sans-serif;
      color: white;
      font-size: 55px;
      margin: 10px 0;
      letter-spacing: 3px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  10px 25px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .subtitle {
      font-size: 46px; 
      margin-bottom: 5px; 
    }

    /* 📸 POLAROID SLIDESHOW AREA */
    .polaroid-container {
      position: relative;
      width: 100%;
      height: 270px; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }

    .polaroid {
      position: absolute; 
      background: #fdfdfd;
      padding: 10px 10px 30px 10px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      width: 155px; 
      border: 1px solid #ddd;
      transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1); 
    }

    .polaroid img {
      width: 100%;
      height: 155px; 
      object-fit: cover;
      filter: contrast(1.1) brightness(0.9); 
      border: 1px solid #ccc;
    }

    /* 🎯 POSITION CLASSES FOR ANIMATION */
    .pos-center { transform: translateX(0) scale(1.3) rotate(2deg); z-index: 3; opacity: 1; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
    .pos-right { transform: translateX(120px) scale(0.9) rotate(15deg); z-index: 2; opacity: 1; }
    .pos-left { transform: translateX(-120px) scale(0.9) rotate(-12deg); z-index: 2; opacity: 1; }
    .pos-hidden { transform: translateX(0) scale(0.4) rotate(0deg); z-index: 1; opacity: 0; }

    /* ⏭️ NEXT BUTTON (UPDATED ANIMATION) */
    .next-btn {
      display: none; 
      margin-top: 15px; 
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      padding: 12px 35px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      
      /* ✨ ચોરસ બોક્સ હટાવવા માટે ✨ */
      -webkit-tap-highlight-color: transparent;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    /* ✨ યુનિક ક્લિક એનિમેશન (Ripple + Glow) ✨ */
    .next-btn::after {
      content: "";
      background: rgba(255, 255, 255, 0.4);
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      margin-top: -60px;
      margin-left: -60px;
      border-radius: 50%;
      opacity: 0;
      transform: scale(0);
      transition: transform 0.4s ease-out, opacity 0.4s ease-out;
    }

    .next-btn:active { 
      transform: scale(0.92); 
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
    }

    .next-btn:active::after {
      transform: scale(2.5);
      opacity: 1;
      transition: 0s;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

  </style>
</head>
<body>

  <div id="bg-container"></div>

  <audio id="bgMusic" src="songP4.mp3" preload="auto"></audio>

  <div class="content">
    <div class="title">I MISS US</div>
    
    <div class="polaroid-container" id="photo-slider">
      <div class="polaroid"><img src="IMG-20260401-WA0014.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0021.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0038.jpg"></div>
      <div class="polaroid"><img src="IMG_20260112_175825_524~2.jpg"></div>
      <div class="polaroid"><img src="IMG_20260112_175838_981~2.jpg"></div>
      <div class="polaroid"><img src="Snapchat-754572241~2.jpg"></div>
    </div>

    <div class="subtitle">TOGETHER 🥺</div>

    <button class="next-btn" id="nextBtn" onclick="goToPage5()">go Next ➡️</button>
  </div>

  <script>
    let bgMusic = document.getElementById("bgMusic");
    bgMusic.volume = 1; 
    bgMusic.currentTime = 0; 
    
    let isMusicStarted = false; 

    async function playMusicFatafat() {
      try {
        await bgMusic.play();
        document.removeEventListener('click', playOnTouch);
        document.removeEventListener('touchstart', playOnTouch);
        document.removeEventListener('scroll', playOnTouch);
      } catch (error) {
        console.log("Autoplay blocked. Waiting for user touch.");
      }
    }

    function playOnTouch() {
        if (isMusicStarted) { 
            playMusicFatafat();
        }
    }
    
    document.addEventListener('click', playOnTouch);
    document.addEventListener('touchstart', playOnTouch);
    document.addEventListener('scroll', playOnTouch);

    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        bgMusic.pause();
      } else {
        if(isMusicStarted && bgMusic.currentTime > 0 && !bgMusic.ended) {
          playMusicFatafat(); 
        }
      }
    });

    let bgContainer = document.getElementById("bg-container");
    const sparkleEmojis = ['💫', '✨'];

    for (let i = 0; i < 15; i++) {
      let sparkle = document.createElement("div");
      sparkle.className = "sparkle-bg";
      sparkle.innerText = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
      
      let randomX = Math.random() * 100; 
      let randomRotate = Math.floor(Math.random() * 360);
      let randomScale = (Math.random() * 0.4) + 0.6; 
      
      let animDuration = (Math.random() * 5) + 6; 
      let animDelay = Math.random() * 5; 
      
      sparkle.style.left = randomX + "vw";
      sparkle.style.setProperty('--rot', randomRotate + 'deg');
      sparkle.style.setProperty('--scl', randomScale);
      sparkle.style.setProperty('--duration', animDuration + 's');
      sparkle.style.setProperty('--delay', animDelay + 's');
      
      bgContainer.appendChild(sparkle);
    }

    function goToPage5() { 
      // બટન એનિમેશન પૂરું થવાનો ટાઈમ આપવા માટે ૧૦૦ મિલીસેકન્ડનો ડિલે 
      setTimeout(() => {
        window.location.href = "page5.html"; 
      }, 100);
    }

    const polaroids = document.querySelectorAll('.polaroid');
    let positions = ['pos-center', 'pos-right', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-left'];
    
    function applyPositions() { 
        polaroids.forEach((el, i) => { el.className = 'polaroid ' + positions[i]; }); 
    }
    
    applyPositions();
    
    function rotatePhotos() { 
      let first = positions.shift(); 
      positions.push(first); 
      applyPositions(); 

      if (!isMusicStarted) {
          isMusicStarted = true;
          playMusicFatafat();
      }
    }
    
    setInterval(rotatePhotos, 3000);

    // ગીત બરાબર 33 સેકન્ડ વાગી જાય પછી જ બટન આવશે
    bgMusic.ontimeupdate = function() {
      if (bgMusic.currentTime >= 33) {
        document.getElementById("nextBtn").style.display = "block";
        bgMusic.ontimeupdate = null; 
      }
    };

  </script>

</body>
</html>
