<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 40%, #c084fc 100%);
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .container {
      padding-top: 5vh;
    }

    .header-box {
      width: 88%;
      margin: auto;
      padding: 25px 15px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.3s ease;
    }

    .header-box h1 {
      font-size: 28px;
      margin: 0;
      font-weight: 600;
      min-height: 42px; 
    }

    .header-box h2 {
      margin-top: 10px;
      font-size: 22px;
    }

    .header-box p {
      margin-top: 8px;
      font-size: 15px;
    }

    .quote-container {
      margin-top: 25px;
    }

    .quote {
      display: inline-block;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .counter {
      font-size: 14px;
      margin-top: 5px;
      background: rgba(255, 255, 255, 0.2);
      display: inline-block;
      padding: 4px 12px;
      border-radius: 15px;
    }

    .slideshow {
      margin-top: 25px;
      position: relative;
    }

    .slide {
      display: none;
      width: 82%;
      max-width: 320px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      border: 3px solid rgba(255, 255, 255, 0.5);
      animation: fadeScale 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .arrow {
      position: absolute;
      top: 50%;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      padding: 10px;
    }

    .left { left: 10px; }
    .right { right: 10px; }

    .button {
      display: none;
      margin-top: 30px;
      padding: 14px 35px;
      border-radius: 30px;
      background: white;
      color: #a8325f;
    }

    .heart {
      position: fixed;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header-box">
    <h1 id="text"></h1>
    <h2>Dhrutuu.. My Beautiful Girl ✨</h2>
    <p>Every picture tells a story of our love 🫂💕</p>
  </div>

  <div class="quote-container">
    <div id="quoteText" class="quote"></div>
  </div>

  <div id="counter" class="counter"></div>

  <div class="slideshow">
    <span id="leftArrow" class="arrow left" onclick="prevSlide()">&#10094;</span>
    <span id="rightArrow" class="arrow right" onclick="nextSlide()">&#10095;</span>

    <img class="slide" src="https://6fd54a10dbcb7173e77320e2e5bf4f60.jpg">
    <img class="slide" src="https://7e6091b9b3a45b0ab5bfead9d3b8be17.jpg">
    <img class="slide" src="https://92bd194da8d817438cbfe7ae3954b6f1.jpg">
    <img class="slide" src="https://627f083b4a4ad03654f45135230ed0b9.jpg">
  </div>

  <button id="nextBtn" class="button" onclick="goNext()">Replay Magic 🔄</button>

</div>

<script>
  let text = "To My Everything... 💖";
  let i = 0;
  function typing(){
    if(i < text.length){
      document.getElementById("text").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 100);
    }
  }
  setTimeout(typing, 500);

  let slideIndex = 0;
  let slides = document.getElementsByClassName("slide");
  let quoteBox = document.getElementById("quoteText");

  let quotes = [
    "You are the reason behind my smile 💝",
    "Forever is not enough with you ♾️✨",
    "You are my safe place 🤗😚",
    "I fall for you every single day 💋💗"
  ];

  function showSlide(n) {
    if (n >= slides.length) slideIndex = 0;
    if (n < 0) slideIndex = slides.length - 1;

    for (let j = 0; j < slides.length; j++) {
      slides[j].style.display = "none";
    }

    slides[slideIndex].style.display = "block";
    quoteBox.innerText = quotes[slideIndex];
    document.getElementById("counter").innerText = `Memory ${slideIndex + 1} of ${slides.length}`;

    if (slideIndex === slides.length - 1) {
      document.getElementById("nextBtn").style.display = "block";
    } else {
      document.getElementById("nextBtn").style.display = "none";
    }
  }

  function nextSlide(){ slideIndex++; showSlide(slideIndex); }
  function prevSlide(){ slideIndex--; showSlide(slideIndex); }

  showSlide(slideIndex);

  function goNext(){
    window.location.href = "index.html"; 
  }

  setTimeout(() => {
    setInterval(() => {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.style.left = Math.random() * 100 + "vw";
      heart.innerHTML = "💖";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 400);
  }, 1000);
</script>

</body>
</html>
