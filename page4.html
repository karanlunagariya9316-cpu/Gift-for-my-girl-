<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ✨ Fixed Page & Main Theme Background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
      position: relative;
    }

    /* 🖤 Emotional Dark Border Effect */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.65);
      pointer-events: none;
      z-index: 5;
    }

    /* 💋 Continuous Kiss Animation */
    .kiss-bg {
      position: absolute;
      font-size: 100px;
      color: #e60000; 
      opacity: 0; 
      z-index: 0;
      pointer-events: none;
      filter: blur(1px); 
      animation: kissBreath var(--duration) infinite var(--delay) ease-in-out;
    }

    @keyframes kissBreath {
      0% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
      50% { opacity: 0.7; transform: rotate(var(--rot)) scale(var(--scl)); }
      100% { opacity: 0; transform: rotate(var(--rot)) scale(0.6); }
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      transform: translateY(-6vh); 
    }

    /* 🔠 I MISS US / TOGETHER TEXT */
    .title, .subtitle {
      font-family: 'Anton', sans-serif;
      color: white;
      font-size: 55px;
      margin: 10px 0;
      letter-spacing: 3px;
      text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  10px 25px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .subtitle {
      font-size: 46px; 
      margin-bottom: 5px; 
    }

    /* 📸 ✨ POLAROID SLIDESHOW AREA (Updated for 10 distinct photos) ✨ 📸 */
    .polaroid-container {
      position: relative;
      width: 100%;
      height: 270px; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
    }

    /* પોલારોઇડ ની ડીઝાઇન */
    .polaroid {
      position: absolute; 
      background: #fdfdfd;
      padding: 10px 10px 30px 10px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      width: 155px; 
      border: 1px solid #ddd;
      transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1); 
    }

    .polaroid img {
      width: 100%;
      height: 155px; 
      object-fit: cover; /* ✨ "હોરીઝોન્ટલ" યાદને સેન્ટર ફીટ કરવા માટેનું મેજિક ✨ */
      filter: contrast(1.1) brightness(0.9); 
      border: 1px solid #ccc;
    }

    /* 🎯 ✨ 4 POSITION CLASSES FOR 10-PHOTO ANIMATION (No Jarring Jump) ✨ 🎯 */
    /* ધીમેથી ડાન્સ કરીને વચ્ચે આવશે */
    .pos-center {
      transform: translateX(0) scale(1.3) rotate(2deg); 
      z-index: 3;
      opacity: 1;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9);
    }

    /* ધીમેથી જમણી બાજુ જતો રહેશે */
    .pos-right {
      transform: translateX(120px) scale(0.9) rotate(15deg); 
      z-index: 2;
      opacity: 1;
    }

    /* ધીમેથી ડાબી બાજુ જતો રહેશે */
    .pos-left {
      transform: translateX(-120px) scale(0.9) rotate(-12deg); 
      z-index: 2;
      opacity: 1;
    }

    /* પાછળ સંતાઈ જશે */
    .pos-hidden {
      transform: translateX(0) scale(0.4) rotate(0deg);
      z-index: 1;
      opacity: 0; 
    }

    /* ⏭️ RESTART BUTTON (૧૮.૫ સેકન્ડ પછી) */
    .next-btn {
      display: none; 
      margin-top: 15px; 
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      color: white;
      border: 2px solid rgba(255,255,255,0.6);
      padding: 12px 35px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .next-btn:active {
      transform: scale(0.92);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

  </style>
</head>
<body>

  <div id="bg-container"></div>

  <audio id="bgMusic" src="songP4.mp3" loop></audio>

  <div class="content">
    <div class="title">I MISS US</div>
    
    <div class="polaroid-container" id="photo-slider">
      <div class="polaroid"><img src="IMG-20260129-WA0033~2.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0014.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0021.jpg"></div>
      
      <div class="polaroid"><img src="Snapchat-754572241~2.jpg"></div>
      
      <div class="polaroid"><img src="IMG-20260401-WA0023.jpg"></div>
      <div class="polaroid"><img src="IMG-20260401-WA0038.jpg"></div>
      
      <div class="polaroid"><img src="Snapchat-754572241~2.jpg"></div>
      
      <div class="polaroid"><img src="IMG_20260112_175825_524~2.jpg"></div>
      <div class="polaroid"><img src="IMG_20260112_175838_981~2.jpg"></div>
      <div class="polaroid"><img src="other_distinct_photo.jpg"></div> </div>

    <div class="subtitle">TOGETHER 🥺</div>

    <button class="next-btn" id="restartBtn" onclick="goToPage1()">Restart Magic 🔄</button>
  </div>

  <script>
    // 🎵 SMOOTH AUDIO FADE-IN
    window.addEventListener('load', () => {
      let bgMusic = document.getElementById("bgMusic");
      bgMusic.volume = 0; 

      function smoothFadeIn() {
        let fadeAudio = setInterval(function () {
          if (bgMusic.volume < 0.9) {
            bgMusic.volume += 0.05; 
          } else {
            bgMusic.volume = 1;
            clearInterval(fadeAudio);
          }
        }, 200);
      }

      let playPromise = bgMusic.play();
      if (playPromise !== undefined) {
        playPromise.then(_ => {
          smoothFadeIn(); 
        }).catch(error => {
          document.body.addEventListener('click', function playOnInteract() {
            bgMusic.play();
            smoothFadeIn();
            document.body.removeEventListener('click', playOnInteract);
          }, { once: true });
        });
      }
    });

    // 💋 બેકગ્રાઉન્ડ લિપસ્ટિક માર્ક્સ
    let bgContainer = document.getElementById("bg-container");
    const kissZones = [
      {x: 10, y: 10}, {x: 80, y: 10}, 
      {x: 45, y: 8},                  
      {x: 10, y: 35}, {x: 80, y: 35}, 
      {x: 10, y: 70}, {x: 80, y: 70}, 
      {x: 45, y: 80}                  
    ];

    kissZones.forEach((zone) => {
      let kiss = document.createElement("div");
      kiss.className = "kiss-bg";
      kiss.innerText = "💋";
      
      let randomX = zone.x + (Math.random() * 6 - 3); 
      let randomY = zone.y + (Math.random() * 6 - 3); 
      let randomRotate = Math.floor(Math.random() * 360);
      let randomScale = (Math.random() * 0.5) + 0.7; 
      let animDuration = (Math.random() * 1.5) + 2; 
      let animDelay = Math.random() * 2; 
      
      kiss.style.left = randomX + "vw";
      kiss.style.top = randomY + "vh";
      kiss.style.setProperty('--rot', randomRotate + 'deg');
      kiss.style.setProperty('--scl', randomScale);
      kiss.style.setProperty('--duration', animDuration + 's');
      kiss.style.setProperty('--delay', animDelay + 's');
      
      bgContainer.appendChild(kiss);
    });

    // ➡️ બટન ક્લિક ફંક્શન
    function goToPage1() {
      window.location.href = "index.html"; 
    }

    // 📸 ✨ CAROUSEL ANIMATION LOGIC (For 10 items) ✨ 📸
    const polaroids = document.querySelectorAll('.polaroid');
    // ✨ Updated positions array for 10 photos: [0] center, [1] right, [2-8] hidden, [9] left
    let positions = ['pos-center', 'pos-right', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-hidden', 'pos-left'];

    function applyPositions() {
      polaroids.forEach((el, i) => {
        el.className = 'polaroid ' + positions[i];
      });
    }

    applyPositions();

    function rotatePhotos() {
      let first = positions.shift(); 
      positions.push(first); 
      applyPositions();
    }

    // દર 3 સેકન્ડે ફરશે
    setInterval(rotatePhotos, 3000);

    // ✨ 18.5 સેકન્ડ પછી જ બટન દેખાડવાનું લોજિક
    setTimeout(() => {
      document.getElementById("restartBtn").style.display = "block";
    }, 18500); 

  </script>

</body>
</html>
