<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Poppins', sans-serif;
  overflow-x: hidden; 
}

/* 🎁 CARD */
.card{
  width:300px;
  height:380px;
  perspective:1200px;
  margin: 0 auto; 
  cursor: pointer;
}

/* 🔄 INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s ease-in-out;
  transform-origin:center center; 
}

/* 🔄 FLIP */
.card.flip .card-inner{
  transform: rotateY(180deg);
}

/* 🎴 FRONT & BACK */
.card-front, .card-back{
  position:absolute;
  top:0;  
  left:0; 
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden; 
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box; 
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* FRONT */
.card-front{
  background:linear-gradient(135deg,#ff4d7a,#ff7fa5);
  color:white;
  font-size:22px;
}

/* ✨ NEW: PHYSICAL RIBBON EFFECT */
.card-front::before{
  content:"";
  position:absolute;
  width:35px; /* રીબિનની પહોળાઈ */
  height:100%;
  background: linear-gradient(135deg, #fad0c4, #ffd1dc); /* સુંદર લાઈટ રીબિન કલર */
  top:0;
  left:50%;
  transform:translateX(-50%);
  z-index: 1; /* ટેક્સ્ટની નીચે */
  transition: transform 0.4s ease-out, opacity 0.4s ease-out; /* એનિમેશન માટે transition */
  border-radius: 20px; /* કાર્ડની સાથે ગોળ કરવા માટે */
}

/* ✨ NEW: RIBBON "CHUTE" (BREAKING/UNWINDING) ANIMATION */
.card.ribbon-chute .card-front::before {
  transform: translate(-50%, -20px) scale(0.1) rotate(45deg); /* એનિમેટેડ બર્સ્ટ/ટેયર ઇફેક્ટ */
  opacity: 0;
}

/* FRONT TEXT (ON RIBBON) */
.card-front .front-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2; /* રીબિનની ઉપર */
  color: white; /* Contrast */
  text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  width: 100%; /* For centering in text-align */
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:15px;
  line-height:1.4;
  padding:18px;
  display:flex;
  flex-direction:column; 
}

/* MESSAGE AREA */
#message{
  text-align:center;
  width: 100%;
}

/* ✨ MESSAGE LINE ANIMATION */
.msg-line {
  opacity: 0;
  transform: translateX(-20px);
  animation: slideInLeft 0.5s ease-out forwards;
}

@keyframes slideInLeft {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ✨ GLOW */
.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 SONG AREA */
.song-area{
  display:flex;
  justify-content:center; 
  align-items:center;
  gap:20px;
  width:100%;
  margin-top:40px; 
}

.song-box{
  width:120px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  backdrop-filter:blur(5px);
}

/* 🎉 CONFETTI PARTY BLAST STYLES (KISS EFFECT) */
.confetti {
  position: fixed; 
  font-size: 24px;
  pointer-events: none;
  animation: confettiBlast 1.5s ease-out forwards;
  z-index: 100; 
}

@keyframes confettiBlast {
  0% {
    transform: translate(0, 0) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(1.5);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">

    <div class="card-front">
      <div class="front-text">Tap to Open Surprise</div>
    </div>

    <div class="card-back">
      <div id="message"></div>
    </div>

  </div>
</div>

<div class="song-area">
  <div class="song-box"></div>
  <div class="song-box"></div>
</div>

<script>
/* ❤️ RAW MESSAGE */
let rawText = `You are the best part of my life and I want you in my life forever.
..♾️🤗

And.

Thank you so much for being in my life and for making my life so beautiful..🫶❤️‍🩹

I love you so much Bacha..💋❤️
Forever with you..👀💫

And yes, thanks for giving me this sweet 🍭 like your sweetness..🤭`;

let lines = rawText.split('\n');

/* 🔄 FLIP, CHUTE RIBBON, AND ANIMATE */
function flipCard(card){
  
  // ✨ NEW: Chute the ribbon first with an animation
  card.classList.add("ribbon-chute");

  // ✨ NEW: Delay the rest of the logic to match the ribbon break animation
  setTimeout(() => {
    card.classList.toggle("flip");
    
    let msgDiv = document.getElementById("message");
    msgDiv.innerHTML = ""; 

    if(card.classList.contains("flip")){
      // Text animation start (0.4s into flip, total delay is perfect)
      setTimeout(() => {
        lines.forEach((line, i) => {
          let div = document.createElement("div");
          div.className = "msg-line";
          
          if(line.trim() === ""){
            div.style.height = "12px"; 
          } else {
            div.innerText = line.trim();
          }
          
          div.style.animationDelay = (i * 0.25) + "s"; 
          msgDiv.appendChild(div);
        });
      }, 400); 

      // 🎉 Call Confetti Blast function
      confettiBlast(card);
    }
  }, 400); // ૪૦૦ મિલીસેકન્ડ રીબિન એનિમેશનનો સમય
}

/* 🎉 Confetti Blast Function (KISS EFFECT) */
function confettiBlast(cardEl) {
  let rect = cardEl.getBoundingClientRect();
  let centerX = rect.left + rect.width / 2;
  let centerY = rect.top + rect.height / 2;

  // 🎉 UPDATED: Confetti types using kiss emojis like in screenshot
  let confettiItems = ["💋", "💏", "👩‍❤️‍💋‍👩", "👩‍❤️‍💋‍👨", "💞", "✨"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];

    let a = Math.random() * 2 * Math.PI; // random angle
    let d = Math.random() * 400 + 100; // random distance

    c.style.left = centerX + "px";
    c.style.top = centerY + "px";
    c.style.setProperty('--x', Math.cos(a) * d + "px");
    c.style.setProperty('--y', Math.sin(a) * d + "px");

    document.body.appendChild(c);
    
    // Clean up particles
    setTimeout(() => c.remove(), 1500);
  }
}

</script>

</body>
</html>
