<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:80px;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Pacifico', cursive;
}

/* 🎁 CARD */
.card{
  width:330px;
  min-height:320px;   /* 🔥 auto grow */
  perspective:1200px;
  margin-bottom:40px;
}

/* 🔄 INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.9s cubic-bezier(.68,-0.55,.27,1.55);
  transform-origin:center center;   /* 🔥 CENTER FLIP FIX */
}

/* 🔥 FLIP */
.card.flip .card-inner{
  transform: rotateY(180deg);
}

/* 🎴 FRONT & BACK */
.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:22px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:22px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

/* FRONT */
.card-front{
  background:linear-gradient(135deg,#ff4d7a,#ff7fa5);
  color:white;
  font-size:22px;
}

.card-front::before{
  content:"🎀";
  font-size:45px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);

  font-family:'Poppins', sans-serif;
  font-size:16px;          /* 🔥 thodu small */
  line-height:1.3;         /* 🔥 gap ghataavyo */
  letter-spacing:0.2px;

  padding:16px;            /* 🔥 compact */
  overflow-y:auto;
}

/* MESSAGE */
#message{
  text-align:center;
  white-space:pre-line;
}

/* 🚫 SCROLLBAR HIDE */
.card-back::-webkit-scrollbar{
  display:none;
}

/* ✨ GLOW */
.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 SPACE */
.song-area{
  display:flex;
  gap:20px;
}

.song-box{
  width:120px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  backdrop-filter:blur(5px);
}

</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">

    <div class="card-front">
      Tap to Open 🎁
    </div>

    <div class="card-back">
      <div id="message"></div>
    </div>

  </div>
</div>

<div class="song-area">
  <div class="song-box"></div>
  <div class="song-box"></div>
</div>

<script>

/* ❤️ FINAL MESSAGE (NO NEED TO TOUCH CARD SIZE EVER AGAIN) */
let text = `You are the best part of my life and I want you in my life forever.
..♾️🤗

And.

Thank you so much for being in my life and for making my life so beautiful..🫶❤️‍🩹

I love you so much Bacha..💋❤️
Forever with you..👀💫

And yes, thanks for giving me this sweet 🍭 like your sweetness..🤭`;

/* 🔄 FLIP */
function flipCard(card){
  card.classList.toggle("flip");

  if(card.classList.contains("flip")){
    showText();
  }
}

/* ✍️ DIRECT SHOW (NO BREAK ISSUE) */
function showText(){
  document.getElementById("message").innerText = text;
}

</script>

</body>
</html>
