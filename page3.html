<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Poppins', sans-serif;
}

/* 🎁 CARD */
.card{
  width:300px;
  height:380px;
  perspective:1200px;
  margin: 0 auto; /* પર્ફેક્ટ સેન્ટર માટે */
}

/* 🔄 INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s ease-in-out;
  transform-origin:center center; /* પર્ફેક્ટ સેન્ટર ફ્લિપ માટે */
}

/* 🔄 FLIP */
.card.flip .card-inner{
  transform: rotateY(180deg);
}

/* 🎴 FRONT & BACK */
.card-front, .card-back{
  position:absolute;
  top:0;  /* ફિક્સ: શિફ્ટિંગ રોકવા માટે */
  left:0; /* ફિક્સ: શિફ્ટિંગ રોકવા માટે */
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden; /* Safari ફિક્સ */
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box; /* ફિક્સ: કાર્ડની સાઈઝ વધતી રોકવા માટે (સૌથી અગત્યનું) */
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* FRONT */
.card-front{
  background:linear-gradient(135deg,#ff4d7a,#ff7fa5);
  color:white;
  font-size:22px;
}

.card-front::before{
  content:"🎀";
  font-size:40px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:15px;
  line-height:1.4;
  padding:18px;
}

/* MESSAGE */
#message{
  text-align:center;
  white-space:pre-line;
}

/* ✨ GLOW */
.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 SONG AREA */
.song-area{
  display:flex;
  justify-content:center; /* બોક્સને સેન્ટરમાં રાખવા */
  align-items:center;
  gap:20px;
  width:100%;
  margin-top:40px; /* કાર્ડથી થોડા નીચે લાવવા માટે */
}

.song-box{
  width:120px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  backdrop-filter:blur(5px);
}
</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">

    <div class="card-front">
      Tap to Open 🎁
    </div>

    <div class="card-back">
      <div id="message"></div>
    </div>

  </div>
</div>

<div class="song-area">
  <div class="song-box"></div>
  <div class="song-box"></div>
</div>

<script>
/* ❤️ FINAL MESSAGE */
let text = `You are the best part of my life and I want you in my life forever.
..♾️🤗

And.

Thank you so much for being in my life and for making my life so beautiful..🫶❤️‍🩹

I love you so much Bacha..💋❤️
Forever with you..👀💫

And yes, thanks for giving me this sweet 🍭 like your sweetness..🤭`;

/* 🔄 FLIP */
function flipCard(card){
  card.classList.toggle("flip");

  if(card.classList.contains("flip")){
    document.getElementById("message").innerText = text;
  }
}
</script>

</body>
</html>
