<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh; 
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  padding-bottom:100px; 
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Poppins', sans-serif;
  overflow-x: hidden; 
  scroll-behavior: smooth;
}

/* 🎁 CARD */
.card{
  width:300px;
  height:380px;
  perspective:1200px;
  margin: 0 auto; 
  cursor: pointer;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s ease-in-out;
  transform-origin:center center; 
}

.card.flip .card-inner{
  transform: rotateY(180deg);
}

.card-front, .card-back{
  position:absolute;
  top:0;  
  left:0; 
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden; 
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box; 
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.card-front{
  background:linear-gradient(135deg, #ff4d7a, #ff9a9e, #ff7fa5);
  background-size: 200% 200%;
  animation: gradientMove 4s ease infinite alternate;
  color:white;
  font-size:22px;
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.35), 0 15px 30px rgba(0,0,0,0.3);
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.card-front::before{
  content:"🎀";
  font-size:40px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

.front-text-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: pulseText 1.5s infinite ease-in-out;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  font-weight: 500;
}

@keyframes pulseText {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:14px; 
  line-height:1.4;
  padding:15px;
  display:flex;
  flex-direction:column; 
}

#message{
  text-align:center;
  width: 100%;
}

.msg-line {
  opacity: 0;
  transform: translateX(-20px);
  animation: slideInLeft 0.5s ease-out forwards;
}

@keyframes slideInLeft {
  to { opacity: 1; transform: translateX(0); }
}

.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 MINI PLAYERS AREA (ફક્ત 2 જ બોક્સ) */
.song-area{
  display:flex;
  flex-wrap: wrap; 
  justify-content:center; 
  align-items:center;
  gap:18px; 
  width:100%;
  max-width: 350px; 
  margin-top:35px; 
}

.song-box{
  width: 155px; 
  height: 155px; 
  background:rgba(0, 0, 0, 0.35); 
  border-radius:20px;
  backdrop-filter:blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center; 
  justify-content: space-between; 
  padding: 15px; 
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
  opacity: 0.7; 
}

.song-box:active {
  transform: scale(0.95);
}

.song-box.highlight {
  animation: boxPulseGlow 2s infinite ease-in-out;
  opacity: 1;
  border: 1px solid rgba(255, 255, 255, 0.6);
}

@keyframes boxPulseGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 77, 122, 0.6); }
}

.teddy-img {
  width: 85px; 
  height: 85px; 
  border-radius: 14px; 
  object-fit: cover;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  margin-top: 2px;
}

.song-controls {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between; 
  margin-top: 8px;
}

.song-info {
  display: flex;
  flex-direction: column;
  text-align: left;
}

.song-title {
  font-size: 13px; 
  color: white;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 85px; 
}

.song-artist {
  font-size: 10px; 
  color: #d1d1d1;
}

.play-btn {
  color: white;
  font-size: 24px; 
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🎉 CONFETTI */
.confetti {
  position: fixed; 
  font-size: 24px;
  pointer-events: none;
  animation: confettiBlast 1.5s ease-out forwards;
  z-index: 100; 
}

@keyframes confettiBlast {
  0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
}

/* 🎁 INSTAGRAM STYLE GIFT SECTION */
.gift-section {
  display: none; 
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
  width: 100%;
  max-width: 320px;
  animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.gift-btn {
  background: linear-gradient(135deg, #ff4d7a, #ff7fa5);
  padding: 15px 30px;
  border-radius: 25px;
  font-size: 20px;
  color: white;
  font-weight: 500;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: pulseGift 2s infinite ease-in-out;
  border: 2px solid rgba(255,255,255,0.4);
}

.gift-message {
  display: none;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  font-size: 16px;
  line-height: 1.5;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  animation: revealMsg 0.6s ease-out forwards;
}

/* ➡️ CREATIVE NEXT BUTTON */
.next-page-btn {
  display: none; 
  margin-top: 25px;
  background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%);
  padding: 12px 35px;
  border-radius: 30px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 10px 20px rgba(255, 8, 68, 0.4);
  animation: slideUp 0.6s ease forwards, pulseNext 2s infinite;
  border: none;
  cursor: pointer;
}

.next-page-btn:active {
  transform: scale(0.95);
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulseGift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.05) rotate(-3deg); }
  75% { transform: scale(1.05) rotate(3deg); }
}

@keyframes revealMsg {
  0% { transform: translateY(20px) scale(0.8); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

@keyframes pulseNext {
  0% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.7); }
  70% { box-shadow: 0 0 0 15px rgba(255, 8, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); }
}

@keyframes slideUp {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

</style>
</head>

<body>

<audio id="audio1" src="song1.mp3"></audio>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">
    <div class="card-front">
      <div class="front-text-box">
        Tap to Open Surprise <br> 🎁
      </div>
    </div>
    <div class="card-back">
      <div id="message"></div>
    </div>
  </div>
</div>

<div class="song-area">
  
  <div class="song-box" id="box3" onclick="toggleSong(3)">
    <img src="6fd54a10dbcb7173e77320e2e5bf4f60.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 3</span>
        <span class="song-artist">Our Memories</span>
      </div>
      <div class="play-btn" id="icon3">▶</div>
    </div>
    <audio id="audio3" src="song3.mp3"></audio>
  </div>

  <div class="song-box" id="box4" onclick="toggleSong(4)">
    <img src="7e6091b9b3a45b0ab5bfead9d3b8be17.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 4</span>
        <span class="song-artist">Sweetheart</span>
      </div>
      <div class="play-btn" id="icon4">▶</div>
    </div>
    <audio id="audio4" src="song4.mp3"></audio>
  </div>

</div>

<div class="gift-section" id="giftSection">
  <div class="gift-btn" id="giftBtn" onclick="openGift()">
    🎁 Tap to Unwrap
  </div>
  <div class="gift-message" id="giftMessage">
    Sorry babe songs nu knowledge che naii....😁<br><br>
    Pan jetli khbr paydi etlu kayru che...🤭
  </div>
  
  <button class="next-page-btn" id="nextPageBtn" onclick="goToNextPage()">
    Next Surprise ➡️
  </button>
</div>

<script>
let rawText = `Hyeee dhrutii...

These are special lines for your special day bachha..💝

You are the best part of my life and I want you in my life forever.
..♾️🤗 

And And And...

Thank you so much for being in my life and for making my life so beautiful..🫶❤️‍🩹

I love you...
I love you so much...
I love you so so much Bacha..💋❤️
Forever with you..👀💫

And yes, thanks for giving me this sweet 🍭 like your sweetness..🤭`;

let lines = rawText.split('\n');
let isFlipped = false;
let currentPlayingNum = null; 
let bgSongTimer; // ✨ 20 સેકન્ડ માટેનું નવું ટાઈમર ✨

function flipCard(card){
  if(isFlipped) return; 
  isFlipped = true;
  card.classList.toggle("flip");
  
  let msgDiv = document.getElementById("message");
  msgDiv.innerHTML = ""; 

  if(card.classList.contains("flip")){
    
    setTimeout(() => {
      lines.forEach((line, i) => {
        let div = document.createElement("div");
        div.className = "msg-line";
        if(line.trim() === ""){ div.style.height = "10px"; } 
        else { div.innerText = line.trim(); }
        div.style.animationDelay = (i * 0.3) + "s"; 
        msgDiv.appendChild(div);
      });
    }, 400); 

    confettiBlast(card);
    
    // ✨ બેકગ્રાઉન્ડમાં સોંગ 1 ઓટોમેટિક ચાલુ કરો ✨
    let bgAudio = document.getElementById("audio1");
    bgAudio.volume = 0;
    bgAudio.play().catch(e => console.log("Audio error"));
    currentPlayingNum = 1;
    
    let vol = 0;
    let fadeIn = setInterval(() => {
        if(vol < 0.9) { vol += 0.1; bgAudio.volume = vol; }
        else { clearInterval(fadeIn); bgAudio.volume = 1; }
    }, 80);

    // ✨ પર્ફેક્ટ 20 સેકન્ડ પછી ઓટોમેટિક સોંગ 3 ચાલુ કરવાનું લોજિક ✨
    bgSongTimer = setTimeout(() => {
        if(currentPlayingNum === 1 && !bgAudio.paused) {
            fadeAndPlayNext(1, 3);
        }
    }, 20000); // 20000 ms = 20 સેકન્ડ

    // જો ગીત 20 સેકન્ડ કરતા વહેલું પૂરું થઈ જાય તો
    bgAudio.onended = function() {
        clearTimeout(bgSongTimer);
        fadeAndPlayNext(1, 3);
    };
  }
}

function confettiBlast(element) {
  let rect = element.getBoundingClientRect();
  let centerX = rect.left + rect.width / 2;
  let centerY = rect.top + rect.height / 2;
  let confettiItems = ["💋", "💏", "👩‍❤️‍💋‍👩", "👩‍❤️‍💋‍👨", "💞", "✨"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];
    let a = Math.random() * 2 * Math.PI; 
    let d = Math.random() * 400 + 100; 
    c.style.left = centerX + "px";
    c.style.top = centerY + "px";
    c.style.setProperty('--x', Math.cos(a) * d + "px");
    c.style.setProperty('--y', Math.sin(a) * d + "px");
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

// 🎧 ✨ SMOOTH AUDIO FADE LOGIC ✨ 🎧
function fadeAndPlayNext(oldNum, newNum) {
  let oldAudio = document.getElementById("audio" + oldNum);
  
  if (oldAudio && !oldAudio.paused) {
      let vol = oldAudio.volume;
      let fadeOutTimer = setInterval(() => {
          if (vol > 0.1) {
              vol -= 0.1;
              oldAudio.volume = vol;
          } else {
              clearInterval(fadeOutTimer);
              oldAudio.pause();
              oldAudio.currentTime = 0;
              oldAudio.volume = 1; 
              
              // જો બોક્સ વાળું સોંગ હોય તો એના આઈકોન/હાઈલાઈટ કાઢો
              if(oldNum > 1) {
                  document.getElementById("icon" + oldNum).innerHTML = "▶";
                  document.getElementById("box" + oldNum).classList.remove("highlight");
              }
              
              if(newNum) startNewSong(newNum); 
          }
      }, 80); 
  } else {
      if(oldNum > 1) {
        document.getElementById("icon" + oldNum).innerHTML = "▶";
        document.getElementById("box" + oldNum).classList.remove("highlight");
      }
      if(newNum) startNewSong(newNum);
  }
}

function startNewSong(num) {
  // જો 4 પછી પૂરું થાય તો સીધું ગિફ્ટ સેક્શન
  if (num > 4) {
    showGiftSection();
    return;
  }

  let audio = document.getElementById("audio" + num);
  let icon = document.getElementById("icon" + num);
  let box = document.getElementById("box" + num);

  audio.volume = 0; 
  audio.play();
  icon.innerHTML = "⏸";
  box.classList.add("highlight");
  currentPlayingNum = num;

  let vol = 0;
  let fadeInTimer = setInterval(() => {
      if (vol < 0.9) {
          vol += 0.1;
          audio.volume = vol;
      } else {
          clearInterval(fadeInTimer);
          audio.volume = 1;
      }
  }, 80);

  // એક ગીત પતે એટલે બીજું વારો પછી વારો ચાલશે
  audio.onended = function() {
      if(num === 4) {
          fadeAndPlayNext(4, null);
          showGiftSection();
      } else {
          fadeAndPlayNext(num, num + 1);
      }
  };
}

function toggleSong(clickedNum) {
  // જો કોઈ વચ્ચે ક્લિક કરે તો 20 સેકન્ડનું ટાઈમર કેન્સલ કરી દો
  clearTimeout(bgSongTimer);

  let clickedAudio = document.getElementById("audio" + clickedNum);
  
  if (currentPlayingNum === clickedNum) {
      if (!clickedAudio.paused) {
          let vol = clickedAudio.volume;
          let fadeOut = setInterval(() => {
              if(vol > 0.1) { vol -= 0.1; clickedAudio.volume = vol; }
              else {
                  clearInterval(fadeOut);
                  clickedAudio.pause();
                  clickedAudio.volume = 1;
                  document.getElementById("icon" + clickedNum).innerHTML = "▶";
                  document.getElementById("box" + clickedNum).classList.remove("highlight");
              }
          }, 50);
      } else {
          clickedAudio.volume = 0;
          clickedAudio.play();
          document.getElementById("icon" + clickedNum).innerHTML = "⏸";
          document.getElementById("box" + clickedNum).classList.add("highlight");
          let vol = 0;
          let fadeIn = setInterval(() => {
              if(vol < 0.9) { vol += 0.1; clickedAudio.volume = vol; }
              else { clearInterval(fadeIn); clickedAudio.volume = 1; }
          }, 50);
      }
  } else {
      fadeAndPlayNext(currentPlayingNum, clickedNum);
  }
}

// 🛑 ✨ ટેબ બદલવા પર ગીત પોઝ (Pause) કરવાનું લોજિક ✨ 🛑
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    let bgAudio = document.getElementById('audio1');
    if(!bgAudio.paused) bgAudio.pause();

    for(let i=3; i<=4; i++) {
      let audio = document.getElementById('audio' + i);
      if(!audio.paused) {
         audio.pause(); 
         let icon = document.getElementById('icon' + i);
         icon.innerHTML = '▶';
         document.getElementById('box' + i).classList.remove("highlight");
      }
    }
  }
});

// 🎁 ગિફ્ટ સેક્શન 
function showGiftSection() {
  let giftSec = document.getElementById("giftSection");
  giftSec.style.display = "flex";
  setTimeout(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }, 500);
}

function openGift() {
  let btn = document.getElementById("giftBtn");
  let msg = document.getElementById("giftMessage");
  let nextBtn = document.getElementById("nextPageBtn");
  
  btn.style.display = "none";
  msg.style.display = "block";
  
  setTimeout(() => {
    nextBtn.style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }, 800);
  
  confettiBlast(msg); 
}

function goToNextPage() {
  window.location.href = "page4.html";
}
</script>

</body>
</html>
