<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh; 
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  padding-bottom:50px; 
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Poppins', sans-serif;
  overflow-x: hidden; 
}

/* 🎁 CARD */
.card{
  width:300px;
  height:380px;
  perspective:1200px;
  margin: 0 auto; 
  cursor: pointer;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s ease-in-out;
  transform-origin:center center; 
}

.card.flip .card-inner{
  transform: rotateY(180deg);
}

.card-front, .card-back{
  position:absolute;
  top:0;  
  left:0; 
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden; 
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box; 
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* ✨ ATTRACTIVE FRONT DESIGN */
.card-front{
  background:linear-gradient(135deg, #ff4d7a, #ff9a9e, #ff7fa5);
  background-size: 200% 200%;
  animation: gradientMove 4s ease infinite alternate;
  color:white;
  font-size:22px;
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.35), 0 15px 30px rgba(0,0,0,0.3);
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.card-front::before{
  content:"🎀";
  font-size:40px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

.front-text-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: pulseText 1.5s infinite ease-in-out;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  font-weight: 500;
}

@keyframes pulseText {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:15px;
  line-height:1.4;
  padding:18px;
  display:flex;
  flex-direction:column; 
}

#message{
  text-align:center;
  width: 100%;
}

.msg-line {
  opacity: 0;
  transform: translateX(-20px);
  animation: slideInLeft 0.5s ease-out forwards;
}

@keyframes slideInLeft {
  to { opacity: 1; transform: translateX(0); }
}

.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 4 MINI PLAYERS AREA (GRID) */
.song-area{
  display:flex;
  flex-wrap: wrap; 
  justify-content:center; 
  align-items:center;
  gap:18px; 
  width:100%;
  max-width: 350px; 
  margin-top:35px; 
}

/* 🟥 SQUARE BOX DESIGN */
.song-box{
  width: 155px; 
  height: 155px; 
  background:rgba(0, 0, 0, 0.35); 
  border-radius:20px;
  backdrop-filter:blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center; 
  justify-content: space-between; 
  padding: 15px; 
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
}

.song-box:active {
  transform: scale(0.95);
}

/* 🔒 LOCKED STATE (બીજે ક્યાંય ટચ ન થાય એના માટે) */
.song-box.locked {
  pointer-events: none; /* ટચ બ્લોક કરશે */
  opacity: 0.55; /* ઝાંખુ દેખાશે જેથી ખબર પડે કે લોક છે */
  filter: grayscale(30%);
}

/* ✨ HIGHLIGHT GLOW ANIMATION (15 સેકન્ડ પછી એક્ટિવ થવા માટે) */
.song-box.highlight {
  animation: boxPulseGlow 1.5s infinite ease-in-out;
  pointer-events: auto; /* ટચ ઓપન કરશે */
  opacity: 1;
  filter: grayscale(0%);
  border: 1px solid rgba(255, 255, 255, 0.6);
}

@keyframes boxPulseGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 255, 255, 0.9), 0 0 15px rgba(255, 77, 122, 0.8); }
}

.teddy-img {
  width: 85px; 
  height: 85px; 
  border-radius: 14px; 
  object-fit: cover;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  margin-top: 2px;
}

.song-controls {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between; 
  margin-top: 8px;
}

.song-info {
  display: flex;
  flex-direction: column;
  text-align: left;
}

.song-title {
  font-size: 13px; 
  color: white;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 85px; 
}

.song-artist {
  font-size: 10px; 
  color: #d1d1d1;
}

.play-btn {
  color: white;
  font-size: 24px; 
  display: flex;
  align-items: center;
  justify-content: center;
}

.confetti {
  position: fixed; 
  font-size: 24px;
  pointer-events: none;
  animation: confettiBlast 1.5s ease-out forwards;
  z-index: 100; 
}

@keyframes confettiBlast {
  0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
}
</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">
    <div class="card-front">
      <div class="front-text-box">
        Tap to Open Surprise <br> 🎁
      </div>
    </div>
    <div class="card-back">
      <div id="message"></div>
    </div>
  </div>
</div>

<div class="song-area">
  
  <div class="song-box locked" id="box1" onclick="toggleSong(1)">
    <img src="627f083b4a4ad03654f45135230ed0b9.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 1</span>
        <span class="song-artist">For Dhruti</span>
      </div>
      <div class="play-btn" id="icon1">▶</div>
    </div>
    <audio id="audio1" src="karan.mp3"></audio>
  </div>

  <div class="song-box locked" id="box2" onclick="toggleSong(2)">
    <img src="92bd194da8d817438cbfe7ae3954b6f1.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 2</span>
        <span class="song-artist">From Karan</span>
      </div>
      <div class="play-btn" id="icon2">▶</div>
    </div>
    <audio id="audio2" src="karan.mp3"></audio>
  </div>

  <div class="song-box locked" id="box3" onclick="toggleSong(3)">
    <img src="6fd54a10dbcb7173e77320e2e5bf4f60.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 3</span>
        <span class="song-artist">Our Memories</span>
      </div>
      <div class="play-btn" id="icon3">▶</div>
    </div>
    <audio id="audio3" src="karan.mp3"></audio>
  </div>

  <div class="song-box locked" id="box4" onclick="toggleSong(4)">
    <img src="7e6091b9b3a45b0ab5bfead9d3b8be17.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 4</span>
        <span class="song-artist">Sweetheart</span>
      </div>
      <div class="play-btn" id="icon4">▶</div>
    </div>
    <audio id="audio4" src="karan.mp3"></audio>
  </div>

</div>

<script>
let rawText = `You are the best part of my life and I want you in my life forever.
..♾️🤗

And.

Thank you so much for being in my life and for making my life so beautiful..🫶❤️‍🩹

I love you so much Bacha..💋❤️
Forever with you..👀💫

And yes, thanks for giving me this sweet 🍭 like your sweetness..🤭`;

let lines = rawText.split('\n');

// ટાઈમર ટ્રેક કરવા માટે
let timerStarted = false;
let boxUnlocked = [false, false, false, false, false]; 

function flipCard(card){
  card.classList.toggle("flip");
  
  let msgDiv = document.getElementById("message");
  msgDiv.innerHTML = ""; 

  if(card.classList.contains("flip")){
    
    // મેસેજ ટાઈપિંગ એનિમેશન
    setTimeout(() => {
      lines.forEach((line, i) => {
        let div = document.createElement("div");
        div.className = "msg-line";
        if(line.trim() === ""){ div.style.height = "12px"; } 
        else { div.innerText = line.trim(); }
        div.style.animationDelay = (i * 0.25) + "s"; 
        msgDiv.appendChild(div);
      });
    }, 400); 

    confettiBlast(card);

    // ✨ 15 સેકન્ડ પછી પહેલું બોક્સ ગ્લો થશે 
    if(!timerStarted) {
      timerStarted = true;
      setTimeout(() => {
        unlockBox(1);
      }, 15000); // 15000ms = 15 seconds
    }
  }
}

// બોક્સ અનલોક કરવાનું ફંક્શન
function unlockBox(num) {
  if(num > 4 || boxUnlocked[num]) return; // જો 4 થી વધુ હોય યા પહેલેથી અનલોક હોય તો રિટર્ન
  boxUnlocked[num] = true;
  let box = document.getElementById("box" + num);
  box.classList.remove("locked");
  box.classList.add("highlight");
}

function confettiBlast(cardEl) {
  let rect = cardEl.getBoundingClientRect();
  let centerX = rect.left + rect.width / 2;
  let centerY = rect.top + rect.height / 2;
  let confettiItems = ["💋", "💏", "👩‍❤️‍💋‍👩", "👩‍❤️‍💋‍👨", "💞", "✨"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];
    let a = Math.random() * 2 * Math.PI; 
    let d = Math.random() * 400 + 100; 
    c.style.left = centerX + "px";
    c.style.top = centerY + "px";
    c.style.setProperty('--x', Math.cos(a) * d + "px");
    c.style.setProperty('--y', Math.sin(a) * d + "px");
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

let currentAudio = null;
let currentIcon = null;

function toggleSong(songNum) {
  let audio = document.getElementById("audio" + songNum);
  let icon = document.getElementById("icon" + songNum);
  let box = document.getElementById("box" + songNum);

  // ક્લિક કર્યા પછી ગ્લો/પલ્સ ઇફેક્ટ બંધ કરવા
  box.classList.remove("highlight");

  if (currentAudio === audio) {
    if (audio.paused) {
      audio.play();
      icon.innerHTML = "⏸";
    } else {
      audio.pause();
      icon.innerHTML = "▶";
    }
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    currentIcon.innerHTML = "▶";
  }

  audio.play();
  icon.innerHTML = "⏸";
  currentAudio = audio;
  currentIcon = icon;

  audio.onended = function() {
    icon.innerHTML = "▶";
  };

  // ✨ ઓડિયો પ્લે થતો હોય ત્યારે સતત ટાઈમ ચેક કરશે
  audio.ontimeupdate = function() {
    // જો ગીત પૂરું થવામાં 2 સેકન્ડ કે તેથી ઓછો સમય બાકી હોય તો...
    if (audio.duration > 0 && (audio.duration - audio.currentTime <= 2.0)) {
      unlockBox(songNum + 1); // નેક્સ્ટ બોક્સ અનલોક થશે
    }
  };
}
</script>

</body>
</html>
