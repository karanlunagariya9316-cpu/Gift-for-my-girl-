<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  
<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Pacifico', cursive;
}

/* 🎁 CARD */
.card{
  transform: translateZ(0);
  width:320px;
  height:210px;
  perspective:1200px;
  margin-bottom:40px;
}

/* INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.9s cubic-bezier(.68,-0.55,.27,1.55);

  display:flex;
  align-items:center;
  justify-content:center;

  transform-origin:center;
}

/* FLIP */
.card.flip .card-inner{
  transform: rotateY(180deg);
}

/* FRONT & BACK */
.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* FRONT */
.card-front{
  background:linear-gradient(135deg,#ff4d7a,#ff7fa5);
  color:white;
  font-size:22px;
}

.card-front::before{
  content:"🎀";
  font-size:42px;
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:18px;
  line-height:1.6;

  font-family: 'Poppins', sans-serif;
  font-weight:400;
  letter-spacing:0.5px;

  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* ✨ Highlight first line */
.card-back b{
  font-size:20px;
}

/* ✨ Glow */
.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 SONG AREA */
.song-area{
  display:flex;
  gap:20px;
}

.song-box{
  width:120px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  backdrop-filter:blur(5px);
}

/* ❤️ TEXT CENTER FIX */
#message{
  text-align:center;
}

</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">

    <div class="card-front">
      Tap to Open 🎁
    </div>

    <div class="card-back">
      <div id="message" class="typing"></div>
    </div>

  </div>
</div>

<div class="song-area">
  <div class="song-box"></div>
  <div class="song-box"></div>
</div>

<script>

/* ❤️ 👉 AHIA TAMARO MESSAGE CHANGE KARO 👇 */
let textLines = [
  "💖 Happy Birthday My Love 💖",
  "Tu mara mate khub special che 💕",
  "Tari sathe hoy to badhu perfect lage che",
  "Tu mari life ni best feeling che",
  "Forever with you 💘"
];

/* FLIP */
function flipCard(card){
  card.classList.toggle("flip");

  if(card.classList.contains("flip")){
    typeText();
  }
}

/* ✍️ TYPING EFFECT */
function typeText(){
  let msgBox = document.getElementById("message");
  msgBox.innerHTML = "";

  let lineIndex = 0;
  let charIndex = 0;
  let speed = 40;

  function typeLine(){
    if(lineIndex < textLines.length){

      let line = textLines[lineIndex];

      if(charIndex < line.length){
        msgBox.innerHTML += line.charAt(charIndex);
        charIndex++;
        setTimeout(typeLine, speed);
      }else{
        msgBox.innerHTML += "<br><br>";  // 🔥 line break
        lineIndex++;
        charIndex = 0;
        setTimeout(typeLine, 300);
      }

    }
  }

  typeLine();
}

</script>

</body>
</html>
