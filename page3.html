<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;   /* thodu balance */
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Pacifico', cursive;
}

/* 🎁 CARD */
.card{
  transform: translateZ(0);
  width:320px;          /* 🔥 bigger */
  height:210px;         /* 🔥 bigger */
  perspective:1200px;
  margin-bottom:40px;
}

/* INNER */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.9s cubic-bezier(.68,-0.55,.27,1.55);

  display:flex;                /* 🔥 ADD */
  align-items:center;          /* 🔥 ADD */
  justify-content:center;      /* 🔥 ADD */

  transform-origin:center;     /* already good */
}

/* ✅ THIS WAS MISSING */
.card.flip .card-inner{
  transform: rotateY(180deg);
}

/* FRONT & BACK */
.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;                /* 🔥 थोड़ा increase */
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* FRONT 🎁 */
.card-front{
  background:linear-gradient(135deg,#ff4d7a,#ff7fa5);
  color:white;
  font-size:22px;
}

/* 🎀 RIBBON FIXED CENTER */
.card-front::before{
  content:"🎀";
  font-size:42px;
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
}

/* BACK 💌 */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:18px;
  line-height:1.4;
  box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/* ✨ GLOW WHEN OPEN */
.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* 🎵 SONG AREA */
.song-area{
  display:flex;
  gap:20px;
}

.song-box{
  width:120px;
  height:60px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  backdrop-filter:blur(5px);
}

/* ❤️ TYPING EFFECT */
.typing{
  border-right:2px solid #a8325f;
  white-space:pre-line;
  overflow:hidden;
}

</style>
</head>

<body>

<!-- 🎁 CARD -->
<div class="card" onclick="flipCard(this)">
  <div class="card-inner">

    <!-- FRONT -->
    <div class="card-front">
      Tap to Open 🎁
    </div>

    <!-- BACK -->
    <div class="card-back">
      <div id="message" class="typing"></div>
    </div>

  </div>
</div>

<!-- 🎵 SPACE -->
<div class="song-area">
  <div class="song-box"></div>
  <div class="song-box"></div>
</div>

<script>

/* ❤️ CHANGE MESSAGE HERE ONLY */
let text = `💖 Happy Birthday Dhruti 💖

Tu mara mate khub special che... 💕
I Love You 💘`;

/* FLIP */
function flipCard(card){
  card.classList.toggle("flip");

  if(card.classList.contains("flip")){
    typeText();
  }
}

/* ✍️ TYPING EFFECT */
function typeText(){
  let i = 0;
  let speed = 40;
  let msgBox = document.getElementById("message");
  msgBox.innerHTML = "";

  function typing(){
    if(i < text.length){
      msgBox.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

</script>

</body>
</html>
