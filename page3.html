<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh; 
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:90px;
  padding-bottom:80px; /* аӘ—аӘҝаӘ«а«ҚаӘҹ аӘ¬а«ӢаӘ•а«ҚаӘё аӘ®аӘҫаӘҹа«Ү аӘЁа«ҖаӘҡа«Ү аӘөаӘ§а«Ғ аӘңаӘ—а«ҚаӘҜаӘҫ */
  background: linear-gradient(135deg,#5a0f2e,#a8325f,#ff9a9e);
  font-family:'Poppins', sans-serif;
  overflow-x: hidden; 
  scroll-behavior: smooth;
}

/* рҹҺҒ CARD */
.card{
  width:300px;
  height:380px;
  perspective:1200px;
  margin: 0 auto; 
  cursor: pointer;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s ease-in-out;
  transform-origin:center center; 
}

.card.flip .card-inner{
  transform: rotateY(180deg);
}

.card-front, .card-back{
  position:absolute;
  top:0;  
  left:0; 
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden; 
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box; 
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.card-front{
  background:linear-gradient(135deg, #ff4d7a, #ff9a9e, #ff7fa5);
  background-size: 200% 200%;
  animation: gradientMove 4s ease infinite alternate;
  color:white;
  font-size:22px;
  box-shadow: inset 0 0 0 6px rgba(255,255,255,0.35), 0 15px 30px rgba(0,0,0,0.3);
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.card-front::before{
  content:"рҹҺҖ";
  font-size:40px;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}

.front-text-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: pulseText 1.5s infinite ease-in-out;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  font-weight: 500;
}

@keyframes pulseText {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* BACK */
.card-back{
  background:white;
  color:#a8325f;
  transform:rotateY(180deg);
  font-size:14px; 
  line-height:1.4;
  padding:15px;
  display:flex;
  flex-direction:column; 
}

#message{
  text-align:center;
  width: 100%;
}

.msg-line {
  opacity: 0;
  transform: translateX(-20px);
  animation: slideInLeft 0.5s ease-out forwards;
}

@keyframes slideInLeft {
  to { opacity: 1; transform: translateX(0); }
}

.card.flip .card-back{
  animation: glow 1s ease;
}

@keyframes glow{
  0%{ box-shadow:0 0 0 rgba(255,255,255,0); }
  50%{ box-shadow:0 0 25px rgba(255,255,255,0.9); }
  100%{ box-shadow:0 0 20px rgba(255,255,255,0.6); }
}

/* рҹҺө 4 MINI PLAYERS AREA */
.song-area{
  display:flex;
  flex-wrap: wrap; 
  justify-content:center; 
  align-items:center;
  gap:18px; 
  width:100%;
  max-width: 350px; 
  margin-top:35px; 
}

.song-box{
  width: 155px; 
  height: 155px; 
  background:rgba(0, 0, 0, 0.35); 
  border-radius:20px;
  backdrop-filter:blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center; 
  justify-content: space-between; 
  padding: 15px; 
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
  opacity: 0.7; 
}

.song-box:active {
  transform: scale(0.95);
}

.song-box.highlight {
  animation: boxPulseGlow 2s infinite ease-in-out;
  opacity: 1;
  border: 1px solid rgba(255, 255, 255, 0.6);
}

@keyframes boxPulseGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
  50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 15px rgba(255, 77, 122, 0.6); }
}

.teddy-img {
  width: 85px; 
  height: 85px; 
  border-radius: 14px; 
  object-fit: cover;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  margin-top: 2px;
}

.song-controls {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between; 
  margin-top: 8px;
}

.song-info {
  display: flex;
  flex-direction: column;
  text-align: left;
}

.song-title {
  font-size: 13px; 
  color: white;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 85px; 
}

.song-artist {
  font-size: 10px; 
  color: #d1d1d1;
}

.play-btn {
  color: white;
  font-size: 24px; 
  display: flex;
  align-items: center;
  justify-content: center;
}

/* рҹҺү CONFETTI */
.confetti {
  position: fixed; 
  font-size: 24px;
  pointer-events: none;
  animation: confettiBlast 1.5s ease-out forwards;
  z-index: 100; 
}

@keyframes confettiBlast {
  0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
}

/* рҹҺҒ INSTAGRAM STYLE GIFT SECTION */
.gift-section {
  display: none; /* аӘ¶аӘ°а«ӮаӘҶаӘӨаӘ®аӘҫаӘӮ аӘӣа«ҒаӘӘаӘҫаӘҜа«ҮаӘІа«ҒаӘӮ */
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
  width: 100%;
  max-width: 320px;
  animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.gift-btn {
  background: linear-gradient(135deg, #ff4d7a, #ff7fa5);
  padding: 15px 30px;
  border-radius: 25px;
  font-size: 20px;
  color: white;
  font-weight: 500;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: pulseGift 2s infinite ease-in-out;
  border: 2px solid rgba(255,255,255,0.4);
}

.gift-message {
  display: none;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  font-size: 16px;
  line-height: 1.5;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  animation: revealMsg 0.6s ease-out forwards;
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulseGift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.05) rotate(-3deg); }
  75% { transform: scale(1.05) rotate(3deg); }
}

@keyframes revealMsg {
  0% { transform: translateY(20px) scale(0.8); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

</style>
</head>

<body>

<div class="card" onclick="flipCard(this)">
  <div class="card-inner">
    <div class="card-front">
      <div class="front-text-box">
        Tap to Open Surprise <br> рҹҺҒ
      </div>
    </div>
    <div class="card-back">
      <div id="message"></div>
    </div>
  </div>
</div>

<div class="song-area">
  
  <div class="song-box" id="box1" onclick="toggleSong(1)">
    <img src="627f083b4a4ad03654f45135230ed0b9.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 1</span>
        <span class="song-artist">For Dhruti</span>
      </div>
      <div class="play-btn" id="icon1">в–¶</div>
    </div>
    <audio id="audio1" src="song1.mp3"></audio>
  </div>

  <div class="song-box" id="box2" onclick="toggleSong(2)">
    <img src="92bd194da8d817438cbfe7ae3954b6f1.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 2</span>
        <span class="song-artist">From Karan</span>
      </div>
      <div class="play-btn" id="icon2">в–¶</div>
    </div>
    <audio id="audio2" src="song2.mp3"></audio>
  </div>

  <div class="song-box" id="box3" onclick="toggleSong(3)">
    <img src="6fd54a10dbcb7173e77320e2e5bf4f60.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 3</span>
        <span class="song-artist">Our Memories</span>
      </div>
      <div class="play-btn" id="icon3">в–¶</div>
    </div>
    <audio id="audio3" src="song3.mp3"></audio>
  </div>

  <div class="song-box" id="box4" onclick="toggleSong(4)">
    <img src="7e6091b9b3a45b0ab5bfead9d3b8be17.jpg" class="teddy-img">
    <div class="song-controls">
      <div class="song-info">
        <span class="song-title">Song 4</span>
        <span class="song-artist">Sweetheart</span>
      </div>
      <div class="play-btn" id="icon4">в–¶</div>
    </div>
    <audio id="audio4" src="song4.mp3"></audio>
  </div>

</div>

<div class="gift-section" id="giftSection">
  <div class="gift-btn" id="giftBtn" onclick="openGift()">
    рҹҺҒ Tap to Unwrap
  </div>
  <div class="gift-message" id="giftMessage">
    Sorry babe songs nu knowledge che naii....рҹҳҒ<br><br>
    Pan jetli khbr paydi etlu kayru che...рҹӨӯ
  </div>
</div>

<script>
let rawText = `Hyeee dhrutii...

These are special lines for your special day bachha..рҹ’қ

You are the best part of my life and I want you in my life forever.
..вҷҫпёҸрҹӨ— 

And And And...

Thank you so much for being in my life and for making my life so beautiful..рҹ«¶вқӨпёҸвҖҚрҹ©№

I love you...
I love you so much...
I love you so so much Bacha..рҹ’ӢвқӨпёҸ
Forever with you..рҹ‘Җрҹ’«

And yes, thanks for giving me this sweet рҹҚӯ like your sweetness..рҹӨӯ`;

let lines = rawText.split('\n');
let isFlipped = false;

function flipCard(card){
  if(isFlipped) return; 
  isFlipped = true;
  card.classList.toggle("flip");
  
  let msgDiv = document.getElementById("message");
  msgDiv.innerHTML = ""; 

  if(card.classList.contains("flip")){
    
    setTimeout(() => {
      lines.forEach((line, i) => {
        let div = document.createElement("div");
        div.className = "msg-line";
        if(line.trim() === ""){ div.style.height = "10px"; } 
        else { div.innerText = line.trim(); }
        div.style.animationDelay = (i * 0.3) + "s"; 
        msgDiv.appendChild(div);
      });
    }, 400); 

    confettiBlast(card);

    playSong(1);
  }
}

function confettiBlast(element) {
  let rect = element.getBoundingClientRect();
  let centerX = rect.left + rect.width / 2;
  let centerY = rect.top + rect.height / 2;
  let confettiItems = ["рҹ’Ӣ", "рҹ’Ҹ", "рҹ‘©вҖҚвқӨпёҸвҖҚрҹ’ӢвҖҚрҹ‘©", "рҹ‘©вҖҚвқӨпёҸвҖҚрҹ’ӢвҖҚрҹ‘Ё", "рҹ’һ", "вңЁ"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.textContent = confettiItems[Math.floor(Math.random() * confettiItems.length)];
    let a = Math.random() * 2 * Math.PI; 
    let d = Math.random() * 400 + 100; 
    c.style.left = centerX + "px";
    c.style.top = centerY + "px";
    c.style.setProperty('--x', Math.cos(a) * d + "px");
    c.style.setProperty('--y', Math.sin(a) * d + "px");
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

function playSong(num) {
  // а«Ә аӘ—а«ҖаӘӨа«Ӣ аӘӘа«ӮаӘ°аӘҫ аӘҘаӘҲ аӘңаӘҫаӘҜ аӘӘаӘӣа«Җ аӘ—аӘҝаӘ«а«ҚаӘҹ аӘ¬а«ӢаӘ•а«ҚаӘё аӘҰа«ҮаӘ–аӘҫаӘ¶а«Ү
  if (num > 4) {
    let giftSec = document.getElementById("giftSection");
    giftSec.style.display = "flex";
    // аӘӘа«ҮаӘңаӘЁа«Ү аӘЁа«ҖаӘҡа«Ү аӘёа«ҚаӘ•а«ҚаӘ°а«ӢаӘІ аӘ•аӘ°аӘ¶а«Ү аӘңа«ҮаӘҘа«Җ аӘ—аӘҝаӘ«а«ҚаӘҹ аӘҰа«ҮаӘ–аӘҫаӘҜ
    setTimeout(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }, 500);
    return; 
  }

  for(let i = 1; i <= 4; i++) {
    let a = document.getElementById("audio" + i);
    let ic = document.getElementById("icon" + i);
    let bx = document.getElementById("box" + i);
    a.pause();
    a.currentTime = 0; 
    ic.innerHTML = "в–¶";
    bx.classList.remove("highlight");
  }

  let audio = document.getElementById("audio" + num);
  let icon = document.getElementById("icon" + num);
  let box = document.getElementById("box" + num);

  audio.play();
  icon.innerHTML = "вҸё";
  box.classList.add("highlight"); 

  audio.onended = function() {
    icon.innerHTML = "в–¶";
    box.classList.remove("highlight");
    playSong(num + 1); 
  };
}

function toggleSong(songNum) {
  let audio = document.getElementById("audio" + songNum);
  
  if (!audio.paused) {
    audio.pause();
    document.getElementById("icon" + songNum).innerHTML = "в–¶";
    document.getElementById("box" + songNum).classList.remove("highlight");
  } else {
    playSong(songNum);
  }
}

// рҹҺҒ аӘ—аӘҝаӘ«а«ҚаӘҹ аӘ“аӘӘаӘЁ аӘ•аӘ°аӘөаӘҫаӘЁа«ҒаӘӮ аӘ«аӘӮаӘ•а«ҚаӘ¶аӘЁ
function openGift() {
  let btn = document.getElementById("giftBtn");
  let msg = document.getElementById("giftMessage");
  
  btn.style.display = "none";
  msg.style.display = "block";
  
  confettiBlast(msg); // аӘ“аӘӘаӘЁ аӘҘаӘҫаӘҜ аӘӨа«ҚаӘҜаӘҫаӘ°а«Ү аӘЁаӘҫаӘЁа«Ӣ аӘёа«ҮаӘІаӘҝаӘ¬а«ҚаӘ°а«ҮаӘ¶аӘЁ аӘ¬а«ҚаӘІаӘҫаӘёа«ҚаӘҹ
}
</script>

</body>
</html>
