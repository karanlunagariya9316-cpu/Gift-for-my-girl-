<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Dhrutuu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ✨ Main Theme Background */
        body {
            margin: 0;
            padding: 0;
            height: 100dvh; 
            background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            position: relative; 
        }

        /* ✨ --- UPDATED: Falling Flowers Background Animation (Smooth & Acha) --- ✨ */
        .flower-bg {
            position: absolute;
            top: -15vh; 
            font-size: 35px; 
            opacity: 0; 
            z-index: 0;
            pointer-events: none;
            animation: fallDown var(--duration) linear infinite var(--delay);
        }

        @keyframes fallDown {
            0% { opacity: 0; transform: translateY(0) rotate(var(--rot)) scale(var(--scl)); }
            /* ✨ આછા (Transparent) કરવા માટે opacity 0.35 કરી છે ✨ */
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { opacity: 0; transform: translateY(130vh) rotate(calc(var(--rot) + 180deg)) scale(var(--scl)); }
        }

        /* 📸 --- POLAROID FRAME WITH TEDDY & BOW --- 📸 */
        .polaroid-wrapper {
            position: relative;
            margin-bottom: 3vh; 
            transform: rotate(-3deg);
            animation: floatFrame 4s ease-in-out infinite alternate;
            z-index: 10; 
        }

        @keyframes floatFrame {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(-10px) rotate(-1deg); }
        }

        .polaroid {
            background: #fff;
            padding: 10px 10px 40px 10px; 
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 160px; 
            transition: all 0.3s ease;
        }

        .polaroid img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .bow {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 50px;
            transform: rotate(15deg);
            filter: drop-shadow(2px 5px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .teddy {
            position: absolute;
            bottom: -25px;
            left: -25px;
            font-size: 60px;
            transform: rotate(-10deg);
            filter: drop-shadow(-2px 5px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }

        /* 🔒 --- PASSCODE DISPLAY --- 🔒 */
        .passcode-title {
            color: #fff;
            font-size: 20px;
            font-family: 'Fredoka One', cursive, sans-serif;
            letter-spacing: 1px;
            margin-bottom: 1.5vh;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .passcode-display {
            display: flex;
            gap: 10px;
            margin-bottom: 3.5vh;
            z-index: 10;
        }

        .dot-box {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 30px;
            color: transparent; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .dot-box.filled {
            color: #fff; 
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .error-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* 📱 --- DIALER NUMPAD --- 📱 */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 20px; 
            position: relative;
            z-index: 10;
        }

        .num-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            font-size: 26px;
            font-family: 'Fredoka One', cursive;
            color: #a8325f;
            box-shadow: 0 8px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
        }

        .num-btn:active {
            transform: scale(0.9) translateY(4px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            background: #ffe6f0;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: none;
            font-size: 32px;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ✨ Hash Button Glow Animation */
        .hash-glow {
            animation: hashGlowAnim 1s infinite alternate;
            background: rgba(255, 255, 255, 0.4);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes hashGlowAnim {
            0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), inset 0 0 5px rgba(255, 255, 255, 0.3); transform: scale(1); }
            100% { box-shadow: 0 0 25px rgba(255, 255, 255, 1), inset 0 0 15px rgba(255, 255, 255, 0.8); transform: scale(1.05); }
        }

        /* ✨ --- EMOJI BLAST ANIMATIONS --- ✨ */
        .mini-blast {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            z-index: 100;
            animation: popOutMini 0.5s ease-out forwards;
        }

        @keyframes popOutMini {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.2); opacity: 0; }
        }

        .mega-blast {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            z-index: 200;
            animation: popOutMega 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes popOutMega {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.6) rotate(var(--rot)); opacity: 0; }
        }

        /* ✨ AUTO-ADJUST MAGIC */
        @media screen and (max-height: 700px) {
            .polaroid-wrapper { margin-bottom: 2vh; }
            .polaroid { width: 130px; padding: 8px 8px 30px 8px; }
            .polaroid img { height: 130px; }
            .bow { font-size: 40px; top: -15px; right: -15px; }
            .teddy { font-size: 50px; bottom: -20px; left: -20px; }

            .passcode-title { font-size: 18px; margin-bottom: 1vh; }
            .passcode-display { gap: 8px; margin-bottom: 2.5vh; }
            .dot-box { width: 36px; height: 36px; font-size: 26px; }

            .numpad { gap: 8px 15px; }
            .num-btn { width: 55px; height: 55px; font-size: 22px; }
            .action-btn { font-size: 26px; }
        }

    </style>
</head>
<body>

    <div id="flower-container"></div>

    <div class="polaroid-wrapper">
        <div class="bow">🎀</div>
        <div class="polaroid">
            <img src="IMG-20260401-WA0014.jpg" alt="Dhruti">
        </div>
        <div class="teddy">🧸</div>
    </div>

    <div class="passcode-title">Enter your birthdate</div>
    <div class="passcode-display" id="passcodeDisplay">
        <div class="dot-box" id="dot1">*</div>
        <div class="dot-box" id="dot2">*</div>
        <div class="dot-box" id="dot3">*</div>
        <div class="dot-box" id="dot4">*</div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="pressKey('1', event)">1</button>
        <button class="num-btn" onclick="pressKey('2', event)">2</button>
        <button class="num-btn" onclick="pressKey('3', event)">3</button>
        
        <button class="num-btn" onclick="pressKey('4', event)">4</button>
        <button class="num-btn" onclick="pressKey('5', event)">5</button>
        <button class="num-btn" onclick="pressKey('6', event)">6</button>
        
        <button class="num-btn" onclick="pressKey('7', event)">7</button>
        <button class="num-btn" onclick="pressKey('8', event)">8</button>
        <button class="num-btn" onclick="pressKey('9', event)">9</button>
        
        <button class="num-btn action-btn" onclick="clearPasscode(event)">*</button>
        <button class="num-btn" onclick="pressKey('0', event)">0</button>
        <button class="num-btn action-btn" id="hashBtn" onclick="submitPasscode(event)">#</button>
    </div>

    <script>
        let enteredPasscode = "";
        let isSuccess = false; 
        const correctPasscode = "2704"; 

        // ✨ 1. UPDATED: Falling Flowers Logic (વધારે ફૂલો અને આખી સ્ક્રીનમાં) ✨
        const flowerContainer = document.getElementById("flower-container");
        const flowerEmojis = ['🌸', '💮', '🌼', '🏵️'];
        const totalFlowers = 35; // ✨ 15 ની જગ્યાએ 35 કરી દીધા ✨

        for (let i = 0; i < totalFlowers; i++) {
            let flower = document.createElement("div");
            flower.className = "flower-bg";
            flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
            
            // ✨ સ્ક્રીનના દરેક ભાગમાં એક એક ફૂલ ગોઠવવા માટેનું પર્ફેક્ટ લોજિક ✨
            let sectionWidth = 100 / totalFlowers;
            let randomX = (i * sectionWidth) + (Math.random() * sectionWidth); 
            
            let randomRotate = Math.floor(Math.random() * 360);
            let randomScale = (Math.random() * 0.4) + 0.6; 
            
            let animDuration = (Math.random() * 5) + 6; 
            let animDelay = Math.random() * 5; 
            
            flower.style.left = randomX + "vw";
            flower.style.setProperty('--rot', randomRotate + 'deg');
            flower.style.setProperty('--scl', randomScale);
            flower.style.setProperty('--duration', animDuration + 's');
            flower.style.setProperty('--delay', animDelay + 's');
            
            flowerContainer.appendChild(flower);
        }

        // 💋 ૨. બટન ક્લિક કરવા પર નાનો બ્લાસ્ટ
        function triggerMiniBlast(event) {
            if(!event) return;
            let rect = event.target.getBoundingClientRect();
            let startX = rect.left + (rect.width / 2);
            let startY = rect.top + (rect.height / 2);

            for(let i = 0; i < 4; i++) {
                let el = document.createElement('div');
                el.innerText = '💋';
                el.className = 'mini-blast';
                el.style.left = startX + 'px';
                el.style.top = startY + 'px';
                
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 40 + 20; 
                el.style.setProperty('--x', Math.cos(angle) * distance + 'px');
                el.style.setProperty('--y', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 500); 
            }
        }

        // 🎉 ૩. સાચો પાસવર્ડ નાખવા પર આખી સ્ક્રીનમાં મેગા બ્લાસ્ટ
        function triggerMegaBlast() {
            const emojis = ['💋', '🎀', '💗', '💝', '💕', '✨'];
            let blastsCount = 0;

            let blastInterval = setInterval(() => {
                let rx = Math.random() * (window.innerWidth - 100) + 50;
                let ry = Math.random() * (window.innerHeight - 200) + 100;

                for(let i = 0; i < 25; i++) {
                    let el = document.createElement('div');
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.className = 'mega-blast';
                    el.style.left = rx + 'px';
                    el.style.top = ry + 'px';
                    
                    let angle = Math.random() * Math.PI * 2;
                    let distance = Math.random() * 150 + 50; 
                    let rotation = Math.random() * 360;

                    el.style.setProperty('--x', Math.cos(angle) * distance + 'px');
                    el.style.setProperty('--y', Math.sin(angle) * distance + 'px');
                    el.style.setProperty('--rot', rotation + 'deg');
                    
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1200);
                }

                blastsCount++;
                if(blastsCount >= 6) {
                    clearInterval(blastInterval);
                    setTimeout(() => {
                        window.location.href = "page2.html";
                    }, 1000);
                }
            }, 300); 
        }

        // ----------------- કીપેડ લોજિક ----------------- //

        function pressKey(num, event) {
            if(isSuccess) return; 
            
            triggerMiniBlast(event); 

            if(enteredPasscode.length < 4) {
                enteredPasscode += num;
                updateDisplay();
                
                if(enteredPasscode.length === 4) {
                    document.getElementById('hashBtn').classList.add('hash-glow');
                }
            }
        }

        function clearPasscode(event) {
            if(isSuccess) return;
            if(event) triggerMiniBlast(event);
            enteredPasscode = "";
            updateDisplay();
            
            document.getElementById('hashBtn').classList.remove('hash-glow');
        }

        function submitPasscode(event) {
            if(isSuccess || enteredPasscode.length !== 4) return;
            if(event) triggerMiniBlast(event);

            document.getElementById('hashBtn').classList.remove('hash-glow');

            if(enteredPasscode === correctPasscode) {
                isSuccess = true; 
                triggerMegaBlast();
            } else {
                const display = document.getElementById('passcodeDisplay');
                display.classList.add('error-shake');
                setTimeout(() => {
                    display.classList.remove('error-shake');
                    clearPasscode(null);
                }, 500);
            }
        }

        function updateDisplay() {
            for(let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if(i <= enteredPasscode.length) {
                    dot.classList.add('filled'); 
                } else {
                    dot.classList.remove('filled'); 
                }
            }
        }
    </script>
</body>
</html>
