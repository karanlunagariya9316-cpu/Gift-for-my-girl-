<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(to right, #ff9a9e, #8e2de2);
  overflow-x: hidden;
}

/* 🌸 FLOWERS (visible front) */
.particle {
  position: fixed;
  font-size: 16px;
  animation: float 5s linear infinite;
  z-index: 10; /* 🔥 front ma */
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* 📦 container */
.container {
  padding-top: 5vh;
}

/* 🦄 PHOTO + UNICORN BACK */
.photo-wrapper {
  position: relative;
  display: inline-block;
}

/* 🦄 unicorn glow behind */
.photo-wrapper::before {
  content: "";
  position: absolute;
  width: 260px;
  height: 260px;
  background: url('https://i.imgur.com/6qK0F0K.png') no-repeat center/contain;
  opacity: 0.25; /* soft */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(1px);
  z-index: 1;
}

/* 📸 photo */
.photo {
  width: 85%;
  max-width: 320px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
  position: relative;
  z-index: 2;
}

/* ✨ heading */
h2 {
  margin-top: 20px;
}

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 12px;
  height: 12px;
  margin: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.dot.active {
  background: white;
  box-shadow: 0 0 10px white;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.key:hover {
  background: #ff4d88;
  transform: scale(1.1);
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* ❤️ heart */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

</style>
</head>

<body>

<div class="container">

  <!-- 🦄 PHOTO WITH UNICORN -->
  <div class="photo-wrapper">
    <img src="IMG-20260401-WA0014.jpg" class="photo">
  </div>

  <h2>🌸 Enter your birthdate 🌸</h2>

  <!-- DOTS -->
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* 🌸 FLOWERS START */
setTimeout(()=>{
  setInterval(()=>{
    let p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "🌸";
    p.style.left = Math.random()*100 + "vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  }, 300);
}, 500);

/* dots */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* check */
function check(){
  if(input === password){

    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random()*100 + "vw";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
