<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #6a1b3f, #c94b7a, #ff9a9e);
  color: white;
}

/* 🌸 floating flowers */
.particle {
  position: fixed;
  font-size: 14px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 💎 main card */
.container {
  text-align: center;
  padding: 25px;
  width: 90%;
  max-width: 320px;
  border-radius: 30px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  box-shadow: 
    0 0 25px rgba(255,255,255,0.2),
    0 0 60px rgba(255,105,180,0.3);
  position: relative;
  z-index: 5;
  animation: fadeIn 0.8s ease;
}

/* 🌸 cute corner decoration */
.container::before,
.container::after {
  content: "🌸";
  position: absolute;
  font-size: 22px;
  opacity: 0.6;
}

.container::before {
  top: 10px;
  left: 10px;
}

.container::after {
  bottom: 10px;
  right: 10px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}

/* 📸 photo */
.photo {
  width: 200px;
  border-radius: 25px;
  margin-bottom: 15px;
  border: 3px solid rgba(255,255,255,0.4);
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.5),
    0 0 20px rgba(255, 120, 170, 0.6);
}

/* ✨ heading */
h2 {
  font-weight: 500;
  letter-spacing: 1px;
  text-shadow: 0 0 10px #fff;
}

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 12px;
  height: 12px;
  margin: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: 0.3s;
}

.dot.active {
  background: #fff;
  transform: scale(1.2);
  box-shadow: 0 0 10px white;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
  z-index: 6;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(255,255,255,0.18);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* 💖 soft hover */
.key:hover {
  background: #ff6fa5;
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff6fa5;
}

.key:active {
  transform: scale(0.9);
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* ❤️ heart */
.heart {
  position: fixed;
  font-size: 20px;
  animation: float 2s linear forwards;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

</style>
</head>

<body>

<div class="container">

  <img src="IMG-20260401-WA0014.jpg" class="photo">

  <h2>🌸 Enter your birthdate 🌸</h2>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* particles */
setTimeout(()=>{
  setInterval(()=>{
    let p = document.createElement("div");
    p.className = "particle";
    p.innerHTML = "🌸";
    p.style.left = Math.random()*100 + "vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),6000);
  }, 300);
}, 500);

/* dots */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* check */
function check(){
  if(input === password){

    let rect = document.querySelector(".container").getBoundingClientRect();

    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";

      heart.style.left = rect.left + rect.width/2 + "px";
      heart.style.top = rect.top + rect.height/2 + "px";

      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
