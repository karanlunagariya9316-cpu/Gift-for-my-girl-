<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ✅ BASE FIX */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
}

/* ✅ container */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
  padding-bottom: 160px; /* 🔥 keypad space */
}

/* 🌸 floating flowers */
.particle {
  position: fixed;
  font-size: 14px;
  animation: float 6s linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* 📸 PHOTO */
.photo-frame {
  margin-top: 30px;
  display: inline-block;
  padding: 10px;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb);
  box-shadow: 0 0 25px rgba(255, 150, 200, 0.6);
  position: relative;
}

.photo-frame::before {
  content: "🎀";
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
}

.photo {
  width: 100%;
  max-width: 240px;
  border-radius: 20px;
}

/* text */
h2 { margin-top: 20px; }

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 10px;
  height: 10px;
  margin: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.dot.active {
  background: white;
}

/* ✅ KEYPAD */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;

  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* ✅ PERFECT BUTTON FIX */
.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;

  -webkit-tap-highlight-color: transparent;
  outline: none;
}

.key:focus {
  outline: none;
}

.key:active {
  transform: scale(0.9);
  background: rgba(255,255,255,0.25);
}

/* 💋 RADIAL BLAST ANIMATION */
.kiss {
  position: fixed;
  font-size: 22px;
  pointer-events: none;
  animation: blast 1s ease-out forwards;
}

@keyframes blast {
  0% {
    transform: translate(0,0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(1.6);
    opacity: 0;
  }
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
}

/* hearts */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  100% { transform: translateY(-200px); opacity: 0; }
}

/* 📱 small screen fix */
@media (max-height: 650px) {
  .keypad { bottom: 10px; }
}

</style>
</head>

<body>

<div class="container">

  <div class="photo-frame">
    <img src="IMG-20260401-WA0014.jpg" class="photo">
  </div>

  <h2>🌸 Enter your birthdate 🌸</h2>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* flowers */
setInterval(()=>{
  let p = document.createElement("div");
  p.className = "particle";
  p.innerHTML = "🌸";
  p.style.left = Math.random()*100 + "vw";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),5000);
}, 300);

/* dots */
function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i < input.length);
  });
}

/* 💋 IMPROVED BLAST */
function press(num){

  let centerX = window.innerWidth / 2;
  let centerY = window.innerHeight - 120;

  for(let i=0;i<25;i++){   // 🔥 MANY emojis
    let kiss = document.createElement("div");
    kiss.className = "kiss";
    kiss.innerHTML = "💋";

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 200 + 50;

    let x = Math.cos(angle) * distance;
    let y = Math.sin(angle) * distance;

    kiss.style.left = centerX + "px";
    kiss.style.top = centerY + "px";
    kiss.style.setProperty('--x', x + "px");
    kiss.style.setProperty('--y', y + "px");

    document.body.appendChild(kiss);
    setTimeout(()=>kiss.remove(),1000);
  }

  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

function check(){
  if(input === password){

    for(let i=0;i<20;i++){
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "💖";
      h.style.left = Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),2000);
    }

    setTimeout(()=>{
      window.location.href = "page2.html";
    },1200);

  } else {
    document.querySelector(".dots").classList.add("shake");
    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    },400);
  }
}

</script>

</body>
</html>
