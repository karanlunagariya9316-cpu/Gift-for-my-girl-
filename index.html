<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #ff9a9e, #8e2de2);
    }

    .container {
      padding-top: 5vh;
    }

    h1 { font-size: 28px; }
    h2 { font-size: 22px; margin-top: 10px; }
    p { font-size: 16px; }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #8e2de2;
      font-weight: bold;
    }

    /* QUOTE STYLE (UPDATED) */
    .quote {
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
      background: rgba(0,0,0,0.5);
      display: block;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 10px 18px;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    .slideshow {
      margin-top: 20px;
    }

    .slide {
  width: 85%;
  max-width: 320px;
  height: 60vh;          
      /* 👈 fix height */
  object-fit: cover;     
      /* 👈 image crop thai ne perfect fit */
  border-radius: 15px;
  display: none;
  margin: auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .secret {
      display: none;
      margin-top: 15px;
      font-size: 18px;
      color: yellow;
    }

    .cake {
      display: none;
      font-size: 40px;
      margin-top: 10px;
    }

    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }
  </style>
</head>

<body>

<script>
let pass = prompt("Enter secret code 💖");
if(pass !== "dhrutuu"){
  document.body.innerHTML = "<h1>it's only for you 😘</h1>";
}
</script>

<div class="container">

  <h1 id="text"></h1>

  <h2>Dhrutuu..💗</h2>
  <p>Happy Birthday My Love 🥳💫💖</p>

  <button class="btn" onclick="showSecret()">Tap for surprise 💖</button>

  <div class="secret" id="secretMsg">
    You are the most beautiful part of my life 💕
  </div>

  <div class="cake" id="cake">🎂✨</div>

  <!-- QUOTE -->
  <div class="quote" id="quoteText"></div>

  <!-- SLIDER -->
  <div class="slideshow">
    <img class="slide" src="IMG-20260129-WA0032.jpg">
    <img class="slide" src="IMG-20260401-WA0014.jpg">
    <img class="slide" src="IMG-20260401-WA0021.jpg">
    <img class="slide" src="IMG-20260401-WA0023.jpg">
    <img class="slide" src="IMG-20260401-WA0038.jpg">
    <img class="slide" src="IMG_20260112_175825_524~2.jpg">
    <img class="slide" src="Snapchat-754572241.jpg">
  </div>

</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* typing */
let text = "Hey 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* slider + synced quotes */
let slides = document.getElementsByClassName("slide");

let data = [
  "You are my happiness 💖",
  "Forever with you ✨",
  "My best friend & my love 💫",
  "You complete me 💕",
  "My world is you 🌍💖",
  "Always yours ❤️",
  "I love you forever 💞"
];

let index = 0;

function showSlides() {
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  index++;
  if (index > slides.length) { index = 1; }

  slides[index - 1].style.display = "block";

  // synced text
  document.getElementById("quoteText").innerText = data[index - 1];

  setTimeout(showSlides, 3000);
}

window.onload = showSlides;

/* hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* secret */
function showSecret(){
  document.getElementById("secretMsg").style.display = "block";
  document.getElementById("cake").style.display = "block";
}

</script>

</body>
</html>
