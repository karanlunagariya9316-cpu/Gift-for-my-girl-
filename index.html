<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #ff9a9e, #8e2de2);
      overflow-x: hidden;
    }

    .container {
      padding-top: 15vh;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
    }

    /* SLIDER */
    .slideshow {
      margin-top: 20px;
    }

    .slideshow img {
      width: 80%;
      max-width: 300px;
      height: auto;
      border-radius: 15px;
      display: none;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* HEARTS */
    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
      z-index: 0;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

  </style>
</head>

<body>

<div class="container">

  <h1 id="text"></h1>

  <!-- YOUR CUSTOM TEXT -->
  <h2>Dhrutuu..💗</h2>
  <p>Happy Birthday My Love 🥳💫💖</p>

  <!-- SLIDER -->
  <div class="slideshow">
    <img class="slide" src="IMG-20260401-WA0014.jpg">
    <img class="slide" src="IMG-20260401-WA0021.jpg">
    <img class="slide" src="IMG_20260112_175825_524~2.jpg">
    <img class="slide" src="Snapchat-754572241.jpg">
  </div>

</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* Typing effect */
let text = "Hey Bestie 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* SLIDER FIXED */
let index = 0;
let slides = document.getElementsByClassName("slide");

function showSlides() {
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  index++;
  if (index > slides.length) { index = 1; }
  slides[index - 1].style.display = "block";
  setTimeout(showSlides, 2000);
}

window.onload = showSlides;

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);

</script>

</body>
</html>
