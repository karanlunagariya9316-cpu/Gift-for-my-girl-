<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASE */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
  overflow-y: auto; /* ✅ scroll allow */
  -webkit-overflow-scrolling: touch;
}

/* container */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
  padding-bottom: 40px; /* ✅ space */
}

/* flowers */
.particle {
  position: fixed;
  font-size: 14px;
  animation: float 6s linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* photo */
.photo-frame {
  margin-top: 30px;
  display: inline-block;
  padding: 10px;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb);
  box-shadow: 0 0 25px rgba(255, 150, 200, 0.6);
  position: relative;
}

.photo-frame::before {
  content: "🎀";
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
}

.photo {
  width: 100%;
  max-width: 240px;
  border-radius: 20px;
}

h2 {
  margin-top: 20px;
}

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 10px;
  height: 10px;
  margin: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.dot.active {
  background: white;
}

/* ✅ KEYPAD FIX (NO FIXED POSITION) */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

/* button */
.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

.key:active {
  transform: scale(0.9);
  background: rgba(255,255,255,0.25);
}

/* 💋 blast */
.kiss {
  position: fixed;
  font-size: 22px;
  pointer-events: none;
  animation: blast 1s ease-out forwards;
}

/* 💖 BIG blast */
.big-heart {
  position: fixed;
  font-size: 40px;
  pointer-events: none;
  animation: blast 1.2s ease-out forwards;
}

@keyframes blast {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(1.8); opacity: 0; }
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
}

</style>
</head>

<body>

<div class="container">

  <div class="photo-frame">
    <img src="IMG-20260401-WA0014.jpg" class="photo">
  </div>

  <h2>🌸 Enter your birthdate 🌸</h2>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="press(1, this)">1</button>
    <button class="key" onclick="press(2, this)">2</button>
    <button class="key" onclick="press(3, this)">3</button>
    <button class="key" onclick="press(4, this)">4</button>
    <button class="key" onclick="press(5, this)">5</button>
    <button class="key" onclick="press(6, this)">6</button>
    <button class="key" onclick="press(7, this)">7</button>
    <button class="key" onclick="press(8, this)">8</button>
    <button class="key" onclick="press(9, this)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0, this)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* dots */
function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i < input.length);
  });
}

/* 💋 button blast */
function press(num, el){
  let rect = el.getBoundingClientRect();
  let cx = rect.left + rect.width/2;
  let cy = rect.top + rect.height/2;

  for(let i=0;i<20;i++){
    let k = document.createElement("div");
    k.className = "kiss";
    k.innerHTML = "💋";

    let a = Math.random()*2*Math.PI;
    let d = Math.random()*200+50;

    k.style.left = cx+"px";
    k.style.top = cy+"px";
    k.style.setProperty('--x', Math.cos(a)*d+"px");
    k.style.setProperty('--y', Math.sin(a)*d+"px");

    document.body.appendChild(k);
    setTimeout(()=>k.remove(),1000);
  }

  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* 💖 multi blast */
function check(){
  if(input === password){

    let positions = [
      [50,150],
      [window.innerWidth-80,200],
      [60, window.innerHeight-200],
      [window.innerWidth/2, window.innerHeight/2],
      [window.innerWidth-100, window.innerHeight-250]
    ];

    positions.forEach((pos, index)=>{
      setTimeout(()=>{
        for(let i=0;i<25;i++){
          let h = document.createElement("div");
          h.className = "big-heart";
          h.innerHTML = "💖";

          let a = Math.random()*2*Math.PI;
          let d = Math.random()*250+80;

          h.style.left = pos[0]+"px";
          h.style.top = pos[1]+"px";
          h.style.setProperty('--x', Math.cos(a)*d+"px");
          h.style.setProperty('--y', Math.sin(a)*d+"px");

          document.body.appendChild(h);
          setTimeout(()=>h.remove(),1200);
        }
      }, index*200);
    });

    setTimeout(()=>{
      window.location.href = "page2.html";
    },1500);

  } else {
    document.querySelector(".dots").classList.add("shake");
    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    },400);
  }
}

</script>

</body>
</html>
