<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #ff9a9e, #8e2de2);
    }

    .container {
      padding-top: 10vh;
    }

    h1 { font-size: 28px; }
    h2 { font-size: 22px; margin-top: 10px; }
    p { font-size: 16px; }

    /* BUTTON */
    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #8e2de2;
      font-weight: bold;
    }

    /* SLIDESHOW CONTAINER */
    .slideshow-container {
      position: relative;
      margin-top: 30px;
    }

    .slide {
      width: 80%;
      max-width: 300px;
      border-radius: 15px;
      display: none;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    /* OVERLAY TEXT */
    .overlay-text {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 16px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px;
      border-radius: 10px;
    }

    /* SECRET */
    .secret {
      display: none;
      margin-top: 15px;
      font-size: 18px;
      color: yellow;
    }

    /* CAKE */
    .cake {
      display: none;
      font-size: 40px;
      margin-top: 10px;
    }

    /* HEARTS */
    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }
  </style>
</head>

<body>

<!-- PASSWORD -->
<script>
let pass = prompt("Enter secret code 💖");
if(pass !== "dhrutuu"){
  document.body.innerHTML = "<h1>Not for you 😜</h1>";
}
</script>

<div class="container">

  <h1 id="text"></h1>

  <h2>Dhrutuu..💗</h2>
  <p>Happy Birthday My Love 🥳💫💖</p>

  <!-- BUTTON -->
  <button class="btn" onclick="showSecret()">Tap for surprise 💖</button>

  <!-- SECRET -->
  <div class="secret" id="secretMsg">
    You are the most beautiful part of my life 💕
  </div>

  <!-- CAKE -->
  <div class="cake" id="cake">🎂✨</div>

  <!-- SLIDER + OVERLAY -->
  <div class="slideshow-container">

    <img class="slide" src="IMG-20260401-WA0014.jpg">
    <img class="slide" src="IMG-20260401-WA0021.jpg">
    <img class="slide" src="IMG_20260112_175825_524~2.jpg">
    <img class="slide" src="Snapchat-754572241.jpg">

    <div class="overlay-text" id="quoteText"></div>

  </div>

</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* typing */
let text = "Hey 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* slider */
let slideIndex = 0;
let slides = document.getElementsByClassName("slide");

function showSlides() {
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  slideIndex++;
  if (slideIndex > slides.length) { slideIndex = 1; }
  slides[slideIndex-1].style.display = "block";
  setTimeout(showSlides, 2000);
}
window.onload = showSlides;

/* hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* secret */
function showSecret(){
  document.getElementById("secretMsg").style.display = "block";
  document.getElementById("cake").style.display = "block";
}

/* quotes */
let quotes = [
  "You are my happiness 💖",
  "Forever with you ✨",
  "My best friend & my love 💫",
  "You complete me 💕"
];

let q = 0;
function changeQuote(){
  document.getElementById("quoteText").innerText = quotes[q];
  q++;
  if(q >= quotes.length){ q = 0; }
  setTimeout(changeQuote, 2000);
}
changeQuote();

</script>

</body>
</html>
