<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Dhrutuu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ✨ Main Theme Background */
        body {
            margin: 0;
            padding: 0;
            /* 100dvh નો ઉપયોગ કર્યો છે જેથી બ્રાઉઝરના મેનુ પ્રમાણે જાતે એડજસ્ટ થાય */
            height: 100dvh; 
            background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 📸 --- POLAROID FRAME WITH TEDDY & BOW --- 📸 */
        .polaroid-wrapper {
            position: relative;
            margin-bottom: 3vh; /* margin ઓટોમેટિક એડજસ્ટ થશે */
            transform: rotate(-3deg);
            animation: floatFrame 4s ease-in-out infinite alternate;
        }

        @keyframes floatFrame {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(-10px) rotate(-1deg); }
        }

        .polaroid {
            background: #fff;
            padding: 10px 10px 40px 10px; 
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 160px; /* થોડી સ્ટાન્ડર્ડ સાઈઝ રાખી છે */
            transition: all 0.3s ease;
        }

        .polaroid img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        /* 🎀 Bow on Top Right */
        .bow {
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 50px;
            transform: rotate(15deg);
            filter: drop-shadow(2px 5px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }

        /* 🧸 Teddy on Bottom Left */
        .teddy {
            position: absolute;
            bottom: -25px;
            left: -25px;
            font-size: 60px;
            transform: rotate(-10deg);
            filter: drop-shadow(-2px 5px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }

        /* 🔒 --- PASSCODE DISPLAY --- 🔒 */
        .passcode-title {
            color: #fff;
            font-size: 20px;
            font-family: 'Fredoka One', cursive, sans-serif;
            letter-spacing: 1px;
            margin-bottom: 1.5vh;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .passcode-display {
            display: flex;
            gap: 10px;
            margin-bottom: 3.5vh;
        }

        /* રીલ જેવા ચોરસ બોક્સ */
        .dot-box {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 30px;
            color: transparent; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        /* પાસવર્ડ નાખે ત્યારે * દેખાશે */
        .dot-box.filled {
            color: #fff; 
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* ખોટો પાસવર્ડ નાખે તો સ્ક્રીન ધ્રૂજશે */
        .error-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* 📱 --- DIALER NUMPAD --- 📱 */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 20px; /* ગેપ થોડો ઓછો કર્યો */
        }

        .num-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            font-size: 26px;
            font-family: 'Fredoka One', cursive;
            color: #a8325f;
            box-shadow: 0 8px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .num-btn:active {
            transform: scale(0.9) translateY(4px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            background: #ffe6f0;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: none;
            font-size: 32px;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ✨ AUTO-ADJUST MAGIC: નાની સ્ક્રીન માટે મીડિયા ક્વેરી ✨ */
        /* જો ફોનની ઉંચાઈ 700px કરતા ઓછી હશે તો બધું જાતે નાનું થઈ જશે */
        @media screen and (max-height: 700px) {
            .polaroid-wrapper { margin-bottom: 2vh; }
            .polaroid { width: 130px; padding: 8px 8px 30px 8px; }
            .polaroid img { height: 130px; }
            .bow { font-size: 40px; top: -15px; right: -15px; }
            .teddy { font-size: 50px; bottom: -20px; left: -20px; }

            .passcode-title { font-size: 18px; margin-bottom: 1vh; }
            .passcode-display { gap: 8px; margin-bottom: 2.5vh; }
            .dot-box { width: 36px; height: 36px; font-size: 26px; }

            .numpad { gap: 8px 15px; }
            .num-btn { width: 55px; height: 55px; font-size: 22px; }
            .action-btn { font-size: 26px; }
        }

    </style>
</head>
<body>

    <div class="polaroid-wrapper">
        <div class="bow">🎀</div>
        <div class="polaroid">
            <img src="IMG-20260401-WA0014.jpg" alt="Dhruti">
        </div>
        <div class="teddy">🧸</div>
    </div>

    <div class="passcode-title">Enter your birthdate</div>
    <div class="passcode-display" id="passcodeDisplay">
        <div class="dot-box" id="dot1">*</div>
        <div class="dot-box" id="dot2">*</div>
        <div class="dot-box" id="dot3">*</div>
        <div class="dot-box" id="dot4">*</div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="pressKey('1')">1</button>
        <button class="num-btn" onclick="pressKey('2')">2</button>
        <button class="num-btn" onclick="pressKey('3')">3</button>
        
        <button class="num-btn" onclick="pressKey('4')">4</button>
        <button class="num-btn" onclick="pressKey('5')">5</button>
        <button class="num-btn" onclick="pressKey('6')">6</button>
        
        <button class="num-btn" onclick="pressKey('7')">7</button>
        <button class="num-btn" onclick="pressKey('8')">8</button>
        <button class="num-btn" onclick="pressKey('9')">9</button>
        
        <button class="num-btn action-btn" onclick="clearPasscode()">*</button>
        <button class="num-btn" onclick="pressKey('0')">0</button>
        <button class="num-btn action-btn" onclick="submitPasscode()">#</button>
    </div>

    <script>
        let enteredPasscode = "";
        
        // પાસવર્ડ 2704 સેટ કરેલો છે
        const correctPasscode = "2704"; 

        function pressKey(num) {
            if(enteredPasscode.length < 4) {
                enteredPasscode += num;
                updateDisplay();
                
                if(enteredPasscode.length === 4) {
                    setTimeout(submitPasscode, 200); 
                }
            }
        }

        function clearPasscode() {
            enteredPasscode = "";
            updateDisplay();
        }

        function submitPasscode() {
            if(enteredPasscode.length !== 4) return;

            if(enteredPasscode === correctPasscode) {
                window.location.href = "page2.html";
            } else {
                const display = document.getElementById('passcodeDisplay');
                display.classList.add('error-shake');
                setTimeout(() => {
                    display.classList.remove('error-shake');
                    clearPasscode();
                }, 500);
            }
        }

        function updateDisplay() {
            for(let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if(i <= enteredPasscode.length) {
                    dot.classList.add('filled'); 
                } else {
                    dot.classList.remove('filled'); 
                }
            }
        }
    </script>
</body>
</html>
