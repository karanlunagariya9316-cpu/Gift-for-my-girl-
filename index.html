<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to right, pink, purple);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      text-align: center;
    }
    h1 {
      font-size: 2.5em;
      animation: fadeIn 3s;
    }
    p {
      font-size: 1.2em;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>

<h1>Hey Bestie 💖</h1>
<p>You are very special to me ✨</p>
<p>This surprise is just for you 💕</p>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

</body>
</html>
