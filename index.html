<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
  color: white;
}

/* glow background */
body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: rgba(255, 0, 100, 0.3);
  filter: blur(120px);
  top: 10%;
  left: 20%;
}

body::after {
  content: "";
  position: fixed;
  width: 250px;
  height: 250px;
  background: rgba(255, 150, 200, 0.3);
  filter: blur(120px);
  bottom: 10%;
  right: 20%;
}

/* card */
.container {
  text-align: center;
  padding: 25px;
  width: 90%;
  max-width: 320px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

/* photo */
.photo {
  width: 200px;
  border-radius: 20px;
  margin-bottom: 15px;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.5),
    0 0 25px rgba(255, 100, 150, 0.5);
}

/* text */
h2 {
  font-weight: 500;
}

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 12px;
  height: 12px;
  margin: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.dot.active {
  background: #fff;
  box-shadow: 0 0 10px white;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.key:hover {
  background: #ff4d88;
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff4d88;
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* ❤️ heart burst */
.heart {
  position: fixed;
  font-size: 20px;
  animation: float 2s linear forwards;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}
</style>

</head>

<body>

<div class="container">

  <!-- PHOTO -->
  <img src="IMG-20260401-WA0014.jpg" class="photo">

  <h2>Enter Passcode 💖</h2>

  <!-- DOTS -->
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* update dots */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* check password */
function check(){
  if(input === password){

    /* ❤️ heart burst */
    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random()*100 + "vw";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
