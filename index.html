<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, pink, purple);
    }

    h1 {
      margin-top: 40vh;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

    /* Slideshow */
    .slideshow {
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    .slideshow img {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h1 id="text"></h1>
<p>You are very special to me ✨</p>
<p>This surprise is just for you 💕</p>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Slideshow -->
<div class="slideshow">
  <img src="https://via.placeholder.com/150">
  <img src="https://via.placeholder.com/150">
  <img src="https://via.placeholder.com/150">
</div>

<script>
/* Typing effect */
let text = "Hey (Her Name) 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 100);
  }
}
typing();

/* Floating hearts */
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random()*100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random()*20+10)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove()},5000);
},300);
</script>

</body>
</html>
