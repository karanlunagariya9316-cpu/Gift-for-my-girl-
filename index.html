
<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #c084fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    /* PHOTO */
    .photo {
      width: 220px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* TITLE */
    h2 {
      margin-bottom: 10px;
      font-weight: 500;
    }

    /* DOTS (PASSWORD) */
    .dots {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .dot {
      width: 12px;
      height: 12px;
      margin: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    .dot.active {
      background: white;
    }

    /* KEYPAD */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 70px);
      gap: 12px;
      justify-content: center;
    }

    .key {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
    }

    .key:active {
      transform: scale(0.9);
      background: rgba(255,255,255,0.4);
    }

    /* SHAKE (WRONG PASS) */
    .shake {
      animation: shake 0.4s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    /* HEART BURST */
    .heart {
      position: fixed;
      font-size: 20px;
      animation: float 2s linear forwards;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- PHOTO -->
  <img src="IMG-20260401-WA0014.jpg" class="photo">

  <h2>Enter Passcode 💖</h2>

  <!-- DOTS -->
  <div class="dots" id="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* UPDATE DOTS */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* CHECK PASSWORD */
function check(){
  if(input === password){

    /* ❤️ heart burst */
    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random()*100 + "vw";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    /* redirect after animation */
    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {

    /* ❌ shake */
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
