<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, pink, purple);
    }

    h1 {
      margin-top: 20vh;
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }

    /* Slideshow */
    .slideshow {
      position: fixed;
      bottom: 20px;
      width: 100%;
    }

    .slideshow img {
      width: 200px;
      height: 200px;
      border-radius: 15px;
      display: none;
      margin: auto;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

  </style>
</head>

<body>

<h1 id="text"></h1>
<p>You are very special to me ✨</p>
<p>This surprise is just for you 💕</p>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- 4 Photos Slideshow -->
<div class="slideshow">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
  <img src="photo4.jpg">
</div>

<script>

/* Typing effect */
let text = "Hey 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 100);
  }
}
typing();

/* Slideshow logic */
let slideIndex = 0;
let slides = document.querySelectorAll(".slideshow img");

function showSlides() {
  slides.forEach(img => img.style.display = "none");
  slideIndex++;
  if (slideIndex > slides.length) {slideIndex = 1;}
  slides[slideIndex-1].style.display = "block";
  setTimeout(showSlides, 2000); // 2 sec change
}
showSlides();

/* Floating hearts */
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random()*100 + "vw";
  heart.innerHTML = "💖";
  heart.style.fontSize = (Math.random()*20+10)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove()},5000);
},300);

</script>

</body>
</html>
