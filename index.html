<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(to right, #ff9a9e, #8e2de2);
      overflow-x: hidden;
    }

    .container {
      padding-top: 5vh;
    }

    .button {
      display: none;
      margin: 20px auto;
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
      background: white;
      color: purple;
      font-weight: bold;
      cursor: pointer;
    }

    .quote {
      margin-top: 10px;
      display: inline-block;
      background: rgba(0,0,0,0.4);
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 20px;
      font-weight: bold;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }

    .counter {
      font-size: 13px;
      margin-top: 5px;
      opacity: 0.9;
    }

    .slideshow {
      margin-top: 20px;
      position: relative;
    }

    .slide {
      width: 85%;
      max-width: 320px;
      border-radius: 15px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      display: none;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 34px;
      color: #d8b4fe;
      cursor: pointer;
      user-select: none;
      transition: 0.3s;
    }

    .left { left: 5%; }
    .right { right: 5%; }

    .arrow:hover {
      text-shadow: 
        0 0 10px #e0c3fc,
        0 0 20px #c084fc,
        0 0 30px #a855f7;
      transform: translateY(-50%) scale(1.3);
    }

    /* 🔥 NEW GLOW HEART */
    .heart {
      position: fixed;
      pointer-events: none;
      animation: floatUp linear forwards;
      text-shadow: 
        0 0 10px #ff4d6d,
        0 0 20px #ff4d6d,
        0 0 30px #ff99ac;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.4);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1 id="text"></h1>
  <h2>Dhrutuu..💗</h2>
  <p>Happy Birthday My Love 🥳💫💖</p>

  <button id="nextBtn" class="button" onclick="goNext()">Next ➡️</button>

  <div id="quoteText" class="quote"></div>

  <div class="hint">Tap ➡️ to change photo</div>
  <div id="counter" class="counter"></div>

  <div class="slideshow">

    <span class="arrow left" onclick="prevSlide()">&#10094;</span>
    <span class="arrow right" onclick="nextSlide()">&#10095;</span>

    <img class="slide" src="IMG-20260401-WA0014.jpg">
    <img class="slide" src="IMG-20260401-WA0021.jpg">
    <img class="slide" src="IMG-20260401-WA0023.jpg">
    <img class="slide" src="IMG_20260112_175838_981~2.jpg">
    <img class="slide" src="IMG-20260401-WA0038.jpg">
    <img class="slide" src="IMG_20260112_175825_524~2.jpg">
    <img class="slide" src="IMG-20260129-WA0033~2.jpg">
    <img class="slide" src="Snapchat-754572241~2.jpg">

  </div>

</div>

<script>

/* typing */
let text = "Hey 💖";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* SLIDER */
let slideIndex = 0;
let slides = document.getElementsByClassName("slide");

let quotes = [
  "You are my happiness 💝",
  "you are my Forever ♾️✨",
  "You are my everything 🤗😚",
  "I love you forever 💋💗",
  "you are thi most important person 💕",
  "My best friend & my love 🫶💫",
  "You are my world 🌍",
  "You are my lifeline 🧬"
];

function showSlide(n) {
  if (n >= slides.length) slideIndex = 0;
  if (n < 0) slideIndex = slides.length - 1;

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  slides[slideIndex].style.display = "block";
  document.getElementById("quoteText").innerText = quotes[slideIndex];

  document.getElementById("counter").innerText = 
    `Photo ${slideIndex + 1}/${slides.length}`;

  if (slideIndex === slides.length - 1) {
    document.getElementById("nextBtn").style.display = "block";
  } else {
    document.getElementById("nextBtn").style.display = "none";
  }
}

function nextSlide(){
  slideIndex++;
  showSlide(slideIndex);
}

function prevSlide(){
  slideIndex--;
  showSlide(slideIndex);
}

showSlide(slideIndex);

function goNext(){
  window.location.href = "page2.html";
}

/* 🔥 GLOW HEART SYSTEM */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 12) + "px";
  heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 250);

</script>

</body>
</html>
