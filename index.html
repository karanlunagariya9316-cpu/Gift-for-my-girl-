
<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  <style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(-45deg, #ff9a9e, #c084fc, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  color: white;
}

/* 🌈 moving gradient */
@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ✨ glass card */
.container {
  text-align: center;
  padding: 25px;
  width: 90%;
  max-width: 320px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  box-shadow: 
    0 0 25px rgba(255,255,255,0.2),
    0 0 60px rgba(192,132,252,0.4);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* 📸 photo glow */
.photo {
  width: 200px;
  border-radius: 20px;
  margin-bottom: 15px;
  box-shadow: 
    0 0 20px rgba(255,255,255,0.4),
    0 0 40px rgba(255,105,180,0.5);
  transition: 0.4s;
}

.photo:hover {
  transform: scale(1.05);
}

/* ✨ heading glow */
h2 {
  font-weight: 500;
  text-shadow: 0 0 10px pink;
}

/* 🔘 dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 12px;
  height: 12px;
  margin: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: 0.3s;
}

.dot.active {
  background: white;
  box-shadow: 0 0 10px white;
}

/* 🔢 keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
  margin-top: 10px;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* 🔥 hover glow */
.key:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff9a9e;
}

.key:active {
  transform: scale(0.9);
}

/* ❌ shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* 💖 floating hearts bg */
.bg-heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}
</style>

    /* HEART BURST */
    .heart {
      position: fixed;
      font-size: 20px;
      animation: float 2s linear forwards;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- PHOTO -->
  <img src="IMG-20260401-WA0014.jpg" class="photo">

  <h2>Enter Passcode 💖</h2>

  <!-- DOTS -->
  <div class="dots" id="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>
    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>
    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>
    <button class="key" onclick="clearPass()">C</button>
    <button class="key" onclick="press(0)">0</button>
    <button class="key" onclick="check()">✔</button>
  </div>

</div>

<script>

let password = "2704";
let input = "";

/* UPDATE DOTS */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* CHECK PASSWORD */
function check(){
  if(input === password){

    /* ❤️ heart burst */
    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random()*100 + "vw";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    /* redirect after animation */
    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {

    /* ❌ shake */
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
