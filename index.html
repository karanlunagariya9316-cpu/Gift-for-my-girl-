<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 IMPORTANT FIX */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #5a0f2e, #a8325f, #ff9a9e);
  min-height: 100vh;
}

/* 🌸 floating flowers */
.particle {
  position: fixed;
  font-size: 14px;
  animation: float 6s linear infinite;
  pointer-events: none;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* 📸 PHOTO FRAME */
.photo-frame {
  margin-top: 40px;
  display: inline-block;
  padding: 10px;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb);
  box-shadow: 
    0 0 25px rgba(255, 150, 200, 0.6),
    0 0 50px rgba(255, 100, 150, 0.4);
  position: relative;
}

/* 🎀 ribbon */
.photo-frame::before {
  content: "🎀";
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
}

/* 🌸 bottom decoration */
.photo-frame::after {
  content: "🌸 🌸";
  position: absolute;
  bottom: -15px;
  left: 50%;
  transform: translateX(-50%);
}

/* image */
.photo {
  width: 220px;
  border-radius: 20px;
  display: block;
}

/* heading */
h2 {
  margin-top: 20px;
  text-shadow: 0 0 10px #fff;
}

/* dots */
.dots {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.dot {
  width: 12px;
  height: 12px;
  margin: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

.dot.active {
  background: white;
  box-shadow: 0 0 10px white;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
}

.key {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.key:hover {
  background: #ff4d88;
  transform: scale(1.1);
}

.key:active {
  transform: scale(0.9);
}

/* shake */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* ❤️ hearts */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

</style>
</head>

<body>

<!-- PHOTO -->
<div class="photo-frame">
  <img src="IMG-20260401-WA0014.jpg" class="photo">
</div>

<h2>🌸 Enter your birthdate 🌸</h2>

<!-- dots -->
<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- keypad -->
<div class="keypad">
  <button class="key" onclick="press(1)">1</button>
  <button class="key" onclick="press(2)">2</button>
  <button class="key" onclick="press(3)">3</button>
  <button class="key" onclick="press(4)">4</button>
  <button class="key" onclick="press(5)">5</button>
  <button class="key" onclick="press(6)">6</button>
  <button class="key" onclick="press(7)">7</button>
  <button class="key" onclick="press(8)">8</button>
  <button class="key" onclick="press(9)">9</button>
  <button class="key" onclick="clearPass()">C</button>
  <button class="key" onclick="press(0)">0</button>
  <button class="key" onclick="check()">✔</button>
</div>

<script>

let password = "2704";
let input = "";

/* flowers */
setInterval(()=>{
  let p = document.createElement("div");
  p.className = "particle";
  p.innerHTML = "🌸";
  p.style.left = Math.random()*100 + "vw";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),5000);
}, 300);

/* dots */
function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i < input.length);
  });
}

function press(num){
  if(input.length < 4){
    input += num;
    updateDots();
  }
}

function clearPass(){
  input = "";
  updateDots();
}

/* check */
function check(){
  if(input === password){

    for(let i=0;i<20;i++){
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random()*100 + "vw";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),2000);
    }

    setTimeout(()=>{
      window.location.href = "page2.html";
    }, 1200);

  } else {
    document.querySelector(".dots").classList.add("shake");

    setTimeout(()=>{
      document.querySelector(".dots").classList.remove("shake");
      clearPass();
    }, 400);
  }
}

</script>

</body>
</html>
